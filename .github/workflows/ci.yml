name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: [self-hosted, metalhost]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true

      - name: Install buf and protoc plugins
        run: make tools

      - name: Lint protos
        run: make lint

      - name: Generate SDK
        run: make generate

      - name: Generated output is current
        run: git diff --exit-code gen/

      - name: Go test
        run: make test
