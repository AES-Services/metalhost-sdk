syntax = "proto3";

package aes.compute.v1;

import "aes/ops/v1/operations.proto";

// ComputeService is the control-plane API for VMs.
service ComputeService {
  // CreateVirtualMachine provisions a new VM. Returns a long-running Operation the client polls
  // to completion; the synchronous create path returns the VM directly.
  rpc CreateVirtualMachine(CreateVirtualMachineRequest) returns (CreateVirtualMachineResponse);
  rpc GetVirtualMachine(GetVirtualMachineRequest) returns (GetVirtualMachineResponse);
  rpc ListVirtualMachines(ListVirtualMachinesRequest) returns (ListVirtualMachinesResponse);
  // StartVirtualMachine starts a stopped VM. Idempotent on already-running VMs.
  rpc StartVirtualMachine(StartVirtualMachineRequest) returns (StartVirtualMachineResponse);
  // StopVirtualMachine halts the VM (graceful shutdown). Disk is preserved.
  rpc StopVirtualMachine(StopVirtualMachineRequest) returns (StopVirtualMachineResponse);
  // RestartVirtualMachine reboots the guest OS.
  rpc RestartVirtualMachine(RestartVirtualMachineRequest) returns (RestartVirtualMachineResponse);
  // ResizeVirtualMachine changes the configurator shape (vcpus / ram_gib / cpu_class). CPU and
  // memory can't change on a running VM, so this is a stop → reshape → start sequence run as a
  // long-running Operation; the response carries the Operation so the client returns immediately
  // and polls. Brief downtime. Disks, networks, and IP addresses survive. A cpu_class change
  // requires capacity for the new class in the datacenter, or the operation fails.
  rpc ResizeVirtualMachine(ResizeVirtualMachineRequest) returns (ResizeVirtualMachineResponse);
  // SetVMAutorenew flips the autorenew flag on a VM in MONTHLY_* billing mode. Returns
  // FailedPrecondition when called on a HOURLY VM (no term to renew).
  rpc SetVMAutorenew(SetVMAutorenewRequest) returns (SetVMAutorenewResponse);
  // RenewVMNow forces an immediate renewal — charges the wallet for the next term using the
  // VM's current billing_mode + the SKU's current hourly rate. Useful for customers who want
  // to extend before the autorenew worker fires, or who have autorenew off and want a manual
  // extension. Refuses on HOURLY (no term to renew).
  rpc RenewVMNow(RenewVMNowRequest) returns (RenewVMNowResponse);
  // ReimageVirtualMachine wipes the OS disk and reinstalls from a (potentially new) image.
  // The VM must be STOPPED — refuses on RUNNING to avoid surprising the customer.
  // Networks, public IPs, and firewall rules survive — only the disk is replaced.
  //
  // Use cases: customer wants to start from a clean slate without recreating the VM (preserves
  // resource name, networks, IPs, ssh keys), or wants to upgrade the base image (Ubuntu 24.04
  // → 26.04). Cheaper than create-new-and-migrate when the customer doesn't care about the
  // existing disk contents.
  rpc ReimageVirtualMachine(ReimageVirtualMachineRequest) returns (ReimageVirtualMachineResponse);
  // OpenConsole returns a short-lived token + WebSocket URL the client uses to connect to the
  // VM's serial or VNC console. The connection is proxied through the Metalhost endpoint.
  rpc OpenConsole(OpenConsoleRequest) returns (OpenConsoleResponse);
  // SnapshotVirtualMachine takes a point-in-time copy of a VM (definition + every disk).
  // NOT a backup — same caveat as disk snapshots.
  rpc SnapshotVirtualMachine(SnapshotVirtualMachineRequest) returns (SnapshotVirtualMachineResponse);
  rpc GetVmSnapshot(GetVmSnapshotRequest) returns (GetVmSnapshotResponse);
  rpc ListVmSnapshots(ListVmSnapshotsRequest) returns (ListVmSnapshotsResponse);
  rpc DeleteVmSnapshot(DeleteVmSnapshotRequest) returns (DeleteVmSnapshotResponse);
  // DeleteVirtualMachine stops billing and removes a VM. Returns a long-running Operation the
  // client polls; the synchronous path soft-deletes immediately.
  rpc DeleteVirtualMachine(DeleteVirtualMachineRequest) returns (DeleteVirtualMachineResponse);

  // GetVMMetrics returns CPU/memory/disk/network samples for a VM over a time range. Caller
  // specifies the rollup window (default 1m, max 1h step).
  rpc GetVMMetrics(GetVMMetricsRequest) returns (GetVMMetricsResponse);

  // ListVMUtilization returns point-in-time CPU / memory / GPU utilization for every VM in
  // a project, plus an idle-days counter for cost hygiene. Backs the dashboard's workloads
  // table; poll at a few-second cadence.
  rpc ListVMUtilization(ListVMUtilizationRequest) returns (ListVMUtilizationResponse);

  // CloneVirtualMachine creates a new VM whose BOOT disk is a copy of an existing VM's boot
  // disk at the point of clone. Async, disk-first: snapshots the source boot disk, copies it,
  // and provisions the new VM from the copy; returns an Operation the caller polls like a
  // create. The new VM gets a fresh name +
  // project-scoped resource ID. Custom firewall rules ARE copied; networks are NOT (clone is
  // per-VM, not per-stack). Boot disk only — any attached DATA disks on the source are NOT
  // cloned (tracked as a follow-on, mirrors CreateVirtualMachineFromBackup).
  rpc CloneVirtualMachine(CloneVirtualMachineRequest) returns (CloneVirtualMachineResponse);

  // CreateVirtualMachineFromBackup spins up a new VM whose boot disk is materialized from
  // a previously-taken VmSnapshot. Same project, same DC as the source backup. Boot disk
  // only in v1 — data disks from the source aren't re-attached (tracked as a follow-on).
  // The source VM is untouched; the new VM's boot disk is built from the snapshot's
  // preserved boot volume.
  rpc CreateVirtualMachineFromBackup(CreateVirtualMachineFromBackupRequest) returns (CreateVirtualMachineFromBackupResponse);
}

// BillingMode picks how a VM is charged: per-hour (post-paid usage events) or upfront monthly
// commitment at a discounted rate. Server treats UNSPECIFIED as HOURLY so missing the field
// on Create gets the default behavior.
enum BillingMode {
  BILLING_MODE_UNSPECIFIED = 0;
  // Per-hour usage events accrue against the wallet's prepay balance each metering tick.
  BILLING_MODE_HOURLY = 1;
  // 1-month prepaid term, ~10% discount. commitment_end_at = create + ~30d.
  BILLING_MODE_MONTHLY_1 = 2;
  // 3-month prepaid term, ~18% discount.
  BILLING_MODE_MONTHLY_3 = 3;
  // 6-month prepaid term, ~25% discount.
  BILLING_MODE_MONTHLY_6 = 4;
  // 12-month prepaid term, ~35% discount.
  BILLING_MODE_MONTHLY_12 = 5;
}

message VirtualMachine {
  string name = 1;
  string project_name = 2;
  string datacenter_name = 3;
  reserved 4;
  reserved "instance_type";
  // Current lifecycle state — PROVISIONING / BOOTING / RUNNING / RESTARTING / STOPPING /
  // STOPPED / STOPPED_FOR_NONPAYMENT / FAILED / ORPHANED / DELETING / DELETED. Updated after
  // the corresponding lifecycle RPC succeeds. A VM that can no longer be found on its host
  // surfaces as ORPHANED (and is restored automatically if it reappears); reads may reflect
  // that transition.
  string state = 5;
  int64 create_time_unix = 6;
  // User-facing labels (filterable, indexed externally). Merged on Update unless clear_labels.
  map<string, string> labels = 7;
  // Operator notes / non-indexed metadata. Same merge-by-default semantics as labels.
  map<string, string> annotations = 8;
  // ETag for optimistic concurrency. Server generates from the row's version + update_time;
  // every mutation that takes an etag refuses to apply when the supplied etag doesn't match
  // the current row, returning Aborted. Treat as opaque on the client side.
  string etag = 9;
  // Last-modified time, mirrors the underlying row's update_time. Useful for sorting + UI.
  int64 update_time_unix = 10;
  // Current billing mode. HOURLY = per-hour usage; MONTHLY_* = prepaid term.
  BillingMode billing_mode = 11;
  // For MONTHLY_*: when the prepaid term ends. After this passes the renewal worker either
  // re-charges (autorenew=true) or flips the row back to HOURLY. Zero when billing_mode is
  // HOURLY.
  int64 commitment_end_at_unix = 12;
  // For MONTHLY_*: whether the renewal worker should auto-charge for the next term when
  // this one ends. Customer toggles via SetVMAutorenew. Ignored when billing_mode is HOURLY.
  bool autorenew = 13;
  // ────────────── Runtime-derived fields (populated live at Get/List time) ──────────────
  // These are NOT stored; Get/List handlers read them from the datacenter so the API surface
  // matches reality (private IP, host node, disk size, boot image, detailed status). Empty when
  // the VM has been deleted or is unreachable — `state` then reads `DELETED`/`UNKNOWN`.
  //
  // Tenant-private IPv4 from the project's network. Pinned across stop/start. Routable only
  // inside the tenant network (cross-network requires explicit peering); for outbound internet
  // egress the VM uses its public NIC when one is allocated.
  string private_ipv4 = 14;
  reserved 15;
  reserved "external_ip";
  // Host the VM runs on (e.g. "worker-01"). Useful for capacity reports and migration
  // affinity hints.
  string host_node = 16;
  // Removed pre-launch — boot disks are now first-class Disk resources. Read the bound boot
  // disk via the boot_disk field below + GetDisk for size + source details.
  reserved 17, 18;
  reserved "disk_size_gib", "boot_image_url";
  // Finer-grained status than `state`. Values: "Running", "Starting", "Stopping", "Stopped",
  // "Provisioning", "ErrImagePull", "Unknown", and others. Use for UI surfacing of transient
  // phases that don't map cleanly to `state`.
  string status_detail = 19;
  // User-facing hostname (DNS-1123 label, ≤63 chars). Injected as the guest's cloud-init
  // hostname. Customer chooses; defaults to the resource id if omitted at create time.
  string hostname = 20;
  // Tenant network the VM is attached to (`projects/{p}/networks/{id}`). Each VM has exactly
  // one network, which provides the VM's single NIC and IPv6 address. VMs in the same network
  // can talk freely; cross-network requires explicit peering.
  string network_name = 21;
  // Public IPv4 address allocated to this VM for the public NIC workflow. Empty when the VM
  // was created without `assign_public_ipv4=true`. When set, this is the same value as the
  // PublicIp resource's ip_address.
  string public_ipv4 = 22;
  // Public IPv6 address on the same public NIC as public_ipv4. Included automatically with
  // the public IP in IPv6-enabled datacenters — no extra request flag and no extra charge.
  // Statically configured and pinned for the VM's lifetime. Empty when the VM has no public
  // IP or the datacenter doesn't offer IPv6 yet.
  string public_ipv6 = 23;
  // The Disk resource bound as the VM's boot device (`projects/{p}/disks/{id}`). Set on every
  // persistent VM (ephemeral lab VMs leave it empty). The disk has its own
  // lifecycle: DeleteVirtualMachine detaches it but does not delete it, so a customer can bind
  // the same boot_disk to a fresh VM and keep their data. Use GetDisk for size + source URL.
  string boot_disk = 24;
  // Configurator shape — the (vcpus, ram_gib, cpu_class) the VM was created with. Drives the
  // per-component hourly usage events.
  int32 vcpus = 25;
  int32 ram_gib = 26;
  string cpu_class = 27;
  // Whole-GPU passthrough attached to the VM. gpu_model is the SKU variant (e.g. "rtx4090");
  // gpu_count is how many physical cards. Empty / 0 for a CPU-only VM. Drives the
  // compute.gpu.<model>.runtime_hours meter.
  string gpu_model = 31;
  int32 gpu_count = 32;
  // ────────────── Live cost fields (computed at Get-time, not persisted) ──────────────
  // current_cost_per_hour_minor_decimal: the hourly rate this VM would accrue in HOURLY mode
  // at current rates, including boot disk + any public IP. NUMERIC text so sub-cent precision
  // (e.g. "0.342465" for a 1-vCPU cascadelake VM) survives the wire. Zero string ("0") when
  // the VM is in a state that doesn't bill (DELETED, etc.) or rates aren't seeded.
  //
  // Why decimal: a small VM's hourly rate is fractional cents — rounding to int64 hides the
  // truth and customers see "$0/hr". The portal displays the decimal value to 4-6 places.
  //
  // mtd_spend_minor_decimal: month-to-date wallet debits attributed to this VM. Reflects what
  // the customer has actually paid for this VM since start-of-month UTC. Sub-cent residue not
  // yet charged is NOT counted.
  string current_cost_per_hour_minor_decimal = 28;
  string mtd_spend_minor_decimal = 29;
  // Linux login user cloud-init created for SSH access (`ssh <linux_username>@<public_ipv4>`).
  // Set from CreateVirtualMachineRequest.linux_username. Empty on VMs created with a raw
  // user_data cloud-config (the customer's YAML owns user creation) or on pre-feature rows.
  string linux_username = 30;
  // Internal security groups attached to this VM's private NIC
  // (`organizations/{org}/projects/{p}/securityGroups/{id}`). Empty = the VM is open to the
  // rest of the VPC (default). Editable post-create via Add/RemoveVmFromSecurityGroup.
  repeated string security_groups = 33;
  // Whether this VM's datacenter is currently reachable from the control plane. Computed live at
  // Get/List time (not stored). When false, the datacenter is temporarily offline: `state` and the
  // other runtime-derived fields above are LAST-KNOWN (as of the last successful sync, not live),
  // and lifecycle actions are paused until it reconnects. Defaults true.
  bool datacenter_reachable = 34;
  // Unix seconds the VM's datacenter became unreachable (0 when reachable). Lets the UI show how
  // long the outage has lasted ("offline 3m").
  int64 datacenter_unreachable_since_unix = 35;
}

// ───────────────────────────── Declarative VM manifest ─────────────────────────────
// The customer-facing, CLI-and-web-shared create document (docs/specs/VM_DECLARATIVE_MANIFEST_AND_USERS.md).
// CreateVirtualMachine takes this directly; the web configures it and sends it, and (planned)
// `metalhost vm apply -f vm.yaml` deserializes YAML into the same message — one schema, the YAML
// is just its serialization. api_version/kind round-trip the YAML form; the server validates them
// when present but they carry no behavior (the RPC method already implies kind=VirtualMachine).
message VirtualMachineManifest {
  string api_version = 1; // "compute.metalhost.io/v1" (optional; validated when set)
  string kind = 2;        // "VirtualMachine" (optional; validated when set)
  VirtualMachineMetadata metadata = 3;
  VirtualMachineSpec spec = 4;
}

message VirtualMachineMetadata {
  // Hostname (DNS-1123 label, ≤63 chars). Empty → server defaults to the VM's resource id slug.
  string name = 1;
  // Owning project `projects/{slug}`. Empty → the principal's default project.
  string project = 2;
  // User-facing labels stamped at create time (filterable). `aes.metalhost/*` keys are reserved.
  map<string, string> labels = 3;
  // Operator notes / non-indexed metadata. Same `aes.metalhost/*` reservation.
  map<string, string> annotations = 4;
}

message VirtualMachineSpec {
  // Target datacenter `datacenters/{slug}`. Required.
  string region = 1;
  // Configurator shape. Required.
  VMComputeSpec compute = 2;
  // Boot source. Required (one of image / image_url / disk_name).
  VMBootSpec boot = 3;
  // Network attachment + public IP choice.
  VMNetworkSpec network = 4;
  // Login users created via cloud-init. Empty AND cloud_init empty → no inbound login (console
  // only). When cloud_init is set it OWNS user creation and users is ignored.
  repeated UserSpec users = 5;
  // Raw #cloud-config userdata. When set, replaces all generated cloud-init (users included).
  // Must be valid `#cloud-config` YAML.
  string cloud_init = 6;
  // Billing term. Defaults to HOURLY.
  VMBillingSpec billing = 7;
}

message VMComputeSpec {
  // CPU class — must have published pricing and capacity in the datacenter. Required.
  string cpu_class = 1;
  int32 vcpus = 2;   // required, validated against the RAM-per-vCPU ratio bounds
  int32 ram_gib = 3; // required
  // Optional whole-GPU passthrough. Omit for a CPU-only VM.
  GPUSpec gpu = 4;
}

message GPUSpec {
  string model = 1; // GPU model published in the chosen DC (e.g. "rtx4090")
  int32 count = 2;  // whole GPUs to attach (≥1)
}

message VMBootSpec {
  // Curated catalog image id (e.g. "ubuntu-24-04") — resolved server-side to an image URL +
  // the distro's default login user. Mutually exclusive with image_url/disk_name.
  string image = 1;
  // Raw streamable image URL — escape hatch for non-catalog images. Mutually exclusive with
  // image/disk_name.
  string image_url = 2;
  // Boot disk size GiB (1..1024). Required when image/image_url is set.
  int32 disk_gib = 3;
  // Bind a pre-existing Disk as boot instead of importing an image (`projects/{p}/disks/{id}`).
  // The disk must be AVAILABLE, same project+DC, unattached. Mutually exclusive with image/image_url.
  string disk_name = 4;
}

message VMNetworkSpec {
  // Tenant network `projects/{p}/networks/{id}`. Empty → the project's default network
  // (auto-created lazily on first VM in the project + DC).
  string network = 1;
  // Allocate a public IPv4 for the VM's public NIC (the scarce, billed extra). IPv6 comes
  // free on the public NIC regardless (see VirtualMachine.public_ipv6) unless private_only.
  // Default false.
  bool public_ipv4 = 2;
  // Internal security groups to attach to the VM's private NIC at create
  // (`organizations/{org}/projects/{p}/securityGroups/{id}`). Empty = open within the VPC.
  repeated string security_groups = 3;
  // private_only attaches NO public NIC at all — no public IPv4, no public IPv6, no inbound
  // internet surface. The VM still has outbound internet via the private NIC's NAT. Default
  // false: every VM gets a public NIC with a free IPv6 GUA. Use for air-gapped-ish workloads.
  bool private_only = 4;
}

message UserSpec {
  // Login name. `^[a-z_][a-z0-9_-]{0,31}$`, and not `root`. Required.
  string name = 1;
  // Optional plaintext password. Sent over TLS, hashed server-side ($6$ SHA-512 crypt) into the
  // cloud-init seed. NEVER persisted plaintext and never echoed back on Get/List. When any user
  // has a password, cloud-init `ssh_pwauth` is enabled; otherwise it stays disabled.
  string password = 2;
  // Grant passwordless sudo (ALL=(ALL) NOPASSWD:ALL).
  bool sudo = 3;
  // Registered SSHKey resource refs (`projects/{p}/ssh-keys/{id}`), merged into this user's
  // ssh_authorized_keys.
  repeated string ssh_keys = 4;
  // Inline OpenSSH public key(s), newline-separated. Merged after ssh_keys.
  string ssh_pubkey = 5;
}

message VMBillingSpec {
  // HOURLY (default) = per-hour usage. MONTHLY_* prepays the full term upfront at the tier discount.
  BillingMode mode = 1;
  // For MONTHLY_*: auto-renew at term end. Ignored when HOURLY.
  bool autorenew = 2;
}

// CreateVirtualMachineRequest wraps the declarative manifest — the manifest IS the request body.
// Internal control fields (clone source) never appear here: CloneVirtualMachine builds the create
// input in-process rather than through this message.
message CreateVirtualMachineRequest {
  VirtualMachineManifest manifest = 1;
}

// BootDiskSpec is the inline disk spec carried by CreateVirtualMachineRequest.boot_disk.
// from_image_url is required — empty source is rejected (every boot disk needs an OS
// image). The resulting Disk is owned by the same project as the VM and persists past
// DeleteVirtualMachine.
message BootDiskSpec {
  string display_name = 1;
  // 1..1024 GiB.
  int32 size_gib = 2;
  // Storage tier (`nvme`). Defaults to nvme.
  string storage_class = 3;
  // Streamable raw disk image URL. Required UNLESS clone_source_disk is set (clone path
  // supplies the data by snapshotting an existing disk instead).
  string from_image_url = 4;
  reserved 5, 6;
  reserved "from_image_name", "from_snapshot";
  map<string, string> labels = 7;
  map<string, string> annotations = 8;
  // Clone path: when set, this boot disk is created by copying the named source Disk rather
  // than importing from from_image_url. Set by CloneVirtualMachine; customers don't set this
  // directly. size_gib is derived from the source.
  string clone_source_disk = 9;
}

message CreateVirtualMachineResponse {
  // Set when provisioning is async: poll GetOperation until SUCCEEDED; metadata may include virtual_machine_name.
  aes.ops.v1.Operation operation = 1;
  // Set only for the synchronous create path.
  VirtualMachine virtual_machine = 2;
}

message GetVirtualMachineRequest {
  string name = 1;
}

message GetVirtualMachineResponse {
  VirtualMachine virtual_machine = 1;
}

message ListVirtualMachinesRequest {
  string project_name = 1;
  int32 page_size = 2;
  string page_token = 3;
}

message ListVirtualMachinesResponse {
  repeated VirtualMachine virtual_machines = 1;
  string next_page_token = 2;
}

message DeleteVirtualMachineRequest {
  // Resource name, e.g. `virtual-machines/{id}`.
  string name = 1;
  // Optimistic concurrency. Empty = unconditional delete; non-empty = require match against
  // current row's etag, else Aborted.
  string etag = 2;
  // When true, also delete the disks currently attached to this VM (boot + data) instead of
  // detaching them back to AVAILABLE. Disk-first default is false — disks outlive the VM so a
  // customer can rebuild onto the same boot disk. Set true to fully tear down the VM and
  // reclaim its storage in one action. Irreversible: the disk data is destroyed.
  bool delete_attached_disks = 3;
}

message DeleteVirtualMachineResponse {
  // Set when delete is async: poll GetOperation until SUCCEEDED.
  aes.ops.v1.Operation operation = 1;
}

message StartVirtualMachineRequest {
  string name = 1;
}

message StartVirtualMachineResponse {
  VirtualMachine virtual_machine = 1;
}

message StopVirtualMachineRequest {
  string name = 1;
}

message StopVirtualMachineResponse {
  VirtualMachine virtual_machine = 1;
}

message RestartVirtualMachineRequest {
  string name = 1;
}

message RestartVirtualMachineResponse {
  VirtualMachine virtual_machine = 1;
}

message ResizeVirtualMachineRequest {
  string name = 1;
  reserved 2;
  reserved "instance_type";
  // New configurator shape. All three required; the server rejects InvalidArgument if any is
  // unset (resize is not "patch one field" — it's a full re-shape so pricing + placement
  // recompute consistently). Same 1–16 GiB RAM-per-vCPU ratio bounds as Create.
  int32 vcpus = 3;
  int32 ram_gib = 4;
  // CPU class. Required — changing class is allowed but the datacenter must have capacity for
  // the new class or the VM won't restart.
  string cpu_class = 5;
}

message ResizeVirtualMachineResponse {
  // Set on the synchronous path.
  VirtualMachine virtual_machine = 1;
  // Set when the resize runs as a long-running Operation. Client polls GetOperation until
  // SUCCEEDED, then re-Gets the VM to see the new shape. The operation runs the full
  // stop → reshape → start sequence with retries so a mid-flight failure doesn't strand
  // the VM in STOPPED with the old shape.
  aes.ops.v1.Operation operation = 2;
}

message SetVMAutorenewRequest {
  string name = 1;
  bool autorenew = 2;
}

message SetVMAutorenewResponse {
  VirtualMachine virtual_machine = 1;
}

message RenewVMNowRequest {
  string name = 1;
}

message RenewVMNowResponse {
  VirtualMachine virtual_machine = 1;
  // The new vm_reservations row id, for traceability.
  string new_term_id = 2;
  // The wallet journal entry that recorded the prepayment.
  string journal_entry_id = 3;
  int64 charged_amount_minor = 4;
}

message ReimageVirtualMachineRequest {
  string name = 1;
  reserved 2;
  reserved "image_name";
  // Required: streamable raw disk image URL. Setting this is the canonical way to upgrade
  // the base OS (Ubuntu 24.04 → 26.04) without recreating the VM. Empty = reuse the original
  // boot source.
  string boot_image_url = 3;
  // Required confirmation token. Server returns the expected value on a first call and the
  // client echoes it back on the second to acknowledge data loss. Wire format: must equal
  // "REIMAGE/" + the VM name. Refusing this for headless flows is fine (operators set the
  // token directly), but UIs should round-trip it through a confirmation dialog.
  string confirmation_token = 4;
}

message ReimageVirtualMachineResponse {
  VirtualMachine virtual_machine = 1;
}

// ConsoleType picks which console the proxy bridges to.
enum ConsoleType {
  CONSOLE_TYPE_UNSPECIFIED = 0;
  // Serial console — line-buffered text, attaches to the VM's first virtio-serial port. Best
  // for headless debugging when the VM has emergency shell on tty.
  CONSOLE_TYPE_SERIAL = 1;
  // VNC framebuffer — full graphical console. Client must speak the VNC protocol over the
  // returned WebSocket (e.g. noVNC).
  CONSOLE_TYPE_VNC = 2;
}

message OpenConsoleRequest {
  string name = 1;
  // Defaults to SERIAL when unset.
  ConsoleType type = 2;
}

message OpenConsoleResponse {
  // Relative path the client opens via WebSocket on the Metalhost public endpoint
  // (e.g. wss://metalhost/v1/console/<token>). The server validates the token and bridges to
  // the VM's console privately.
  string websocket_path = 1;
  // One-shot token embedded in the websocket_path. Single-use, scoped to (vm, console_type),
  // expires at expires_at_unix.
  string token = 2;
  int64 expires_at_unix = 3;
}

// MachineImage is a registered URL pointing at a streamable raw disk image. Resource name:
// `projects/{project}/images/{image_id}`. Day-1 images are external URLs (S3/GCS/operator
// HTTP); a managed upload endpoint is a future story.
// VmSnapshot is a point-in-time copy of a VM (definition + every disk). State machine:
// CREATING → READY → DELETING → DELETED. Survives source VM deletion (the snapshot row is
// independent).
message VmSnapshot {
  // Resource name `projects/{project}/vm-snapshots/{id}`.
  string name = 1;
  string display_name = 2;
  string project_name = 3;
  string datacenter_name = 4;
  // Resource name of the source VM at snapshot creation time.
  string source_vm = 5;
  // Sum of disk sizes at snapshot time (used for billing units).
  int32 size_gib = 6;
  // CREATING / READY / DELETING / DELETED.
  string state = 7;
  int64 create_time_unix = 8;
  int64 update_time_unix = 9;
  map<string, string> labels = 10;
  map<string, string> annotations = 11;
  // ────────────── Live cost fields (computed at Get/List-time, not persisted) ──
  // Hourly rate this snapshot accrues against the wallet at current pricing
  // (size_gib × the snapshot storage unit price).
  // NUMERIC text so fractional cents survive the wire (a 40 GiB backup costs
  // ~0.55 cents per hour — int64 would round to 1 and overstate by ~80%).
  // Zero ("0") when rates aren't seeded or the snapshot is in a non-billing
  // state (DELETED, etc.); empty ("") only when the field is uninitialised.
  string current_cost_per_hour_minor_decimal = 12;
  // Convenience: monthly rate at 730 hours/month. Same precision rules; the
  // SPA displays this directly so the customer doesn't have to multiply.
  string monthly_cost_minor_decimal = 13;
}

message SnapshotVirtualMachineRequest {
  // VM to snapshot (`virtual-machines/{id}`). Can be RUNNING or STOPPED — both are supported
  // (running snapshots are crash-consistent).
  string vm_name = 1;
  string display_name = 2;
  map<string, string> labels = 3;
  map<string, string> annotations = 4;
}

message SnapshotVirtualMachineResponse {
  VmSnapshot snapshot = 1;
}

message GetVmSnapshotRequest {
  string name = 1;
}

message GetVmSnapshotResponse {
  VmSnapshot snapshot = 1;
}

message ListVmSnapshotsRequest {
  string project_name = 1;
  // Optional: filter to snapshots taken from this VM.
  string source_vm = 2;
  int32 page_size = 3;
  string page_token = 4;
}

message ListVmSnapshotsResponse {
  repeated VmSnapshot vm_snapshots = 1;
  string next_page_token = 2;
}

message DeleteVmSnapshotRequest {
  string name = 1;
}

message DeleteVmSnapshotResponse {}

message ListVMUtilizationRequest {
  string project_name = 1;
}

message VMUtilization {
  string virtual_machine_name = 1;
  // 0-100, normalized to the VM's vCPU count.
  double cpu_pct = 2;
  // 0-100 of guest-visible memory in use.
  double mem_pct = 3;
  // 0-100 averaged across the VM's GPUs. 0 for CPU-only VMs or when GPU telemetry
  // isn't reporting.
  double gpu_pct = 4;
  // Consecutive days the VM has stayed under the idle threshold (CPU and, when present,
  // GPU averaging below 10%). 0 = active. Stopping idle workloads is the dashboard's
  // first cost-hygiene suggestion.
  int32 idle_days = 5;
}

message ListVMUtilizationResponse {
  repeated VMUtilization vms = 1;
  // false when utilization telemetry is temporarily unavailable for the project's region —
  // render shapes without bars rather than zeros.
  bool available = 2;
  int64 polled_at_unix = 3;
}

message GetVMMetricsRequest {
  string name = 1;
  // Unix seconds; required. Bounds the metrics window.
  int64 start_time_unix = 2;
  int64 end_time_unix = 3;
  // Step in seconds. Default 60. Max 3600 (1h). Smaller = denser series.
  int32 step_seconds = 4;
}

message MetricSample {
  int64 timestamp_unix = 1;
  double value = 2;
}

message MetricSeries {
  // 'cpu_utilization_pct' | 'memory_used_bytes' | 'disk_read_bps' | 'disk_write_bps' |
  // 'net_rx_bps' | 'net_tx_bps'.
  string metric = 1;
  repeated MetricSample samples = 2;
}

message GetVMMetricsResponse {
  repeated MetricSeries series = 1;
}

message CloneVirtualMachineRequest {
  // Source VM resource name to clone from.
  string source_vm_name = 1;
  // Display name for the new VM. Required so the customer can distinguish the clone in
  // listings — the resource name itself is server-assigned.
  string target_display_name = 2;
  reserved 3;
  reserved "instance_type";
  // Labels/annotations applied to the new VM (NOT inherited from the source — clone is for
  // disk state, not metadata).
  map<string, string> labels = 4;
  map<string, string> annotations = 5;
}

message CloneVirtualMachineResponse {
  VirtualMachine virtual_machine = 1;
  // The intermediate snapshot the clone was taken from. Useful for retry / audit; the
  // customer can reuse it to clone again or roll back.
  string vm_snapshot_name = 2;
  // When async provisioning is configured, the long-running operation tracking the clone.
  // Empty in sync mode.
  aes.ops.v1.Operation operation = 3;
}

message CreateVirtualMachineFromBackupRequest {
  // VmSnapshot to materialize from (`projects/{p}/vm-snapshots/{id}`). Must be READY.
  string vm_snapshot_name = 1;
  // Display name + hostname for the new VM. Display name is required; hostname falls back
  // to a sanitised version of the display name when empty.
  string target_display_name = 2;
  string hostname = 3;
  reserved 4;
  reserved "instance_type";
  // Configurator shape override. When unset (any of the three), the server inherits the
  // source VM's shape for the unset components.
  int32 vcpus = 5;
  int32 ram_gib = 6;
  string cpu_class = 7;
  // Same lifecycle / billing knobs as CreateVirtualMachine.
  BillingMode billing_mode = 8;
  bool autorenew = 9;
  bool assign_public_ipv4 = 10;
  repeated string ssh_key_names = 11;
  string user_data = 12;
  reserved 13;
  reserved "user_data_snippet_names";
  // Labels/annotations applied to the new VM (NOT inherited — same posture as Clone).
  map<string, string> labels = 14;
  map<string, string> annotations = 15;
}

message CreateVirtualMachineFromBackupResponse {
  VirtualMachine virtual_machine = 1;
  // Reserved for a future implementation that materialises an intermediate DiskSnapshot row
  // for the cloned boot disk. Today the server uses an internal storage path that bypasses
  // the public DiskSnapshot model, so this field is always empty. Kept on the wire so a later
  // implementation can populate it without a proto change.
  string disk_snapshot_name = 2;
  // When async provisioning is configured, the long-running operation. Empty in sync mode.
  aes.ops.v1.Operation operation = 3;
}

