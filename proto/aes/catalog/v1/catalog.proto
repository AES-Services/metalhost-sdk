syntax = "proto3";

package aes.catalog.v1;

// CatalogService exposes datacenters, capacity, and pricing.
service CatalogService {
  rpc ListDatacenters(ListDatacentersRequest) returns (ListDatacentersResponse);
  // GetRegionHealth returns capacity + degraded-component summary for a single DC. Customers
  // call this before provisioning to avoid landing in a full or sick region.
  rpc GetRegionHealth(GetRegionHealthRequest) returns (GetRegionHealthResponse);
  // ListMaintenanceWindows returns scheduled or active maintenance windows across DCs. Tags
  // affected resource kinds so callers know whether their workloads are at risk.
  rpc ListMaintenanceWindows(ListMaintenanceWindowsRequest) returns (ListMaintenanceWindowsResponse);

  // QuoteVirtualMachine returns the server-authoritative hourly + per-term prices for a
  // configured VM shape. Frontend uses this on Submit to confirm the price the customer
  // is committing to (defends against stale cached pricing). Returns ALL four monthly
  // term lengths in one call so the frontend can render the discount table without four
  // round-trips. Same shape as the validation done by ChargeMonthlyPrepayment, so a
  // successful Quote means a subsequent CreateVM at the same shape will charge exactly
  // the quoted amount.
  rpc QuoteVirtualMachine(QuoteVirtualMachineRequest) returns (QuoteVirtualMachineResponse);
  // GetVMCapacity returns per-datacenter VM capacity in sellable units, broken down by CPU class
  // and GPU model. Public + unauthenticated — capacity is non-sensitive catalog data (same
  // posture as GetRegionHealth).
  rpc GetVMCapacity(GetVMCapacityRequest) returns (GetVMCapacityResponse);
}

message GetVMCapacityRequest {
  // Optional filter to one datacenter. Empty = all READY/DEGRADED DCs.
  string datacenter_name = 1;
}

// GpuModelCapacity is the whole-GPU availability for one GPU model within a pool.
message GpuModelCapacity {
  string gpu_model = 1;       // e.g. "h100"
  int32 total = 2;            // allocatable GPUs of this model in the pool
  int32 free = 3;             // currently unleased
  // Operator-set per-GPU reservation kept free for an unsold GPU (physical units). Informational.
  int64 reserve_vcpu = 4;
  int64 reserve_ram_gib = 5;
  // Largest single VM (vCPU / RAM, oversubscribe-adjusted) that can schedule on the most-free node
  // currently holding a free GPU of this model — RAW node free, BEFORE the reservation kept for the
  // node's other unsold GPUs. A GPU VM lands on ONE node, so this — not the pool sum — bounds how
  // big a GPU VM can be. 0 when the live probe is unavailable.
  int64 max_node_free_vcpu = 6;
  int64 max_node_free_ram_gib = 7;
  // Free GPUs of this model on that same representative node. The configurator subtracts
  // reserve_* × (max_node_free_gpus − requested_count) from the raw node free above, so renting MORE
  // GPUs frees the reservation held for the node's remaining GPUs (more CPU/RAM for the VM).
  int32 max_node_free_gpus = 8;
}

// VMClassCapacity is the sellable capacity of one pool = (datacenter, cpu_class).
message VMClassCapacity {
  string cpu_class = 1;       // e.g. "cascadelake", "genoa"
  int64 sellable_vcpu = 2;
  int64 free_vcpu = 3;
  int64 sellable_ram_gib = 4;
  int64 free_ram_gib = 5;
  // Most-utilized dimension (cpu/ram/gpu) as 0..100 — a pool is "full" when this hits 100 even if
  // another dimension has headroom (binding-resource rule).
  int32 capacity_pct = 6;
  // GPU availability per model in this pool (empty for non-GPU pools).
  repeated GpuModelCapacity gpus = 7;
  // Largest single CPU VM (vCPU / RAM, oversubscribe-adjusted) that can schedule on this class's
  // most-free node. A VM lands on ONE node, so this bounds the configurator sliders — the pool
  // sum (free_vcpu/free_ram_gib) can be admitted but then stay Pending if no single node fits.
  // 0 when the live probe is unavailable.
  int64 max_node_free_vcpu = 8;
  int64 max_node_free_ram_gib = 9;
}

// DatacenterVMCapacity rolls the pool breakdown up to the datacenter. The rollup fields (4-8) are
// the sum across by_cpu_class; simple consumers can read those and ignore the breakdown.
message DatacenterVMCapacity {
  string datacenter_name = 1;
  string status = 2;          // READY / DEGRADED
  int32 capacity_pct = 3;     // max across classes
  int64 sellable_vcpu = 4;
  int64 free_vcpu = 5;
  int64 sellable_ram_gib = 6;
  int64 free_ram_gib = 7;
  int64 storage_free_gib = 8;
  repeated VMClassCapacity by_cpu_class = 9;
}

message GetVMCapacityResponse {
  repeated DatacenterVMCapacity datacenters = 1;
}

// Datacenter lifecycle.
enum DatacenterState {
  DATACENTER_STATE_UNSPECIFIED = 0;
  DATACENTER_STATE_PLANNED = 1;
  DATACENTER_STATE_PROVISIONING = 2;
  DATACENTER_STATE_READY = 3;
  DATACENTER_STATE_DEGRADED = 4;
  DATACENTER_STATE_DEPROVISIONING = 5;
  DATACENTER_STATE_RETIRED = 6;
}

message Datacenter {
  // Resource name, e.g. `datacenters/us-dal-1`.
  string name = 1;
  string display_name = 2;
  DatacenterState state = 3;
  // Reserved: was `string site_id = 4`, dropped pre-launch. Field tag retired so a future
  // repurpose doesn't accidentally inherit the old semantics.
  reserved 4;
  reserved "site_id";
  // Operator-visible control-plane endpoint for the datacenter.
  string kubernetes_api_endpoint = 5;
  map<string, string> labels = 6;
  map<string, string> annotations = 7;
  string kubernetes_version = 8;
  string kubevirt_version = 9;
  // Opaque summary JSON or text for health snapshots.
  string health_summary = 10;
  // ────────────── Capacity (populated by ListDatacenters / GetDatacenter) ──────────────
  // capacity_pct: % of usable VM CPU capacity currently allocated (0..100). Same number
  // GetRegionHealth returns. Allows the VM-create UI to dim a region or surface a "near
  // capacity" badge without a second round-trip. 0 means empty (or unmeasurable); 100 means
  // no more VMs can be scheduled until something stops. Zero when the DC isn't READY/DEGRADED
  // (e.g. PROVISIONING DCs report 0).
  int32 capacity_pct = 11;
}

message ListDatacentersRequest {
  int32 page_size = 1;
  string page_token = 2;
  // Reserved for CEL / simple filters (Phase 0: ignored).
  string filter = 3;
}

message ListDatacentersResponse {
  repeated Datacenter datacenters = 1;
  string next_page_token = 2;
}

// RegionHealth is the customer-visible summary of a DC's current state. capacity_pct is the
// % of compute hosts currently allocated (0..100); status is the DC's `state` mapped to a
// human-friendly summary; degraded_components lists subsystems with non-OK status.
message RegionHealth {
  string datacenter_name = 1;
  string status = 2;
  int32 capacity_pct = 3;
  repeated string degraded_components = 4;
  string health_summary = 5;
  int64 last_updated_unix = 6;
  // Field 7 (vm_cpu_oversubscribe_ratio) intentionally removed: oversubscription is an
  // internal packing detail, not a customer concept. Customers see vm_sellable_vcpu as the
  // plain "total vCPU" (it already bakes in the ratio).
  reserved 7;
  reserved "vm_cpu_oversubscribe_ratio";
  // VM CPU capacity. sellable = total vCPU a customer can buy; running = in use;
  // free = available. Presented to customers as plain vCPU counts.
  int64 vm_sellable_vcpu = 8;
  int64 vm_running_vcpu = 9;
  int64 vm_free_vcpu = 10;
  // VM RAM capacity. sellable = total RAM a customer can buy; running = Σ ram_gib of
  // RUNNING VMs; free = headroom.
  int64 vm_sellable_ram_gib = 11;
  int64 vm_running_ram_gib = 12;
  int64 vm_free_ram_gib = 13;
  // Block storage capacity (post-replication usable). usable = total after replication;
  // free = available. Zero when the datacenter has no storage capacity data (stale/unavailable).
  int64 storage_usable_gib = 14;
  int64 storage_free_gib = 15;
  // Whether this region's control plane is currently reachable. When false the region is
  // temporarily offline: new VM creates are paused and capacity figures are last-known.
  // Defaults true.
  bool reachable = 16;
  // Unix seconds the region became unreachable (0 when reachable).
  int64 unreachable_since_unix = 17;
}

message GetRegionHealthRequest {
  string datacenter_name = 1;
}

message GetRegionHealthResponse {
  RegionHealth health = 1;
}

message MaintenanceWindow {
  string name = 1;
  string datacenter_name = 2;
  int64 start_time_unix = 3;
  int64 end_time_unix = 4;
  string description = 5;
  // Resource kinds affected: e.g. "compute" / "storage" / "network".
  repeated string affected_components = 6;
  // 'SCHEDULED' | 'ACTIVE' | 'COMPLETED' | 'CANCELLED'.
  string status = 7;
}

message ListMaintenanceWindowsRequest {
  // Optional DC filter; empty = all DCs.
  string datacenter_name = 1;
  // When true, only windows whose end_time is in the future. Default false (returns history too).
  bool active_only = 2;
  int32 page_size = 3;
  string page_token = 4;
}

message ListMaintenanceWindowsResponse {
  repeated MaintenanceWindow maintenance_windows = 1;
  string next_page_token = 2;
}

message QuoteVirtualMachineRequest {
  // Same fields as CreateVirtualMachineRequest's configurator slice. Validated under the
  // same 1–16 GiB-per-vCPU ratio bounds; an out-of-range shape returns InvalidArgument.
  int32 vcpus = 1;
  int32 ram_gib = 2;
  string cpu_class = 3;
  int32 boot_disk_gib = 4;
  int32 extra_disk_gib = 5;
  int32 public_ipv4_count = 6;
  string currency = 7;           // default USD
  // Whole-GPU passthrough. gpu_model is the SKU variant (e.g. "rtx4090"), gpu_count the number of
  // cards; priced via compute.gpu.<model>.runtime_hours. Empty/0 = CPU-only quote.
  string gpu_model = 8;
  int32 gpu_count = 9;
}

message QuoteVirtualMachineResponse {
  // ROUND-to-int64 view for clients that don't want to parse decimals. For shapes whose
  // hourly cost is sub-cent (typical for small configurator VMs at $2.50/vCPU-month) this
  // rounds — use hourly_minor_decimal for the exact NUMERIC.
  int64 hourly_minor = 1;
  // Per-term prepayment totals for each MONTHLY_* tier, in minor units. Discount applied:
  // MONTHLY_1 = 0%, MONTHLY_3 = 5%, MONTHLY_6 = 8%, MONTHLY_12 = 12%. Calculated as
  // hourly × 730 hours × months × (1 - discount/100), rounded once at the end.
  int64 monthly_1_minor = 2;
  int64 monthly_3_minor = 3;
  int64 monthly_6_minor = 4;
  int64 monthly_12_minor = 5;
  string currency = 6;
  // Exact NUMERIC text values mirroring the int64 fields above (1.0 = 1 cent, 6 decimals
  // of sub-cent precision). Clients that need to compose further math (display hourly,
  // pro-rate by elapsed seconds, etc.) should consume these instead of the rounded int64s.
  string hourly_minor_decimal = 7;
  string monthly_1_minor_decimal = 8;
  string monthly_3_minor_decimal = 9;
  string monthly_6_minor_decimal = 10;
  string monthly_12_minor_decimal = 11;
}
