syntax = "proto3";

package aes.network.v1;

// NetworkService manages tenant-facing networks backed by OVN-Kubernetes
// UserDefinedNetwork (UDN) resources for tenant-private connectivity. Each Network maps to a
// tenant network namespace. VM public connectivity is delivered via the public NIC model.
//
// Ripped in the v1 audit:
//   - GetServiceMetadata: bootstrap-era stub-status probe; dead.
//   - GetNetwork / DeleteNetwork: 1-network-per-project invariant pre-launch — list covers
//     reads, no UI delete.
//   - GetPublicIp / ListPublicIps / ReleasePublicIp: no customer IP-management surface;
//     VM provision / delete workflows manage public_ips rows directly.
//   - AllocatePublicIp: previously customer-callable, now internal-only. Allocation alone
//     is a footgun — the IP row gets billed but the VM has no public NIC unless the
//     allocation runs *during* vm_provision (KubeVirt 1.8 can't hot-add NICs). Customers
//     opt into a public IP at VM-create time via `assign_public_ipv4`; post-create
//     attach isn't supported and the customer-facing copy says so.
//   - GetFirewallRule / GetLoadBalancer: single-resource Get is redundant with List.
//   - CreateLoadBalancer / ListLoadBalancers / UpdateLoadBalancer / DeleteLoadBalancer:
//     LB UX needs a redesign and 1-VM-customers don't need it at launch. Bring back in v2.
//
// Firewall RPCs back the OVN ACL set on the public-vlan50 localnet switch — NetworkPolicy
// (the original backing) only filters east-west on the pod's primary CNI, leaving the
// public NIC unfiltered.
service NetworkService {
  rpc CreateNetwork(CreateNetworkRequest) returns (CreateNetworkResponse);
  rpc ListNetworks(ListNetworksRequest) returns (ListNetworksResponse);
  // CreateFirewallRule programs OVN ACLs on the public-vlan50 logical switch scoped to the
  // VM's public IP, permitting the listed ingress ports from the listed source CIDRs.
  // Egress is unrestricted (blocking it breaks cloud-init / package installs / DNS).
  // Multi-port rules expand server-side into one ACL per (port, source) leaf.
  rpc CreateFirewallRule(CreateFirewallRuleRequest) returns (CreateFirewallRuleResponse);
  rpc ListFirewallRules(ListFirewallRulesRequest) returns (ListFirewallRulesResponse);
  rpc DeleteFirewallRule(DeleteFirewallRuleRequest) returns (DeleteFirewallRuleResponse);

  // DNS and managed-zone APIs were removed: Metalhost does not manage DNS as a control-plane
  // concern. Customers bring their own DNS (Route53, Cloudflare, self-hosted, etc.) and point
  // records at the public IPs Metalhost allocates.
  //
  // Router APIs were removed: Metalhost does not expose router resources. Per-DC edge routers
  // remain physical hardware but are out-of-band managed (vendor tooling / operator SSH), not
  // surfaced via metalhostd RPCs.
}

// AdminNetworkService — moved to `aes.admin.v1` so the central admin RBAC middleware
// (path-match on `/aes.admin.v1.Admin*Service/*`) gates it like every other admin service.
// See proto/aes/admin/v1/admin.proto for the canonical definition.

// Network is a tenant-owned L2 logical switch within a single datacenter, backed by an
// OVN-Kubernetes UserDefinedNetwork (UDN). Resource name format:
// `projects/{project}/networks/{network_id}`.
//
// Issue #11 redesign: networks are no longer Multus NADs. The platform allocates an IPv6
// /64 from the DC's tenant prefix (always) and an IPv4 /24 from the DC's RFC1918 supernet
// (when requested), then creates a UDN that OVN-K reconciles into a logical switch with
// IPAM. VLAN IDs are an internal implementation detail (Geneve VNIs handle isolation), no
// longer customer-visible.
message Network {
  string name = 1;
  string display_name = 2;
  string project_name = 3;
  string datacenter_name = 4;
  // Reserved — was the customer-facing VLAN tag in the Multus design. Issue #11 removes
  // this; OVN-K Geneve overlay handles tenant isolation transparently with a 24-bit VNI
  // namespace (16M segments) instead of 802.1Q's 4094-tag ceiling.
  reserved 5;
  reserved "vlan_id";
  // IPv4 subnet CIDR allocated from the DC's `aes.metalhost/ipv4-tenant-prefix` (RFC1918
  // class-A or class-B supernet). Empty when the network is IPv6-only. Always a /24 in v1.
  string subnet_cidr_v4 = 6;
  // IPv6 subnet CIDR allocated from the DC's `aes.metalhost/ipv6-tenant-prefix` (the org's
  // /48). Always a /64. Public-routable, no NAT — IPv6 is native.
  string subnet_cidr_v6 = 7;
  // Whereabouts allocation range (inclusive). Empty = the full subnet is allocatable.
  string ip_range_start = 8;
  string ip_range_end = 9;
  int64 create_time_unix = 10;
  int64 update_time_unix = 11;
  map<string, string> labels = 12;
  map<string, string> annotations = 13;
  // "creating" while the UDN reconciler is in flight; "active" when the OVN-K UDN status
  // is Ready; "failed" on reconciler error; "deleting" / "deleted" during GC. Read-only.
  string state = 14;
  // Name of the OVN-K UserDefinedNetwork CR backing this Network. Output-only. Format
  // `udn-<network_id>` — the slug after `udn-` matches the network_id slug for ease of
  // operator inspection.
  string ovn_udn_name = 15;
  // K8s namespace where the UDN CR + the VMs attached to this Network live. Output-only.
  // Format `net-<network_id>`. Each Network is its own namespace because OVN-K only allows
  // one Primary UDN per namespace — VMs in the same Network share the namespace and can
  // talk over the network's /24 + /64; VMs in different Networks are fully isolated.
  string namespace = 16;
}

message CreateNetworkRequest {
  // Required project name. Full resource form `projects/{slug}` (slug-only also accepted).
  string project_name = 1;  // Full resource name `projects/{slug}` (B38). Slug-only is also accepted.
  // Optional network ID. When empty the server mints a UUIDv7-based slug. Resulting resource
  // name is `projects/{project_slug}/networks/{network_id}`.
  string network_id = 2;
  string display_name = 3;
  string datacenter_name = 4;
  // Reserved — was the customer-supplied VLAN tag. Issue #11 removes this from the API.
  reserved 5;
  reserved "vlan_id";
  // Optional preferred IPv4 CIDR. When empty the platform allocates a /24 from the DC's
  // tenant prefix. When set, the platform may reject if the CIDR is not within the DC's
  // tenant prefix or collides with another network in the same DC. Always a /24 in v1.
  string subnet_cidr_v4 = 6;
  // Reserved — IPv6 subnet is always platform-allocated from the DC's /48 in v1. Customer-
  // supplied IPv6 CIDR may be added in a future revision.
  reserved 7;
  reserved "subnet_cidr_v6";
  string ip_range_start = 8;
  string ip_range_end = 9;
  map<string, string> labels = 10;
  map<string, string> annotations = 11;
}

message CreateNetworkResponse {
  Network network = 1;
}

message ListNetworksRequest {
  // Filter to a single project. Required for now (cross-project list is admin-only / future).
  string project_name = 1;  // Full resource name `projects/{slug}` (B38). Slug-only is also accepted.
  int32 page_size = 2;
  string page_token = 3;
}

message ListNetworksResponse {
  repeated Network networks = 1;
  string next_page_token = 2;
}

// PortMapping describes a single port or a contiguous port range to expose. ProtocolL4 is
// "TCP" or "UDP".
//
// Range semantics (firewall rules): when `end_port` is 0/unset the mapping covers the single
// `port`. When `end_port > 0` it must satisfy `port <= end_port` and the mapping covers
// every port in [port, end_port] inclusive — backend installs one OVN ACL with a range match
// (`tcp.dst >= port && tcp.dst <= end_port`) rather than expanding to N single-port ACLs.
// Useful for k8s NodePort (30000-32767), RTMP/SIP, or any service that listens on a window.
message PortMapping {
  // External port (the one customers connect to), or the lower bound of a range. 1..65535.
  int32 port = 1;
  // L4 protocol: TCP or UDP.
  string protocol = 2;
  // Internal port on the VM (where the service listens). Defaults to `port` when 0. Ignored
  // on firewall rules — applies only to PublicIp port-forwarding (which we don't currently
  // surface via the customer RPCs, but the field stays for the SDK and future LB work).
  int32 target_port = 3;
  // Upper bound of the port range. 0 (default) = single port; otherwise must be >= port and
  // <= 65535.
  int32 end_port = 4;
}

// PublicIp is a customer-allocated external IP routing to a VM.
// PublicIp is a customer-allocated public IPv4 reserved for a tenant VM from the DC's
// `aes.metalhost/public-ipv4-pool`.
message PublicIp {
  // Resource name `projects/{project}/public-ips/{id}`.
  string name = 1;
  string display_name = 2;
  string project_name = 3;
  string datacenter_name = 4;
  // VM the IP routes to (`virtual-machines/{id}`).
  string target_vm = 5;
  // The assigned address. Empty string while ALLOCATING.
  string ip_address = 6;
  // ALLOCATING / ACTIVE / DELETING / DELETED.
  string state = 7;
  repeated PortMapping ports = 8;
  int64 create_time_unix = 9;
  int64 update_time_unix = 10;
  map<string, string> labels = 11;
  map<string, string> annotations = 12;
}

// FirewallRule is one allow-list rule for a VM. Backed by a NetworkPolicy. Multiple rules on
// the same VM compose additively (NetworkPolicies union). direction='ingress' uses sources +
// ports as the allow set; direction='egress' uses destinations + ports.
message FirewallRule {
  // Resource name `projects/{project}/firewall-rules/{id}`.
  string name = 1;
  string display_name = 2;
  string project_name = 3;
  string datacenter_name = 4;
  // VM the rule applies to (`virtual-machines/{id}`).
  string target_vm = 5;
  // ACTIVE / DELETED.
  string state = 6;
  repeated PortMapping ports = 7;
  // Source CIDRs allowed to reach the listed ports (e.g. ["0.0.0.0/0"], ["10.0.0.0/8"]).
  // Empty list = allow from anywhere. Ingress only.
  repeated string sources = 8;
  int64 create_time_unix = 9;
  int64 update_time_unix = 10;
  map<string, string> labels = 11;
  map<string, string> annotations = 12;
  // 'ingress' (default) | 'egress'. Egress rules use destinations instead of sources.
  string direction = 13;
  // Destination CIDRs the VM is allowed to reach (egress only).
  repeated string destinations = 14;
  // is_default marks the baseline rules seeded automatically when a VM is provisioned with a
  // public IP (SSH/HTTP/HTTPS open to 0.0.0.0/0). Customer-created rules leave it false. UI
  // uses it to render a "default" badge + a stronger delete confirmation.
  bool is_default = 15;
}

message CreateFirewallRuleRequest {
  string project_name = 1;
  string datacenter_name = 2;
  string target_vm = 3;
  repeated PortMapping ports = 4;
  repeated string sources = 5;
  string display_name = 6;
  map<string, string> labels = 7;
  map<string, string> annotations = 8;
  string direction = 11;
  repeated string destinations = 12;
}

message CreateFirewallRuleResponse {
  FirewallRule rule = 1;
}

message ListFirewallRulesRequest {
  string project_name = 1;
  // Optional: filter to rules on this VM.
  string target_vm = 2;
  int32 page_size = 3;
  string page_token = 4;
}

message ListFirewallRulesResponse {
  repeated FirewallRule firewall_rules = 1;
  string next_page_token = 2;
}

message DeleteFirewallRuleRequest {
  string name = 1;
}

message DeleteFirewallRuleResponse {}

// AddressPool / IPAM messages moved to `aes.admin.v1` alongside AdminNetworkService.
// See proto/aes/admin/v1/admin.proto.
