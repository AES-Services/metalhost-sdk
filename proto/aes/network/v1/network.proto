syntax = "proto3";

package aes.network.v1;

// NetworkService manages tenant-facing networks for tenant-private connectivity. Each Network
// is an isolated L2 segment in a single datacenter. VM public connectivity is delivered via
// the public NIC model.
//
// Public IPs are opted into at VM-create time via `assign_public_ipv4`; standalone allocation
// and post-create attach aren't supported. Load balancer APIs are deferred to a future release.
service NetworkService {
  rpc CreateNetwork(CreateNetworkRequest) returns (CreateNetworkResponse);
  rpc ListNetworks(ListNetworksRequest) returns (ListNetworksResponse);
  // CreateFirewallRule opens the listed ingress ports on the VM's public IP from the listed
  // source CIDRs. Egress is unrestricted (blocking it breaks cloud-init / package installs / DNS).
  rpc CreateFirewallRule(CreateFirewallRuleRequest) returns (CreateFirewallRuleResponse);
  rpc ListFirewallRules(ListFirewallRulesRequest) returns (ListFirewallRulesResponse);
  rpc DeleteFirewallRule(DeleteFirewallRuleRequest) returns (DeleteFirewallRuleResponse);

  // Security groups — INTERNAL (east-west) network policy on the private NIC, distinct from
  // the public firewall above. A group is a reusable ruleset attached to >=0 VMs; rules allow
  // traffic from/to a CIDR or another security group. VMs talk freely by default — attaching
  // a group locks that VM down to its rules.
  rpc CreateSecurityGroup(CreateSecurityGroupRequest) returns (CreateSecurityGroupResponse);
  rpc GetSecurityGroup(GetSecurityGroupRequest) returns (GetSecurityGroupResponse);
  rpc ListSecurityGroups(ListSecurityGroupsRequest) returns (ListSecurityGroupsResponse);
  rpc UpdateSecurityGroup(UpdateSecurityGroupRequest) returns (UpdateSecurityGroupResponse);
  rpc DeleteSecurityGroup(DeleteSecurityGroupRequest) returns (DeleteSecurityGroupResponse);
  // Membership is editable post-provision (no VM restart — only ACLs/address-sets change).
  rpc AddVmToSecurityGroup(AddVmToSecurityGroupRequest) returns (AddVmToSecurityGroupResponse);
  rpc RemoveVmFromSecurityGroup(RemoveVmFromSecurityGroupRequest) returns (RemoveVmFromSecurityGroupResponse);

  // DNS and managed-zone APIs are not offered: Metalhost does not manage DNS as a control-plane
  // concern. Customers bring their own DNS (Route53, Cloudflare, self-hosted, etc.) and point
  // records at the public IPs Metalhost allocates.
  //
  // Router resources are not exposed; edge routing is managed by Metalhost.
}

// Network is a tenant-owned, isolated L2 segment within a single datacenter. Resource name
// format: `projects/{project}/networks/{network_id}`.
//
// The platform allocates an IPv6 /64 from the datacenter's tenant prefix (always) and an
// IPv4 /24 from the datacenter's private supernet (when requested). VLAN IDs are an internal
// detail and are not customer-visible.
message Network {
  string name = 1;
  string display_name = 2;
  string project_name = 3;
  string datacenter_name = 4;
  // Reserved — was the customer-facing VLAN tag. Removed; tenant isolation is handled
  // transparently by the platform and no longer surfaces a VLAN id.
  reserved 5;
  reserved "vlan_id";
  // IPv4 subnet CIDR allocated from the datacenter's private tenant prefix. Empty when the
  // network is IPv6-only. Always a /24 in v1.
  string subnet_cidr_v4 = 6;
  // IPv6 subnet CIDR allocated from the datacenter's tenant prefix. Always a /64.
  // Public-routable, no NAT — IPv6 is native.
  string subnet_cidr_v6 = 7;
  // IP allocation range (inclusive). Empty = the full subnet is allocatable.
  string ip_range_start = 8;
  string ip_range_end = 9;
  int64 create_time_unix = 10;
  int64 update_time_unix = 11;
  map<string, string> labels = 12;
  map<string, string> annotations = 13;
  // "creating" while the network is being provisioned; "active" when ready; "failed" on
  // error; "deleting" / "deleted" during teardown. Read-only.
  string state = 14;
  // Internal identifier for the backing network resource. Output-only; opaque to clients.
  string ovn_udn_name = 15;
  // Internal network-segment identifier this Network's VMs live in. Output-only. VMs in the
  // same Network can talk over the network's /24 + /64; VMs in different Networks are fully
  // isolated.
  string namespace = 16;
}

message CreateNetworkRequest {
  // Required project name. Full resource form `projects/{slug}` (slug-only also accepted).
  string project_name = 1;  // Full resource name `projects/{slug}`. Slug-only is also accepted.
  // Optional network ID. When empty the server mints a UUIDv7-based slug. Resulting resource
  // name is `projects/{project_slug}/networks/{network_id}`.
  string network_id = 2;
  string display_name = 3;
  string datacenter_name = 4;
  // Reserved — was the customer-supplied VLAN tag. Removed from the API.
  reserved 5;
  reserved "vlan_id";
  // Optional preferred IPv4 CIDR. When empty the platform allocates a /24 from the datacenter's
  // tenant prefix. When set, the platform may reject if the CIDR is not within the datacenter's
  // tenant prefix or collides with another network in the same datacenter. Always a /24 in v1.
  string subnet_cidr_v4 = 6;
  // Reserved — IPv6 subnet is always platform-allocated from the datacenter's tenant prefix in
  // v1. Customer-supplied IPv6 CIDR may be added in a future revision.
  reserved 7;
  reserved "subnet_cidr_v6";
  string ip_range_start = 8;
  string ip_range_end = 9;
  map<string, string> labels = 10;
  map<string, string> annotations = 11;
}

message CreateNetworkResponse {
  Network network = 1;
}

message ListNetworksRequest {
  // Filter to a single project. Required — cross-project list is not supported in v1.
  string project_name = 1;  // Full resource name `projects/{slug}`. Slug-only is also accepted.
  int32 page_size = 2;
  string page_token = 3;
}

message ListNetworksResponse {
  repeated Network networks = 1;
  string next_page_token = 2;
}

// PortMapping describes a single port or a contiguous port range to expose. ProtocolL4 is
// "TCP" or "UDP".
//
// Range semantics (firewall rules): when `end_port` is 0/unset the mapping covers the single
// `port`. When `end_port > 0` it must satisfy `port <= end_port` and the mapping covers
// every port in [port, end_port] inclusive. Useful for NodePort ranges (30000-32767),
// RTMP/SIP, or any service that listens on a window.
message PortMapping {
  // External port (the one customers connect to), or the lower bound of a range. 1..65535.
  // Ignored when protocol is ICMP (which is portless).
  int32 port = 1;
  // Protocol: TCP, UDP, or ICMP. ICMP rules carry no port.
  string protocol = 2;
  // Internal port on the VM (where the service listens). Defaults to `port` when 0. Ignored
  // on firewall rules — applies only to PublicIp port-forwarding (which we don't currently
  // surface via the customer RPCs, but the field stays for the SDK and future LB work).
  int32 target_port = 3;
  // Upper bound of the port range. 0 (default) = single port; otherwise must be >= port and
  // <= 65535.
  int32 end_port = 4;
}

// PublicIp is a customer-allocated public IPv4 reserved for a tenant VM from the datacenter's
// public IP pool.
message PublicIp {
  // Resource name `projects/{project}/public-ips/{id}`.
  string name = 1;
  string display_name = 2;
  string project_name = 3;
  string datacenter_name = 4;
  // VM the IP routes to (`virtual-machines/{id}`).
  string target_vm = 5;
  // The assigned address. Empty string while ALLOCATING.
  string ip_address = 6;
  // ALLOCATING / ACTIVE / DELETING / DELETED.
  string state = 7;
  repeated PortMapping ports = 8;
  int64 create_time_unix = 9;
  int64 update_time_unix = 10;
  map<string, string> labels = 11;
  map<string, string> annotations = 12;
}

// FirewallRule is one allow-list rule for a VM. Multiple rules on the same VM compose
// additively (the allow sets union). direction='ingress' uses sources + ports as the allow
// set; direction='egress' uses destinations + ports.
message FirewallRule {
  // Resource name `projects/{project}/firewall-rules/{id}`.
  string name = 1;
  string display_name = 2;
  string project_name = 3;
  string datacenter_name = 4;
  // VM the rule applies to (`virtual-machines/{id}`).
  string target_vm = 5;
  // ACTIVE / DELETED.
  string state = 6;
  repeated PortMapping ports = 7;
  // Source CIDRs allowed to reach the listed ports (e.g. ["0.0.0.0/0"], ["10.0.0.0/8"]).
  // Empty list = allow from anywhere. Ingress only.
  repeated string sources = 8;
  int64 create_time_unix = 9;
  int64 update_time_unix = 10;
  map<string, string> labels = 11;
  map<string, string> annotations = 12;
  // 'ingress' (default) | 'egress'. Egress rules use destinations instead of sources.
  string direction = 13;
  // Destination CIDRs the VM is allowed to reach (egress only).
  repeated string destinations = 14;
  // is_default marks the baseline rules seeded automatically when a VM is provisioned with a
  // public IP (SSH/HTTP/HTTPS open to 0.0.0.0/0). Customer-created rules leave it false. UI
  // uses it to render a "default" badge + a stronger delete confirmation.
  bool is_default = 15;
}

message CreateFirewallRuleRequest {
  string project_name = 1;
  string datacenter_name = 2;
  string target_vm = 3;
  repeated PortMapping ports = 4;
  repeated string sources = 5;
  string display_name = 6;
  map<string, string> labels = 7;
  map<string, string> annotations = 8;
  string direction = 11;
  repeated string destinations = 12;
}

message CreateFirewallRuleResponse {
  FirewallRule rule = 1;
}

message ListFirewallRulesRequest {
  string project_name = 1;
  // Optional: filter to rules on this VM.
  string target_vm = 2;
  int32 page_size = 3;
  string page_token = 4;
}

message ListFirewallRulesResponse {
  repeated FirewallRule firewall_rules = 1;
  string next_page_token = 2;
}

message DeleteFirewallRuleRequest {
  string name = 1;
}

message DeleteFirewallRuleResponse {}

// ── Security groups ────────────────────────────────────────────────────────────────────────

// SecurityGroup is a reusable, project-scoped internal-firewall ruleset enforced on the
// private NIC of every VM that joins it. Resource name:
// `organizations/{org}/projects/{project}/securityGroups/{id}`.
message SecurityGroup {
  string name = 1;
  string display_name = 2;
  string project_name = 3;
  string datacenter_name = 4;
  repeated SecurityGroupRule rules = 5;
  // VMs currently in this group (`virtual-machines/{id}`). Output-only — set/changed via
  // AddVmToSecurityGroup / RemoveVmFromSecurityGroup or the VM's security_groups field.
  repeated string member_vms = 6;
  // ACTIVE / DELETED. Read-only.
  string state = 7;
  int64 create_time_unix = 8;
  int64 update_time_unix = 9;
  map<string, string> labels = 10;
  map<string, string> annotations = 11;
  // Optimistic-concurrency token for UpdateSecurityGroup. Read-only.
  string etag = 12;
}

// SecurityGroupRule allows traffic in one direction on the private NIC. A rule with no peer
// set means "any" (the whole VPC for that direction).
message SecurityGroupRule {
  // Stable id within the group (server-assigned if empty on create). Used for diffing.
  string id = 1;
  // 'ingress' (peer = source) | 'egress' (peer = destination). Default ingress.
  string direction = 2;
  // 'tcp' | 'udp' | 'icmp'. ICMP ignores port/end_port (allows all ICMP + ICMPv6 — "ping").
  string protocol = 3;
  // Single port, or lower bound of a range. 1..65535. Ignored for icmp.
  int32 port = 4;
  // Upper bound of a port range; 0 = single port. Ignored for icmp.
  int32 end_port = 5;
  // The peer: a CIDR (v4 or v6) OR another security group (resolved to its live member IPs).
  // Unset = any. A v4 CIDR only constrains v4 traffic and a v6 CIDR only v6 (the other family
  // is unaffected by that rule).
  oneof peer {
    string cidr = 6;
    string security_group = 7;
  }
}

message CreateSecurityGroupRequest {
  string project_name = 1;
  string datacenter_name = 2;
  string display_name = 3;
  repeated SecurityGroupRule rules = 4;
  map<string, string> labels = 5;
  map<string, string> annotations = 6;
}
message CreateSecurityGroupResponse {
  SecurityGroup security_group = 1;
}

message GetSecurityGroupRequest {
  string name = 1;
}
message GetSecurityGroupResponse {
  SecurityGroup security_group = 1;
}

message ListSecurityGroupsRequest {
  string project_name = 1;
  int32 page_size = 2;
  string page_token = 3;
}
message ListSecurityGroupsResponse {
  repeated SecurityGroup security_groups = 1;
  string next_page_token = 2;
}

// UpdateSecurityGroup replaces the whole ruleset (and optionally display_name). Provide etag
// from a prior Get to guard against lost updates; empty etag skips the check.
message UpdateSecurityGroupRequest {
  string name = 1;
  string display_name = 2;
  repeated SecurityGroupRule rules = 3;
  string etag = 4;
}
message UpdateSecurityGroupResponse {
  SecurityGroup security_group = 1;
}

message DeleteSecurityGroupRequest {
  string name = 1;
}
message DeleteSecurityGroupResponse {}

message AddVmToSecurityGroupRequest {
  string security_group = 1;
  string vm = 2;
}
message AddVmToSecurityGroupResponse {
  SecurityGroup security_group = 1;
}

message RemoveVmFromSecurityGroupRequest {
  string security_group = 1;
  string vm = 2;
}
message RemoveVmFromSecurityGroupResponse {
  SecurityGroup security_group = 1;
}

