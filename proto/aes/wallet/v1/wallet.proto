syntax = "proto3";

package aes.wallet.v1;

// WalletService is the customer-facing billing surface: org's single billing account + wallet,
// payment methods, invoices, top-ups, alerts. Admin/internal ledger operations live on
// AdminBillingService. One billing account per org; one wallet per billing account.
service WalletService {
  rpc ListBillingAccounts(ListBillingAccountsRequest) returns (ListBillingAccountsResponse);
  rpc GetBillingAccount(GetBillingAccountRequest) returns (GetBillingAccountResponse);
  rpc GetWallet(GetWalletRequest) returns (GetWalletResponse);
  // GetWalletBalance returns the current prepay liability balance computed from
  // ledger_postings. Separate from GetWallet so the cheap balance-only lookup doesn't drag
  // the full wallet metadata + permissions check overhead. Caller needs wallet read access.
  rpc GetWalletBalance(GetWalletBalanceRequest) returns (GetWalletBalanceResponse);
  // ListPublicMeterRates returns the currently-effective rate per (meter, currency). Read-only,
  // un-scoped — meters are public catalog data; pricing is the same for every customer (any
  // per-customer discounts will live in a separate negotiated_rates table later).
  rpc ListPublicMeterRates(ListPublicMeterRatesRequest) returns (ListPublicMeterRatesResponse);

  // Payment method management. Metalhost never sees raw card data — the customer obtains a
  // Stripe payment method ID via Stripe.js client-side and posts the id here. Metalhost stores
  // (stripe_customer_id, stripe_payment_method_id, last4, brand, exp). AttachPaymentMethod
  // also creates the Stripe customer if the billing account doesn't have one yet.
  rpc AttachPaymentMethod(AttachPaymentMethodRequest) returns (AttachPaymentMethodResponse);
  rpc ListPaymentMethods(ListPaymentMethodsRequest) returns (ListPaymentMethodsResponse);
  rpc DetachPaymentMethod(DetachPaymentMethodRequest) returns (DetachPaymentMethodResponse);
  rpc SetDefaultPaymentMethod(SetDefaultPaymentMethodRequest) returns (SetDefaultPaymentMethodResponse);

  // Invoice viewer. Invoices are auto-generated by a monthly close worker (separate cron); these
  // RPCs let customers list/get/download. PDF lives in object storage; DownloadInvoicePDF
  // returns a signed URL.
  rpc ListInvoices(ListInvoicesRequest) returns (ListInvoicesResponse);
  rpc GetInvoice(GetInvoiceRequest) returns (GetInvoiceResponse);
  rpc DownloadInvoicePDF(DownloadInvoicePDFRequest) returns (DownloadInvoicePDFResponse);

  // Auto-recharge — opt-in. Customer enables Stripe auto-charge by setting enabled=true with a
  // saved payment_method, threshold, and amount. The dispatcher only picks wallets where
  // enabled = TRUE; Metalhost never charges a card without explicit consent. Disable by setting
  // enabled=false (config is preserved so re-enabling doesn't require resubmitting threshold/amount).
  rpc ConfigureAutoRecharge(ConfigureAutoRechargeRequest) returns (ConfigureAutoRechargeResponse);
  rpc GetAutoRechargeConfig(GetAutoRechargeConfigRequest) returns (GetAutoRechargeConfigResponse);

  // GetCostForecast returns month-to-date spend + a linear projection to end-of-month. Customers
  // call this for budget tracking; the projection is naive (mtd_spend / days_elapsed × days_in_month)
  // with no seasonality or per-resource modeling.
  rpc GetCostForecast(GetCostForecastRequest) returns (GetCostForecastResponse);

  // Wallet alerts. One config per wallet: balance_alert_minor (fire when prepay balance drops
  // below) and/or days_remaining_alert (fire when balance / daily burn falls below this many
  // days). Either can be unset (NULL) to disable that alert. Edge-fire arming — fires once
  // when the condition first becomes true, re-arms when balance recovers above the threshold.
  // Customer-side refunds are not modeled: open a support ticket; operator refunds via
  // Stripe Dashboard and the charge.refunded webhook posts the ledger entry.
  rpc ConfigureWalletAlerts(ConfigureWalletAlertsRequest) returns (ConfigureWalletAlertsResponse);
  rpc GetWalletAlerts(GetWalletAlertsRequest) returns (GetWalletAlertsResponse);

  // Customer-initiated top-ups (PLATFORM_DESIGN §6.11). Two flavors:
  //   - Stripe payment intent: customer's browser confirms a card charge; on success
  //     Metalhost's Stripe webhook posts a TOPUP_CLEARING / CUSTOMER_PREPAY_LIABILITY journal.
  //   - x402 challenge: returns the HTTP 402 challenge document the customer's wallet (HTTP
  //     402 Payment Required spec) signs and POSTs back. Useful for crypto-native customers.
  rpc CreateStripeTopUpIntent(CreateStripeTopUpIntentRequest) returns (CreateStripeTopUpIntentResponse);
  // CreateCardSetupIntent: Stripe SetupIntent in card mode. Returns the client_secret the
  // browser's <PaymentElement> needs to render + collect card details without charging.
  // After Stripe confirms, the frontend calls AttachPaymentMethod with the resulting
  // payment_method_id to persist + add to the customer. Used by onboarding + add-card UI.
  rpc CreateCardSetupIntent(CreateCardSetupIntentRequest) returns (CreateCardSetupIntentResponse);
  rpc CreateX402TopUpChallenge(CreateX402TopUpChallengeRequest) returns (CreateX402TopUpChallengeResponse);
  rpc ListTopUps(ListTopUpsRequest) returns (ListTopUpsResponse);
  rpc GetTopUp(GetTopUpRequest) returns (GetTopUpResponse);

  // Statements intentionally not modeled. Invoices already cover the legitimate "what did
  // I spend in period X" need (B2B accounting, tax documentation); statements would have
  // been a B2C UX nicety duplicating the same data. Use ListInvoices + ListTopUps instead.

  // Usage query / export. QueryUsage aggregates usage_events by meter / project / time-bucket
  // and returns rows; ExportUsage materializes a CSV/NDJSON file in object storage and returns
  // a presigned URL (same pattern as AdminAuditService.ExportAuditEvents).
  rpc QueryUsage(QueryUsageRequest) returns (QueryUsageResponse);
  rpc ExportUsage(ExportUsageRequest) returns (ExportUsageResponse);

  // Commitments / reservations intentionally not modeled. Per-VM monthly billing is the
  // replacement: the customer picks billing_mode at VM create time (HOURLY or
  // MONTHLY_{1,3,6,12}) and the prepayment lives on the VM itself. See compute.BillingMode.
}

message PaymentMethod {
  // Resource name `payment-methods/{slug}`.
  string name = 1;
  string billing_account_name = 2;
  string brand = 3;
  string last4 = 4;
  int32 exp_month = 5;
  int32 exp_year = 6;
  bool is_default = 7;
  int64 create_time_unix = 8;
}

message AttachPaymentMethodRequest {
  string name = 1;
  string billing_account_name = 2;
  // Stripe payment method ID obtained from the customer's Stripe.js / Elements flow.
  string stripe_payment_method_id = 3;
  // When true, this method becomes the default for auto-charge.
  bool make_default = 4;
}

message AttachPaymentMethodResponse {
  PaymentMethod payment_method = 1;
}

message ListPaymentMethodsRequest {
  string billing_account_name = 1;
  int32 page_size = 2;
  string page_token = 3;
}

message ListPaymentMethodsResponse {
  repeated PaymentMethod payment_methods = 1;
  string next_page_token = 2;
}

message DetachPaymentMethodRequest {
  string name = 1;
}

message DetachPaymentMethodResponse {}

message SetDefaultPaymentMethodRequest {
  string name = 1;
}

message SetDefaultPaymentMethodResponse {
  PaymentMethod payment_method = 1;
}

message Invoice {
  string name = 1;
  string billing_account_name = 2;
  int64 period_start_unix = 3;
  int64 period_end_unix = 4;
  string currency = 5;
  int64 amount_minor = 6;
  string status = 7;
  int64 create_time_unix = 8;
  int64 finalize_time_unix = 9;
  int64 pay_time_unix = 10;
  repeated InvoiceLineItem line_items = 11;
}

message InvoiceLineItem {
  string meter = 1;
  string display_name = 2;
  double quantity = 3;
  int64 unit_price_minor = 4;
  int64 amount_minor = 5;
  // Exact unit price as NUMERIC text (1.0 = 1 cent, sub-cent precision). amount_minor stays
  // BIGINT because the line total is always whole cents.
  string unit_price_minor_decimal = 6;
}

message ListInvoicesRequest {
  string billing_account_name = 1;
  int32 page_size = 2;
  string page_token = 3;
}

message ListInvoicesResponse {
  repeated Invoice invoices = 1;
  string next_page_token = 2;
}

message GetInvoiceRequest {
  string name = 1;
}

message GetInvoiceResponse {
  Invoice invoice = 1;
}

message DownloadInvoicePDFRequest {
  string name = 1;
}

message DownloadInvoicePDFResponse {
  // Short-lived presigned URL. Expires in 1h.
  string download_url = 1;
  int64 expires_at_unix = 2;
}

// WalletAlertConfig: one alert configuration per wallet. balance_alert_minor is the prepay
// balance below which the worker fires; days_remaining_alert is the projected days-of-spend
// (balance / daily burn) below which it fires. Either or both can be unset (zero / NULL on
// the wire) to disable that alert. last_*_fired_at_unix is informational — the worker
// implements edge-fire arming via dedicated DB columns.
message WalletAlertConfig {
  string wallet_name = 1;
  int64 balance_alert_minor = 2;
  int32 days_remaining_alert = 3;
  int64 last_balance_fired_at_unix = 4;
  int64 last_days_fired_at_unix = 5;
  string currency = 6;
}

message ConfigureWalletAlertsRequest {
  string wallet_name = 1;
  // Both fields are optional. Send 0 / unset to clear that alert.
  optional int64 balance_alert_minor = 2;
  optional int32 days_remaining_alert = 3;
}

message ConfigureWalletAlertsResponse {
  WalletAlertConfig config = 1;
}

message GetWalletAlertsRequest {
  string wallet_name = 1;
}

message GetWalletAlertsResponse {
  WalletAlertConfig config = 1;
}

message AutoRechargeConfig {
  string wallet_name = 1;
  bool enabled = 2;
  // Threshold in minor currency units (cents). When the wallet's prepay balance drops below
  // this value, the dispatcher attempts a charge. Must be > 0 when enabled.
  int64 threshold_minor = 3;
  // Amount to charge each time the threshold is crossed. Must be > 0 when enabled.
  int64 amount_minor = 4;
  // Saved payment method (`payment-methods/{slug}`) the dispatcher uses. Must belong to the
  // same billing account as the wallet. Required when enabled.
  string payment_method_name = 5;
  string currency = 6;
  int64 last_auto_recharge_at_unix = 7;
}

message ConfigureAutoRechargeRequest {
  string wallet_name = 1;
  bool enabled = 2;
  // Required when enabled = true; ignored otherwise (existing values stay so the customer can
  // pause and resume without resubmitting).
  int64 threshold_minor = 3;
  int64 amount_minor = 4;
  string payment_method_name = 5;
}

message ConfigureAutoRechargeResponse {
  AutoRechargeConfig config = 1;
}

message GetAutoRechargeConfigRequest {
  string wallet_name = 1;
}

message GetAutoRechargeConfigResponse {
  AutoRechargeConfig config = 1;
}

message PublicMeterRate {
  string meter = 1;
  string currency = 2;
  // Rounded view for clients that don't parse decimals. Use unit_price_minor_decimal
  // for the exact NUMERIC rate (configurator rates are sub-cent).
  int64 unit_price_minor = 3;
  string display_name = 4;
  int64 effective_at_unix = 5;
  // Exact rate as NUMERIC text (1.0 = 1 cent, 6 decimals of sub-cent precision).
  string unit_price_minor_decimal = 6;
}

message ListPublicMeterRatesRequest {
  // Optional filter — meters whose name has this prefix (e.g. "compute.vm.").
  string meter_prefix = 1;
  string currency = 2;
  int32 page_size = 3;
  string page_token = 4;
}

message ListPublicMeterRatesResponse {
  repeated PublicMeterRate public_meter_rates = 1;
  string next_page_token = 2;
}

message BillingAccount {
  string name = 1;
  string organization_name = 2;
  string display_name = 3;
  string state = 4;
  int64 create_time_unix = 5;
  // Populated when state=SUSPENDED. One of "low_balance" | "dispute" | "manual".
  string suspended_reason = 6;
}

message Wallet {
  string name = 1;
  string billing_account_name = 2;
  string currency = 3;
  int64 create_time_unix = 4;
}

enum PostingDirection {
  POSTING_DIRECTION_UNSPECIFIED = 0;
  POSTING_DIRECTION_DEBIT = 1;
  POSTING_DIRECTION_CREDIT = 2;
}

message LedgerPosting {
  string account_code = 1;
  int64 amount_minor = 2;
  string currency = 3;
  PostingDirection direction = 4;
}

message ListBillingAccountsRequest {
  int32 page_size = 1;
  string page_token = 2;
}

message ListBillingAccountsResponse {
  repeated BillingAccount billing_accounts = 1;
  string next_page_token = 2;
}

message GetBillingAccountRequest {
  string name = 1;
}

message GetBillingAccountResponse {
  BillingAccount billing_account = 1;
}

message GetWalletRequest {
  string name = 1;
}

message GetWalletResponse {
  Wallet wallet = 1;
}

message GetWalletBalanceRequest {
  string name = 1;
}

message GetWalletBalanceResponse {
  string wallet_name = 1;
  // Current prepay liability balance in minor currency units. Positive = customer has credit.
  // Computed by summing ledger_postings where account_code='CUSTOMER_PREPAY_LIABILITY' and
  // applying direction (credit = +, debit = -).
  int64 balance_minor = 2;
  string currency = 3;
  // Timestamp of the latest journal entry on this wallet; UI uses this to show "updated 2m ago"
  // and decide whether a hard reload after a Stripe top-up is needed.
  int64 last_journal_unix = 4;
}

// Ledger / usage / wallet-lifecycle messages — admin-only RPCs, but the message types stay
// in the wallet package because they describe wallet-shaped data. AdminBillingService
// references them by qualified type name.

message RecordJournalEntryRequest {
  string wallet_name = 1;
  string idempotency_key = 2;
  string description = 3;
  repeated LedgerPosting postings = 4;
}

message RecordJournalEntryResponse {
  string journal_entry_id = 1;
}

message RecordUsageEventRequest {
  // Optional projects/...; when empty, server may use authenticated default project (metalhostd).
  string project_name = 1;
  string resource_name = 2;
  string meter = 3;
  // Decimal string (e.g. "1", "10.5"); stored as NUMERIC.
  string quantity = 4;
  string unit = 5;
  // Unix seconds; 0 means server wall clock.
  int64 event_time_unix = 6;
  map<string, string> metadata = 7;
  string idempotency_key = 8;
}

message RecordUsageEventResponse {
  string usage_event_id = 1;
}

message SettleUsageToLedgerRequest {
  string usage_event_id = 1;
  string wallet_name = 2;
  // When use_registered_meter_rate is false (default), must be > 0. When true, ignored.
  int64 amount_minor = 3;
  // When empty, the wallet's currency is used.
  string currency = 4;
  // When empty, defaults to "usage-settle:{usage_event_id}" for journal idempotency.
  string idempotency_key = 5;
  // When empty, a short server-generated description is used.
  string description = 6;
  // When true, amount_minor is ignored; the charge is round(quantity * unit_price_minor) from
  // usage_meter_rates for the usage row's meter and the wallet currency (Postgres), or in-memory rates (dev).
  bool use_registered_meter_rate = 7;
}

message SettleUsageToLedgerResponse {
  string journal_entry_id = 1;
  // Minor units debited for this settlement (same as sum of debit postings). Zero if unknown (e.g. some idempotent replays).
  int64 computed_amount_minor = 2;
}

message CreateWalletRequest {
  // Resource name `wallets/{slug}`. Slug must be DNS-safe lowercase.
  string name = 1;
  // Owning billing account. DB enforces one wallet per billing account.
  string billing_account_name = 2;
  // ISO-4217 currency code (e.g. "USD"). Defaults to the billing account's currency.
  string currency = 3;
  string display_name = 4;
}

message CreateWalletResponse {
  Wallet wallet = 1;
}

message DeleteWalletRequest {
  string name = 1;
}

message DeleteWalletResponse {}

// Cost forecast messages.

message GetCostForecastRequest {
  // Billing account scope. Caller must hold admin/editor/viewer on the org.
  string billing_account_name = 1;
  // Optional period override; defaults to current calendar month.
  // Format: "monthly" | "weekly" | "daily".
  string period = 2;
}

message GetCostForecastResponse {
  string currency = 1;
  // Spend so far in the current period (sum of CUSTOMER_PREPAY_LIABILITY debits).
  int64 mtd_spend_minor = 2;
  // Days elapsed since period_start (1 on day 1).
  int32 days_elapsed = 3;
  // Total days in the period (28..31 for monthly).
  int32 days_in_period = 4;
  // mtd_spend_minor × days_in_period / days_elapsed. Rounded down.
  int64 projected_period_total_minor = 5;
  int64 daily_run_rate_minor = 6;
  int64 period_start_unix = 7;
  int64 period_end_unix = 8;
}

// Refunds intentionally not exposed to customers — they open a support ticket and the
// operator issues the refund via Stripe Dashboard, which our charge.refunded webhook handler
// turns into the corresponding ledger entry.

// -----------------------------------------------------------------------------
// Top-ups (Stripe / x402)
// -----------------------------------------------------------------------------

message TopUp {
  // Resource name `topUps/{slug}`.
  string name = 1;
  string wallet_name = 2;
  // "stripe-card" | "stripe-ach" | "x402".
  string method = 3;
  int64 amount_minor = 4;
  string currency = 5;
  // PENDING / SUCCEEDED / FAILED / CANCELED.
  string state = 6;
  // Provider correlator — Stripe PaymentIntent id, x402 challenge id, etc.
  string external_id = 7;
  // Journal entry posted when state=SUCCEEDED. Empty in PENDING/FAILED.
  string journal_entry_id = 8;
  int64 create_time_unix = 9;
  int64 update_time_unix = 10;
}

message CreateStripeTopUpIntentRequest {
  string wallet_name = 1;
  int64 amount_minor = 2;
  string currency = 3;
  // Saved payment method (optional). When empty, the response carries a client_secret the
  // browser uses to confirm a one-shot card without saving it.
  string payment_method_name = 4;
  string idempotency_key = 5;
}

message CreateStripeTopUpIntentResponse {
  TopUp top_up = 1;
  // Stripe PaymentIntent client_secret — the browser passes this to Stripe.js to confirm.
  // Empty when payment_method_name was set + auto-confirm succeeded server-side.
  string client_secret = 2;
}

// CreateCardSetupIntent — card-save flow (no charge). Returns the client_secret the
// frontend's Stripe <PaymentElement> binds to; after Stripe confirms, the SPA calls
// AttachPaymentMethod with the returned payment_method_id to persist + attach to the
// customer.
message CreateCardSetupIntentRequest {
  // billing-accounts/<org-slug>. The Stripe customer attached to this billing account
  // is reused (or created on the fly).
  string billing_account_name = 1;
  // Optional client-stamped idempotency key. Repeated calls with the same key return the
  // same SetupIntent client_secret (Stripe handles dedup).
  string idempotency_key = 2;
}

message CreateCardSetupIntentResponse {
  // Stripe SetupIntent client_secret — pass to stripe.elements({ clientSecret: … }).
  string client_secret = 1;
}

message CreateX402TopUpChallengeRequest {
  string wallet_name = 1;
  int64 amount_minor = 2;
  string currency = 3;
  // Settlement chain — "ethereum" | "base" | "polygon". Determines the facilitator endpoint.
  string chain = 4;
  string idempotency_key = 5;
}

message CreateX402TopUpChallengeResponse {
  TopUp top_up = 1;
  // Raw HTTP 402 challenge document (JSON) the customer's wallet signs. Includes the recipient
  // address, amount, nonce, and facilitator URL. Customer POSTs the signed payload to
  // /v1/public/x402/facilitator (mounted publicly, not via Connect).
  string challenge_document = 2;
  // Facilitator URL the wallet posts the signed payload to.
  string facilitator_url = 3;
}

message ListTopUpsRequest {
  string wallet_name = 1;
  // Optional state filter.
  string state = 2;
  int32 page_size = 3;
  string page_token = 4;
}
message ListTopUpsResponse {
  repeated TopUp top_ups = 1;
  string next_page_token = 2;
}

message GetTopUpRequest { string name = 1; }
message GetTopUpResponse { TopUp top_up = 1; }

// -----------------------------------------------------------------------------
// Usage query + export
// -----------------------------------------------------------------------------

message QueryUsageRequest {
  // Either project_name or organization_name (one is required).
  string project_name = 1;
  string organization_name = 2;
  // Optional filter — only meters matching this prefix.
  string meter_prefix = 3;
  // Time bounds (Unix seconds). end exclusive.
  int64 start_time_unix = 4;
  int64 end_time_unix = 5;
  // Bucket size — "hour" | "day" | "month". Defaults to "day".
  string bucket = 6;
  // Group-by dimensions — any subset of {"project", "meter", "resource", "datacenter"}.
  repeated string group_by = 7;
  int32 page_size = 8;
  string page_token = 9;
}

message UsageRow {
  // Bucket start, Unix seconds.
  int64 bucket_start_unix = 1;
  string project_name = 2;
  string meter = 3;
  string datacenter_name = 4;
  string resource_name = 5;
  // Sum of quantities (decimal string).
  string quantity = 6;
  string unit = 7;
  // Estimated cost in minor units (rate × quantity, rounded). 0 when no rate is registered.
  int64 cost_minor = 8;
  string currency = 9;
}

message QueryUsageResponse {
  repeated UsageRow rows = 1;
  string next_page_token = 2;
  // Per-project monthly egress free-tier allowance in GiB (server policy, env-configurable via
  // METALHOST_PROJECT_EGRESS_FREE_GIB). Surfaced here so the transfer/usage UI doesn't hardcode
  // it. 0 = no free tier (every byte bills).
  int64 egress_free_gib = 3;
}

message ExportUsageRequest {
  string project_name = 1;
  string organization_name = 2;
  string meter_prefix = 3;
  int64 start_time_unix = 4;
  int64 end_time_unix = 5;
  // "csv" | "ndjson". Default "csv".
  string format = 6;
  int32 max_rows = 7;
}

message ExportUsageResponse {
  string download_url = 1;
  int64 expires_at_unix = 2;
  int64 row_count = 3;
  string object_key = 4;
}

// Commitment / reservation messages intentionally not modeled — see ComputeService.BillingMode
// for the per-VM monthly billing replacement.
