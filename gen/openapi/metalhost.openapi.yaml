              schema:
                $ref: '#/components/schemas/aes.baremetal.v1.ExitBareMetalRescueModeResponse'
  /aes.baremetal.v1.BareMetalService/GetBareMetalConsoleURL:
    post:
      tags:
        - aes.baremetal.v1.BareMetalService
      summary: GetBareMetalConsoleURL
      description: |-
        GetBareMetalConsoleURL returns a short-lived websocket URL for the host's graphical KVM
         console, bridged to the BMC's VNC server. The server enables VNC on the BMC with a fresh
         per-session password (returned in vnc_password) and disables it again when the session
         ends — VNC is off at rest. Token expires after 60s; connect promptly.
      operationId: aes.baremetal.v1.BareMetalService.GetBareMetalConsoleURL
      parameters:
        - name: Connect-Protocol-Version
          in: header
          required: true
          schema:
            $ref: '#/components/schemas/connect-protocol-version'
        - name: Connect-Timeout-Ms
          in: header
          schema:
            $ref: '#/components/schemas/connect-timeout-header'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/aes.baremetal.v1.GetBareMetalConsoleURLRequest'
        required: true
      responses:
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/connect.error'
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/aes.baremetal.v1.GetBareMetalConsoleURLResponse'
