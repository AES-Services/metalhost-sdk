  /aes.compute.v1.ComputeService/CloneVirtualMachine:
    post:
      tags:
        - aes.compute.v1.ComputeService
      summary: CloneVirtualMachine
      description: |-
        CloneVirtualMachine creates a new VM whose BOOT disk is a copy of an existing VM's boot
         disk at the point of clone. Async, disk-first: snapshots the source boot disk, copies it,
         and provisions the new VM from the copy; returns an Operation the caller polls like a
         create. The new VM gets a fresh name +
         project-scoped resource ID. Custom firewall rules ARE copied; networks are NOT (clone is
         per-VM, not per-stack). Boot disk only — any attached DATA disks on the source are NOT
         cloned (tracked as a follow-on, mirrors CreateVirtualMachineFromBackup).
      operationId: aes.compute.v1.ComputeService.CloneVirtualMachine
      parameters:
        - name: Connect-Protocol-Version
          in: header
          required: true
          schema:
            $ref: '#/components/schemas/connect-protocol-version'
        - name: Connect-Timeout-Ms
          in: header
          schema:
            $ref: '#/components/schemas/connect-timeout-header'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/aes.compute.v1.CloneVirtualMachineRequest'
        required: true
      responses:
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/connect.error'
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/aes.compute.v1.CloneVirtualMachineResponse'
