    aes.storage.v1.Disk:
      type: object
      properties:
        name:
          type: string
          title: name
          description: '[OUTPUT_ONLY] Resource name `projects/{project}/disks/{id}`. Server-assigned on create.'
        displayName:
          type: string
          title: display_name
          description: '[MUTABLE] Human-friendly label.'
        projectName:
          type: string
          title: project_name
          description: '[OUTPUT_ONLY] Parent project (`projects/{id}`). On create the request `parent` wins.'
        datacenterName:
          type: string
          title: datacenter_name
          description: '[IMMUTABLE] Datacenter the disk lives in (`datacenters/{id}`). DC-local; cannot move.'
        sizeGib:
          type: integer
          title: size_gib
          format: int32
          description: '[IMMUTABLE] 1..1024 GiB at create. Grow via ResizeDisk (one-way), never via UpdateDisk.'
        storageClass:
          type: string
          title: storage_class
          description: '[IMMUTABLE] Customer-facing storage tier — currently `nvme` only.'
        state:
          type: string
          title: state
          description: '[OUTPUT_ONLY] PROVISIONING / AVAILABLE / ATTACHED / DELETING / DELETED.'
        attachedVm:
          type: string
          title: attached_vm
          description: '[OUTPUT_ONLY] VM the disk is currently attached to (`virtual-machines/{id}`); empty when AVAILABLE.'
        createTimeUnix:
          type:
            - integer
            - string
          title: create_time_unix
          format: int64
          description: '[OUTPUT_ONLY]'
        updateTimeUnix:
          type:
            - integer
            - string
          title: update_time_unix
          format: int64
          description: '[OUTPUT_ONLY]'
        labels:
          type: object
          title: labels
          additionalProperties:
            type: string
            title: value
          description: '[MUTABLE]'
        annotations:
          type: object
          title: annotations
          additionalProperties:
            type: string
            title: value
          description: '[MUTABLE]'
        networkName:
          type: string
          title: network_name
          description: |-
            [IMMUTABLE] Tenant Network the disk lives in (`projects/{p}/networks/{id}`). Set at create
             time; immutable. Disks can only attach to VMs on the same Network.
      title: Disk
      additionalProperties: false
      description: |-
        Disk is a persistent block volume that lives in a single datacenter. State machine:
           PROVISIONING → AVAILABLE → ATTACHED → AVAILABLE (on detach) → DELETING → DELETED
         Attached disks cannot be deleted — detach first.
         Disk is the single source of truth for a block volume across read and write: GetDisk /
         ListDisks return it, and CreateDisk / UpdateDisk accept it. Field behavior is documented
         per-field below using AIP-203 vocabulary; the server enforces it (see CreateDisk/UpdateDisk):

           [OUTPUT_ONLY] server-owned — ignored on create/update, only ever returned.
           [IMMUTABLE]   settable at create, rejected/ignored on update.
           [MUTABLE]     (default) settable at create and update.

         When google/api/field_behavior is vendored these comments become real
         (google.api.field_behavior) annotations so buf/codegen/SDKs can enforce them mechanically.
    aes.storage.v1.Disk.AnnotationsEntry:
      type: object
      properties:
        key:
          type: string
          title: key
        value:
          type: string
          title: value
      title: AnnotationsEntry
      additionalProperties: false
    aes.storage.v1.Disk.LabelsEntry:
      type: object
      properties:
        key:
          type: string
          title: key
        value:
          type: string
          title: value
      title: LabelsEntry
      additionalProperties: false
    aes.storage.v1.FileShare:
      type: object
      properties:
        name:
          type: string
          title: name
          description: Resource name `projects/{project}/file-shares/{slug}`.
        projectName:
          type: string
          title: project_name
        datacenterName:
          type: string
          title: datacenter_name
        sizeGib:
          type: integer
          title: size_gib
          format: int32
        state:
          type: string
          title: state
          description: PROVISIONING / AVAILABLE / DELETING / DELETED.
        storageClass:
          type: string
          title: storage_class
          description: Storage tier alias for the shared filesystem. Today a single RWX tier is offered.
        displayName:
          type: string
          title: display_name
        labels:
          type: object
          title: labels
          additionalProperties:
            type: string
            title: value
        annotations:
          type: object
          title: annotations
          additionalProperties:
            type: string
            title: value
        createTimeUnix:
          type:
            - integer
            - string
          title: create_time_unix
          format: int64
        updateTimeUnix:
          type:
            - integer
            - string
          title: update_time_unix
          format: int64
        nfsServerEndpoint:
          type: string
          title: nfs_server_endpoint
          description: |-
            NFS server endpoint customers mount over (host[:port]). Same address for every share in
             a datacenter.
        nfsExportPath:
          type: string
          title: nfs_export_path
          description: |-
            Pseudo path inside the NFS export. Per-share UUID — knowing the path is necessary but not
             sufficient for access (mounts are restricted to the tenant network; mounts from outside
             that network get permission denied).
        mountCommand:
          type: string
          title: mount_command
          description: |-
            Convenience: the full mount command for a Linux guest. e.g.
             `mount -t nfs4 <endpoint>:/projects/<uuid>/<uuid> /mnt/share`. Customers paste this into
             cloud-init or run by hand — any VM on the tenant network is allowed.
      title: FileShare
      additionalProperties: false
    aes.storage.v1.FileShare.AnnotationsEntry:
      type: object
      properties:
        key:
          type: string
          title: key
        value:
          type: string
          title: value
      title: AnnotationsEntry
      additionalProperties: false
    aes.storage.v1.FileShare.LabelsEntry:
      type: object
      properties:
        key:
          type: string
          title: key
        value:
          type: string
          title: value
      title: LabelsEntry
      additionalProperties: false
