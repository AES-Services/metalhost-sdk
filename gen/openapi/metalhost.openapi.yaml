  /aes.iam.v1.IamService/CreateWorkspace:
    post:
      tags:
        - aes.iam.v1.IamService
      summary: CreateWorkspace
      description: |-
        CreateWorkspace is the self-serve org bootstrap the onboarding wizard calls for an
         authenticated-but-org-less user (the state an SSO/OIDC first-login lands in — the identity
         is created at login, but the user names their workspace here). It creates the org chain
         (organization + quota defaults + billing account + USD wallet + organization.admin binding
         for the caller) under the caller's chosen slug, in one transaction. Idempotent-safe: a slug
         already taken by a different account is refused (the takeover gate). The chosen slug is
         validated against the same DNS-1035 + reserved rules CheckSlugAvailable reports on.
      operationId: aes.iam.v1.IamService.CreateWorkspace
      parameters:
        - name: Connect-Protocol-Version
          in: header
          required: true
          schema:
            $ref: '#/components/schemas/connect-protocol-version'
        - name: Connect-Timeout-Ms
          in: header
          schema:
            $ref: '#/components/schemas/connect-timeout-header'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/aes.iam.v1.CreateWorkspaceRequest'
        required: true
      responses:
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/connect.error'
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/aes.iam.v1.CreateWorkspaceResponse'
  /aes.iam.v1.IamService/EnrollMFA:
    post:
      tags:
        - aes.iam.v1.IamService
      summary: EnrollMFA
      description: |-
        MFA / TOTP. EnrollMFA returns a fresh shared secret + provisioning URI (otpauth://) the
         caller's authenticator app reads as a QR code; the credential starts in PENDING state and
         does nothing until VerifyMFAEnrollment confirms a valid TOTP code. ListMFADevices reports
         the principal's enrolled devices; RevokeMFADevice deactivates one. Recovery codes are
         issued on first verification (one-shot, hashed at rest) so a lost authenticator doesn't
         lock the user out — they're returned in VerifyMFAEnrollmentResponse.recovery_codes.
      operationId: aes.iam.v1.IamService.EnrollMFA
      parameters:
        - name: Connect-Protocol-Version
          in: header
          required: true
          schema:
            $ref: '#/components/schemas/connect-protocol-version'
        - name: Connect-Timeout-Ms
          in: header
          schema:
            $ref: '#/components/schemas/connect-timeout-header'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/aes.iam.v1.EnrollMFARequest'
        required: true
      responses:
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/connect.error'
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/aes.iam.v1.EnrollMFAResponse'
