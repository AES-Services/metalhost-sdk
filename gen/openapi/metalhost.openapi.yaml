openapi: 3.1.0
info:
  title: Metalhost API
  version: v1
  description: |-
    Customer-facing HTTP API for Metalhost. Every dashboard action maps to one of the RPCs below. Authenticate with a Bearer API key on every request — mint one in the dashboard under Developers → API keys.

    Every RPC is POST application/json with a Bearer header. Field names use snake_case (proto JSON).
  contact:
    name: Metalhost support
    email: support@metalhost.net
    url: https://metalhost.net/docs
paths:
  /aes.audit.v1.AuditService/SearchEvents:
    post:
      tags:
        - aes.audit.v1.AuditService
      summary: SearchEvents
      operationId: aes.audit.v1.AuditService.SearchEvents
      parameters:
        - name: Connect-Protocol-Version
          in: header
          required: true
          schema:
            $ref: '#/components/schemas/connect-protocol-version'
        - name: Connect-Timeout-Ms
          in: header
          schema:
            $ref: '#/components/schemas/connect-timeout-header'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/aes.audit.v1.SearchEventsRequest'
        required: true
      responses:
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/connect.error'
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/aes.audit.v1.SearchEventsResponse'
  /aes.baremetal.v1.BareMetalService/AttachBareMetalISO:
    post:
      tags:
        - aes.baremetal.v1.BareMetalService
      summary: AttachBareMetalISO
      description: |-
        AttachBareMetalISO mounts a library ISO (by object key) as the host's BMC virtual CD; the
         BMC streams it from Metalhost for the duration of the mount.
      operationId: aes.baremetal.v1.BareMetalService.AttachBareMetalISO
      parameters:
        - name: Connect-Protocol-Version
          in: header
          required: true
          schema:
            $ref: '#/components/schemas/connect-protocol-version'
        - name: Connect-Timeout-Ms
          in: header
          schema:
            $ref: '#/components/schemas/connect-timeout-header'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/aes.baremetal.v1.AttachBareMetalISORequest'
        required: true
      responses:
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/connect.error'
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/aes.baremetal.v1.AttachBareMetalISOResponse'
  /aes.baremetal.v1.BareMetalService/CreateBareMetalISOFromURL:
    post:
      tags:
        - aes.baremetal.v1.BareMetalService
      summary: CreateBareMetalISOFromURL
      description: |-
        CreateBareMetalISOFromURL imports an ISO into the org library by URL — Metalhost fetches it
         server-side, so no slow browser upload. Returns immediately; the ISO appears in
         ListBareMetalISOs once the fetch completes.
      operationId: aes.baremetal.v1.BareMetalService.CreateBareMetalISOFromURL
      parameters:
        - name: Connect-Protocol-Version
          in: header
          required: true
          schema:
            $ref: '#/components/schemas/connect-protocol-version'
        - name: Connect-Timeout-Ms
          in: header
          schema:
            $ref: '#/components/schemas/connect-timeout-header'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/aes.baremetal.v1.CreateBareMetalISOFromURLRequest'
        required: true
      responses:
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/connect.error'
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/aes.baremetal.v1.CreateBareMetalISOFromURLResponse'
  /aes.baremetal.v1.BareMetalService/CreateBareMetalISOUploadURL:
    post:
      tags:
        - aes.baremetal.v1.BareMetalService
      summary: CreateBareMetalISOUploadURL
      description: |-
        --- Bring-your-own-OS virtual media + ISO library (docs/specs/BARE_METAL_BYO_OS.md) ---
         The ISO library is per-ORG (shared across the org's projects), quota-limited. Upload once,
         re-use across leases. CreateBareMetalISOUploadURL returns a short-lived presigned PUT URL the
         customer uploads their install ISO to, plus the object key.
      operationId: aes.baremetal.v1.BareMetalService.CreateBareMetalISOUploadURL
      parameters:
        - name: Connect-Protocol-Version
          in: header
          required: true
          schema:
            $ref: '#/components/schemas/connect-protocol-version'
        - name: Connect-Timeout-Ms
          in: header
          schema:
            $ref: '#/components/schemas/connect-timeout-header'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/aes.baremetal.v1.CreateBareMetalISOUploadURLRequest'
        required: true
      responses:
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/connect.error'
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/aes.baremetal.v1.CreateBareMetalISOUploadURLResponse'
