    aes.network.v1.FirewallRule:
      type: object
      properties:
        name:
          type: string
          title: name
          description: Resource name `projects/{project}/firewall-rules/{id}`.
        displayName:
          type: string
          title: display_name
        projectName:
          type: string
          title: project_name
        datacenterName:
          type: string
          title: datacenter_name
        targetVm:
          type: string
          title: target_vm
          description: VM the rule applies to (`virtual-machines/{id}`).
        state:
          type: string
          title: state
          description: ACTIVE / DELETED.
        ports:
          type: array
          items:
            $ref: '#/components/schemas/aes.network.v1.PortMapping'
          title: ports
        sources:
          type: array
          items:
            type: string
          title: sources
          description: |-
            Source CIDRs allowed to reach the listed ports (e.g. ["0.0.0.0/0"], ["10.0.0.0/8"]).
             Empty list = allow from anywhere. Ingress only.
        createTimeUnix:
          type:
            - integer
            - string
          title: create_time_unix
          format: int64
        updateTimeUnix:
          type:
            - integer
            - string
          title: update_time_unix
          format: int64
        labels:
          type: object
          title: labels
          additionalProperties:
            type: string
            title: value
        annotations:
          type: object
          title: annotations
          additionalProperties:
            type: string
            title: value
        direction:
          type: string
          title: direction
          description: '''ingress'' (default) | ''egress''. Egress rules use destinations instead of sources.'
        destinations:
          type: array
          items:
            type: string
          title: destinations
          description: Destination CIDRs the VM is allowed to reach (egress only).
        isDefault:
          type: boolean
          title: is_default
          description: |-
            is_default marks the baseline rules seeded automatically when a VM is provisioned with a
             public IP (SSH/HTTP/HTTPS open to 0.0.0.0/0). Customer-created rules leave it false. UI
             uses it to render a "default" badge + a stronger delete confirmation.
      title: FirewallRule
      additionalProperties: false
      description: |-
        FirewallRule is one allow-list rule for a VM. Backed by a NetworkPolicy. Multiple rules on
         the same VM compose additively (NetworkPolicies union). direction='ingress' uses sources +
         ports as the allow set; direction='egress' uses destinations + ports.
    aes.network.v1.FirewallRule.AnnotationsEntry:
      type: object
      properties:
        key:
          type: string
          title: key
        value:
          type: string
          title: value
      title: AnnotationsEntry
      additionalProperties: false
    aes.network.v1.FirewallRule.LabelsEntry:
