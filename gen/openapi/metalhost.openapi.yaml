  /aes.baremetal.v1.BareMetalService/ListBareMetalInventory:
    post:
      tags:
        - aes.baremetal.v1.BareMetalService
      summary: ListBareMetalInventory
      description: |-
        ListBareMetalInventory returns EVERY published bare-metal host on the platform — available
         AND leased — each tagged with its availability, so a browser can show the full fleet (leased
         nodes greyed out). PUBLIC + unauthenticated (see publicMetalhostProcedures): exposes only
         model/specs/price/DC/status — never the lessee, BMC, or serials.
      operationId: aes.baremetal.v1.BareMetalService.ListBareMetalInventory
      parameters:
        - name: Connect-Protocol-Version
          in: header
          required: true
          schema:
            $ref: '#/components/schemas/connect-protocol-version'
        - name: Connect-Timeout-Ms
          in: header
          schema:
            $ref: '#/components/schemas/connect-timeout-header'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/aes.baremetal.v1.ListBareMetalInventoryRequest'
        required: true
      responses:
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/connect.error'
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/aes.baremetal.v1.ListBareMetalInventoryResponse'
  /aes.baremetal.v1.BareMetalService/QuoteBareMetal:
    post:
      tags:
        - aes.baremetal.v1.BareMetalService
      summary: QuoteBareMetal
      description: |-
        QuoteBareMetal previews the cost of leasing a host under a billing mode (hourly rate, and the
         prepay due now for a MONTHLY_* term at its discount). Mirrors ComputeService.QuoteVirtualMachine.
      operationId: aes.baremetal.v1.BareMetalService.QuoteBareMetal
      parameters:
        - name: Connect-Protocol-Version
          in: header
          required: true
          schema:
            $ref: '#/components/schemas/connect-protocol-version'
        - name: Connect-Timeout-Ms
          in: header
          schema:
            $ref: '#/components/schemas/connect-timeout-header'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/aes.baremetal.v1.QuoteBareMetalRequest'
        required: true
      responses:
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/connect.error'
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/aes.baremetal.v1.QuoteBareMetalResponse'
  /aes.baremetal.v1.BareMetalService/ReinstallBareMetal:
    post:
      tags:
        - aes.baremetal.v1.BareMetalService
      summary: ReinstallBareMetal
      description: |-
        ReinstallBareMetal re-runs the OS install + cloud-init seed on a leased host, wiping the
         OS disk. Keeps the same lease + IPv4 block. Use to switch image or get a clean slate.
      operationId: aes.baremetal.v1.BareMetalService.ReinstallBareMetal
      parameters:
        - name: Connect-Protocol-Version
          in: header
          required: true
          schema:
            $ref: '#/components/schemas/connect-protocol-version'
        - name: Connect-Timeout-Ms
          in: header
          schema:
            $ref: '#/components/schemas/connect-timeout-header'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/aes.baremetal.v1.ReinstallBareMetalRequest'
        required: true
      responses:
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/connect.error'
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/aes.baremetal.v1.ReinstallBareMetalResponse'
  /aes.baremetal.v1.BareMetalService/ReleaseBareMetalInstance:
    post:
      tags:
        - aes.baremetal.v1.BareMetalService
      summary: ReleaseBareMetalInstance
      description: |-
        ReleaseBareMetalInstance ends the lease; the host returns to the available pool. Refused
         while a MONTHLY_* term is still active (hard non-cancel, same as DeleteVirtualMachine). The
         customer's data on local disks is not wiped by Metalhost — operator policy decides whether
         the host is reformatted before re-leasing.
      operationId: aes.baremetal.v1.BareMetalService.ReleaseBareMetalInstance
      parameters:
        - name: Connect-Protocol-Version
          in: header
          required: true
          schema:
            $ref: '#/components/schemas/connect-protocol-version'
        - name: Connect-Timeout-Ms
          in: header
          schema:
            $ref: '#/components/schemas/connect-timeout-header'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/aes.baremetal.v1.ReleaseBareMetalInstanceRequest'
        required: true
      responses:
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/connect.error'
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/aes.baremetal.v1.ReleaseBareMetalInstanceResponse'
  /aes.baremetal.v1.BareMetalService/RenewBareMetalNow:
    post:
      tags:
        - aes.baremetal.v1.BareMetalService
      summary: RenewBareMetalNow
      description: |-
        RenewBareMetalNow charges the next prepaid term immediately for a MONTHLY_* lease (mirror of
         ComputeService.RenewVMNow). Useful before a term lapses or to extend ahead of the worker.
      operationId: aes.baremetal.v1.BareMetalService.RenewBareMetalNow
      parameters:
        - name: Connect-Protocol-Version
          in: header
          required: true
          schema:
            $ref: '#/components/schemas/connect-protocol-version'
        - name: Connect-Timeout-Ms
          in: header
          schema:
            $ref: '#/components/schemas/connect-timeout-header'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/aes.baremetal.v1.RenewBareMetalNowRequest'
        required: true
      responses:
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/connect.error'
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/aes.baremetal.v1.RenewBareMetalNowResponse'
  /aes.baremetal.v1.BareMetalService/SetBareMetalBootDevice:
