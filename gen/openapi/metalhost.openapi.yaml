    aes.compute.v1.VirtualMachine:
      type: object
      properties:
        name:
          type: string
          title: name
        projectName:
          type: string
          title: project_name
        datacenterName:
          type: string
          title: datacenter_name
        state:
          type: string
          title: state
          description: |-
            Current lifecycle state — RUNNING / STOPPED / SUSPENDED / DELETING / DELETED. Reflects DB;
             updated by Start/Stop/Restart/Suspend/Resume RPCs after the underlying KubeVirt subresource
             call succeeds.
        createTimeUnix:
          type:
            - integer
            - string
          title: create_time_unix
          format: int64
        labels:
          type: object
          title: labels
          additionalProperties:
            type: string
            title: value
          description: User-facing labels (filterable, indexed externally). Merged on Update unless clear_labels.
        annotations:
          type: object
          title: annotations
          additionalProperties:
            type: string
            title: value
          description: Operator notes / non-indexed metadata. Same merge-by-default semantics as labels.
        etag:
          type: string
          title: etag
          description: |-
            ETag for optimistic concurrency. Server generates from the row's version + update_time;
             every mutation that takes an etag refuses to apply when the supplied etag doesn't match
             the current row, returning Aborted. Treat as opaque on the client side.
        updateTimeUnix:
          type:
            - integer
            - string
          title: update_time_unix
          format: int64
          description: Last-modified time, mirrors the underlying row's update_time. Useful for sorting + UI.
        billingMode:
          title: billing_mode
          description: Current billing mode. HOURLY = per-hour usage; MONTHLY_* = prepaid term.
          $ref: '#/components/schemas/aes.compute.v1.BillingMode'
        commitmentEndAtUnix:
          type:
            - integer
            - string
          title: commitment_end_at_unix
          format: int64
          description: |-
            For MONTHLY_*: when the prepaid term ends. After this passes the renewal worker either
             re-charges (autorenew=true) or flips the row back to HOURLY. Zero when billing_mode is
             HOURLY.
        autorenew:
          type: boolean
          title: autorenew
          description: |-
            For MONTHLY_*: whether the renewal worker should auto-charge for the next term when
             this one ends. Customer toggles via SetVMAutorenew. Ignored when billing_mode is HOURLY.
        privateIpv4:
          type: string
          title: private_ipv4
          description: |-
            ────────────── Runtime-derived fields (populated from KubeVirt at Get/List time) ──────────────
             These are NOT stored in the compute_instances row. Get/List handlers query the DC's
             KubeVirt apiserver and fill them so the API surface matches reality (private IP from the
             tenant UDN, host node, disk size, boot image, KubeVirt status.printableStatus). Empty when
             the VM has been deleted or the cluster is unreachable — `state` then reads `DELETED`/`UNKNOWN`.

             Tenant-private IPv4 from the project's UserDefinedNetwork. Pinned across stop/start by
             OVN-K's IPAMClaim. Routable only inside the tenant network (cross-network requires explicit
             peering); for outbound internet egress the VM uses its public NIC when one is allocated.
        hostNode:
          type: string
          title: host_node
          description: |-
            K8s Node hosting the virt-launcher pod (e.g. "worker-01"). Useful for capacity reports
             and live-migration affinity hints.
        statusDetail:
          type: string
          title: status_detail
          description: |-
            KubeVirt VirtualMachine.status.printableStatus — finer-grained than `state`. Values:
             "Running", "Starting", "Stopping", "Stopped", "Provisioning", "ErrImagePull", "Unknown",
             and others. Use for UI surfacing of transient phases that don't map cleanly to `state`.
        hostname:
          type: string
          title: hostname
          description: |-
            User-facing hostname (DNS-1123 label, ≤63 chars). Written to the VM's k8s object name and
             injected as cloud-init `set_hostname`. Customer chooses; defaults to the resource id if
             omitted at create time.
        networkName:
          type: string
          title: network_name
          description: |-
            Tenant network the VM is attached to (`projects/{p}/networks/{id}`). Each VM has exactly
             one network — the network's namespace + Primary UDN provide the VM's single NIC and IPv6
             address. VMs in the same network can talk freely; cross-network requires explicit peering.
        publicIpv4:
          type: string
          title: public_ipv4
          description: |-
            Public IPv4 address allocated to this VM for the public NIC workflow. Empty when the VM
             was created without `assign_public_ipv4=true`. When set, this is the same value as the
             PublicIp resource's ip_address.
        ipv6:
          type: string
          title: ipv6
          description: |-
            IPv6 address from the tenant Network's /64, on the VM's primary NIC. Pinned across
             stop/start by the same IPAMClaim that pins private_ipv4. Note: this is NOT "private"
             in the RFC1918 sense — when the DC's tenant prefix is a real GUA /48, this address
             is globally routable. The OVN-K UDN provides tenant isolation at the network layer,
             not via address scope. Lab DCs using ULA-style /48s see locally-scoped addresses here.
        bootDisk:
          type: string
          title: boot_disk
          description: |-
            The Disk resource bound as the VM's boot device (`projects/{p}/disks/{id}`). Set on every
             persistent VM (containerDisk lab/ephemeral VMs leave it empty). The disk has its own
             lifecycle: DeleteVirtualMachine detaches it but does not delete it, so a customer can bind
             the same boot_disk to a fresh VM and keep their data. Use GetDisk for size + source URL.
        vcpus:
          type: integer
          title: vcpus
          format: int32
          description: |-
            Configurator shape — the (vcpus, ram_gib, cpu_class) the VM was created with. Stored on
             compute_instances; drives the per-component usage events the metering loop emits hourly.
        ramGib:
          type: integer
          title: ram_gib
          format: int32
        cpuClass:
          type: string
          title: cpu_class
        currentCostPerHourMinorDecimal:
          type: string
          title: current_cost_per_hour_minor_decimal
          description: |-
            ────────────── Live cost fields (computed at Get-time, not persisted) ──────────────
             current_cost_per_hour_minor_decimal: the hourly rate this VM would accrue in HOURLY mode
             at current rates, including boot disk + any public IP. NUMERIC text so sub-cent precision
             (e.g. "0.342465" for a 1-vCPU cascadelake VM) survives the wire. Zero string ("0") when
             the VM is in a state that doesn't bill (DELETED, etc.) or rates aren't seeded.

             Why decimal: a small VM's hourly rate is fractional cents — rounding to int64 hides the
             truth and customers see "$0/hr". The portal displays the decimal value to 4-6 places.

             mtd_spend_minor_decimal: month-to-date wallet debits attributed to this VM, summed from
             ledger_postings joined to settled usage_events via journal_entry_id. Reflects what the
             customer has actually paid for this VM since start-of-month UTC. Sub-cent residue still
             sitting in pending_charge_accumulator is NOT counted (it hasn't been charged yet).
        mtdSpendMinorDecimal:
          type: string
          title: mtd_spend_minor_decimal
        linuxUsername:
          type: string
          title: linux_username
          description: |-
            Linux login user cloud-init created for SSH access (`ssh <linux_username>@<public_ipv4>`).
             Set from CreateVirtualMachineRequest.linux_username. Empty on VMs created with a raw
             user_data cloud-config (the customer's YAML owns user creation) or on pre-feature rows.
      title: VirtualMachine
      additionalProperties: false
    aes.compute.v1.VirtualMachine.AnnotationsEntry:
      type: object
      properties:
        key:
          type: string
          title: key
        value:
          type: string
          title: value
      title: AnnotationsEntry
      additionalProperties: false
    aes.compute.v1.VirtualMachine.LabelsEntry:
      type: object
      properties:
        key:
          type: string
          title: key
        value:
          type: string
          title: value
      title: LabelsEntry
      additionalProperties: false
    aes.compute.v1.VmSnapshot:
      type: object
      properties:
        name:
          type: string
          title: name
          description: Resource name `projects/{project}/vm-snapshots/{id}`.
        displayName:
          type: string
          title: display_name
        projectName:
          type: string
          title: project_name
        datacenterName:
          type: string
          title: datacenter_name
        sourceVm:
          type: string
          title: source_vm
          description: Resource name of the source VM at snapshot creation time.
        sizeGib:
          type: integer
          title: size_gib
          format: int32
          description: Sum of disk sizes at snapshot time (used for billing units).
        state:
          type: string
          title: state
          description: CREATING / READY / DELETING / DELETED.
        createTimeUnix:
          type:
            - integer
            - string
          title: create_time_unix
          format: int64
        updateTimeUnix:
          type:
            - integer
            - string
          title: update_time_unix
          format: int64
        labels:
          type: object
          title: labels
          additionalProperties:
            type: string
            title: value
        annotations:
          type: object
          title: annotations
          additionalProperties:
            type: string
            title: value
        currentCostPerHourMinorDecimal:
          type: string
          title: current_cost_per_hour_minor_decimal
          description: |-
            ────────────── Live cost fields (computed at Get/List-time, not persisted) ──
             Hourly rate this snapshot accrues against the wallet at current pricing:
               size_gib × pricing_components(storage_snapshot_gib, standard).unit_price_minor
             NUMERIC text so fractional cents survive the wire (a 40 GiB backup costs
             ~0.55 cents per hour — int64 would round to 1 and overstate by ~80%).
             Zero ("0") when rates aren't seeded or the snapshot is in a non-billing
             state (DELETED, etc.); empty ("") only when the field is uninitialised.
        monthlyCostMinorDecimal:
          type: string
          title: monthly_cost_minor_decimal
          description: |-
            Convenience: monthly rate at 730 hours/month. Same precision rules; the
             SPA displays this directly so the customer doesn't have to multiply.
      title: VmSnapshot
      additionalProperties: false
      description: |-
        MachineImage is a registered URL pointing at a streamable raw disk image. Resource name:
         `projects/{project}/images/{image_id}`. Day-1 images are external URLs (S3/GCS/operator
         HTTP); a cluster-internal upload endpoint is a future story.
         VmSnapshot is a point-in-time copy of a VM (definition + every PVC). Backed by KubeVirt's
         VirtualMachineSnapshot CRD on the DC cluster. State machine: CREATING → READY → DELETING →
         DELETED. Survives source VM deletion (the snapshot row is independent).
    aes.compute.v1.VmSnapshot.AnnotationsEntry:
      type: object
      properties:
        key:
          type: string
          title: key
        value:
          type: string
          title: value
      title: AnnotationsEntry
      additionalProperties: false
    aes.compute.v1.VmSnapshot.LabelsEntry:
      type: object
      properties:
        key:
          type: string
          title: key
        value:
          type: string
          title: value
      title: LabelsEntry
      additionalProperties: false
    aes.health.v1.CheckRequest:
      type: object
      title: CheckRequest
      additionalProperties: false
    aes.health.v1.CheckResponse:
      type: object
      properties:
        status:
          type: string
          title: status
        version:
          type: string
          title: version
          description: |-
            Server build version (e.g. "0.0.1-rc235"). Empty when the binary was built without
             ldflags injection — defaults to "dev" in that case. SPA renders it in the footer so
             operators can confirm which backend tag is running.
      title: CheckResponse
      additionalProperties: false
    aes.iam.v1.AcceptInviteRequest:
      type: object
      properties:
        acceptToken:
          type: string
          title: accept_token
      title: AcceptInviteRequest
      additionalProperties: false
    aes.iam.v1.AcceptInviteResponse:
      type: object
      properties:
        organizationName:
          type: string
          title: organization_name
        principal:
          type: string
          title: principal
        apiKey:
          title: api_key
          $ref: '#/components/schemas/aes.iam.v1.ApiKey'
        secret:
          type: string
          title: secret
        needsCredentials:
          type: boolean
          title: needs_credentials
          description: |-
            True when the accepted user has no password set AND no linked OIDC identity, meaning
             the only way back into the account today is the now-consumed invite token. The SPA
             forces a credential-setup step (SetInitialPassword or LinkOidcProvider) before sending
             the user to the dashboard. Existing users get false here.
      title: AcceptInviteResponse
      additionalProperties: false
    aes.iam.v1.ApiKey:
      type: object
      properties:
        name:
          type: string
          title: name
          description: |-
            Resource name `api-keys/<sha256-hex>` (AIP-122 canonical form). The slug after the prefix
             is the SHA-256 hex of the key — use this with RevokeApiKey.
        principal:
          type: string
          title: principal
          description: Owner principal (always the caller for keys minted via IamService).
        defaultProject:
          type: string
          title: default_project
          description: Default project the key authorises requests against when no explicit project is given.
        displayName:
          type: string
          title: display_name
          description: Caller-supplied label for UX (e.g. "ci-bot-prod"). Not validated for uniqueness.
        keyPrefix:
          type: string
          title: key_prefix
          description: |-
            First few characters of the secret — convenient for matching when revoking. Never the full
             secret.
        createTimeUnix:
          type:
            - integer
            - string
          title: create_time_unix
          format: int64
        expiresAtUnix:
          type:
            - integer
            - string
          title: expires_at_unix
          format: int64
          description: 0 when the key never expires.
        revokedAtUnix:
          type:
            - integer
            - string
          title: revoked_at_unix
          format: int64
          description: 0 when the key is still active.
        scopeProject:
          type: string
          title: scope_project
          description: |-
            When non-empty, the key is HARD-SCOPED to this project. Requests targeting other projects
             (or org-level resources) are rejected with PermissionDenied regardless of the principal's
             bindings. Use this for least-privilege keys (CI bots, app integrations). Empty means the
             key inherits the full set of the principal's bindings — `default_project` above is just a
             UX fallback, not a scope.
      title: ApiKey
      additionalProperties: false
      description: |-
        ApiKey describes a key without exposing the secret. Used in ListApiKeys and as the metadata
         half of CreateApiKey's response (the secret half is on CreateApiKeyResponse.secret).
    aes.iam.v1.ChangePasswordRequest:
      type: object
      properties:
        currentPassword:
          type: string
          title: current_password
        newPassword:
          type: string
          title: new_password
      title: ChangePasswordRequest
      additionalProperties: false
    aes.iam.v1.ChangePasswordResponse:
      type: object
      title: ChangePasswordResponse
      additionalProperties: false
    aes.iam.v1.CheckPermissionRequest:
      type: object
      properties:
        principal:
          type: string
          title: principal
          description: When empty, uses the authenticated principal from the request context (requires API key auth on metalhostd).
        permission:
          type: string
          title: permission
          description: Permission id, e.g. admin.platform or admin.catalog.read.
        resourceName:
          type: string
          title: resource_name
          description: Resource scope for bindings, e.g. //metalhost/platform. Empty defaults to //metalhost/platform.
      title: CheckPermissionRequest
      additionalProperties: false
    aes.iam.v1.CheckPermissionResponse:
      type: object
      properties:
        allowed:
          type: boolean
          title: allowed
      title: CheckPermissionResponse
      additionalProperties: false
    aes.iam.v1.CompleteOidcLoginRequest:
      type: object
      properties:
        providerName:
          type: string
          title: provider_name
        code:
          type: string
          title: code
          description: Authorization code from the IdP redirect.
        state:
          type: string
          title: state
          description: Echo of the state we issued in StartOidcLogin.
        redirectUri:
          type: string
          title: redirect_uri
      title: CompleteOidcLoginRequest
      additionalProperties: false
    aes.iam.v1.CompleteOidcLoginResponse:
      type: object
      properties:
        principal:
          type: string
          title: principal
          description: Set when MFA enforcement is NOT engaged for this principal — single-leg OIDC path.
        apiKey:
          title: api_key
          $ref: '#/components/schemas/aes.iam.v1.ApiKey'
        secret:
          type: string
          title: secret
        mfaChallengeToken:
          type: string
          title: mfa_challenge_token
          description: |-
            P0-4: same semantics as LoginResponse.mfa_challenge_token — when set, api_key + secret are
             empty and the caller must finish via SubmitMFAChallenge.
      title: CompleteOidcLoginResponse
      additionalProperties: false
    aes.iam.v1.CreateApiKeyRequest:
      type: object
      properties:
        displayName:
          type: string
          title: display_name
          description: Optional label, e.g. "laptop" or "ci-bot". Echoed back; not validated for uniqueness.
        defaultProject:
          type: string
          title: default_project
          description: |-
            Project the key targets when no explicit project is supplied on a request. Empty falls
             back to the caller's existing default_project. The caller must have access to this project.
        projectScoped:
          type: boolean
          title: project_scoped
          description: |-
            When true, the key is hard-scoped to `default_project` — every request authenticated by
             this key is rejected with PermissionDenied unless it targets that project. Cross-project
             and org-level access are blocked even for principals that hold admin.organization or
             admin.platform. Use this for CI bots / app integrations that should never reach beyond
             their tenant project. The resulting key's `ApiKey.scope_project` field is set to the same
             value as `default_project`. Default false (key inherits the principal's full bindings).
      title: CreateApiKeyRequest
      additionalProperties: false
    aes.iam.v1.CreateApiKeyResponse:
      type: object
      properties:
        apiKey:
          title: api_key
          $ref: '#/components/schemas/aes.iam.v1.ApiKey'
        secret:
          type: string
          title: secret
          description: |-
            The plaintext secret. Returned ONCE — store it immediately. Subsequent ListApiKeys calls
             expose only metadata.
      title: CreateApiKeyResponse
      additionalProperties: false
    aes.iam.v1.CreateWorkspaceRequest:
      type: object
      properties:
        slug:
          type: string
          title: slug
          description: |-
            Bare workspace slug the user typed (server normalizes: lowercase + trim). Becomes the org
             resource name `organizations/<slug>`. Validated against DNS-1035 + reserved rules.
        displayName:
          type: string
          title: display_name
          description: |-
            Human-facing workspace name shown in the UI (org display_name). Falls back to the slug
             when empty.
      title: CreateWorkspaceRequest
      additionalProperties: false
    aes.iam.v1.CreateWorkspaceResponse:
      type: object
      properties:
        organizationName:
          type: string
          title: organization_name
          description: The org resource name `organizations/<slug>` that was created.
      title: CreateWorkspaceResponse
      additionalProperties: false
    aes.iam.v1.EnrollMFARequest:
      type: object
      properties:
        displayName:
          type: string
          title: display_name
          description: Optional — e.g. "iPhone 15".
      title: EnrollMFARequest
      additionalProperties: false
    aes.iam.v1.EnrollMFAResponse:
      type: object
      properties:
        device:
          title: device
          $ref: '#/components/schemas/aes.iam.v1.MFADevice'
        secret:
          type: string
          title: secret
          description: |-
            Cleartext shared secret. Returned exactly once, not stored anywhere the caller can read
             again — they must enter it (or scan the QR) into their authenticator app NOW.
        provisioningUri:
          type: string
          title: provisioning_uri
          description: |-
            Provisioning URI: `otpauth://totp/{Issuer}:{Account}?secret=...&issuer={Issuer}` — most
             authenticator apps render this as a QR code.
      title: EnrollMFAResponse
      additionalProperties: false
    aes.iam.v1.GetAuthMetadataRequest:
      type: object
      title: GetAuthMetadataRequest
      additionalProperties: false
    aes.iam.v1.GetAuthMetadataResponse:
      type: object
      properties:
        supportsApiKey:
          type: boolean
          title: supports_api_key
        oidcIssuerUrl:
          type: string
          title: oidc_issuer_url
          description: OIDC issuer URL for interactive login (e.g. https://issuer.example.com). Empty if not configured.
        oidcAudience:
          type: string
          title: oidc_audience
          description: Optional audience for OIDC tokens when enforced at the gateway.
        supportsOidc:
          type: boolean
          title: supports_oidc
          description: True when an issuer is configured (discovery / token validation may still be gateway-only in Phase 0).
        supportsRbac:
          type: boolean
          title: supports_rbac
          description: True when CheckPermission is backed by policy (Postgres iam_bindings / role_permissions in metalhostd).
      title: GetAuthMetadataResponse
      additionalProperties: false
    aes.iam.v1.GetCallerIdentityRequest:
      type: object
      title: GetCallerIdentityRequest
      additionalProperties: false
    aes.iam.v1.GetCallerIdentityResponse:
      type: object
      properties:
        principal:
          type: string
          title: principal
          description: The authenticated principal, e.g. "users/alice" or "serviceAccounts/bot".
        defaultProject:
          type: string
          title: default_project
          description: The default project attached to the bearer token, or empty.
        scopeProject:
          type: string
          title: scope_project
          description: |-
            When non-empty, the bearer token is hard-scoped to this project — cross-project requests
             are rejected by RequireProjectAccess. Empty means the token has no project scope (its
             permissions are limited only by the principal's role bindings).
        accessibleOrganizations:
          type: array
          items:
            type: string
          title: accessible_organizations
          description: |-
            Organizations the caller has an iam_bindings row against (any role). Useful for the
             portal landing resolver: when this is non-empty but default_project is empty, the user
             has access to ≥1 org but hasn't created/been-assigned a project yet — route them to
             the onboarding wizard. Empty list means the user has no org access at all (orphan
             account; very rare).
      title: GetCallerIdentityResponse
      additionalProperties: false
    aes.iam.v1.GetOrgMemberRequest:
      type: object
      properties:
        organizationName:
          type: string
          title: organization_name
          description: organizations/<slug>
        principal:
          type: string
          title: principal
          description: users/<slug>
      title: GetOrgMemberRequest
      additionalProperties: false
    aes.iam.v1.GetOrgMemberResponse:
      type: object
      properties:
        member:
          title: member
          $ref: '#/components/schemas/aes.iam.v1.OrgMember'
      title: GetOrgMemberResponse
      additionalProperties: false
    aes.iam.v1.GetUserRequest:
      type: object
      properties:
        name:
          type: string
          title: name
          description: Empty name means "the caller". Non-empty fetches a specific user (permission required).
