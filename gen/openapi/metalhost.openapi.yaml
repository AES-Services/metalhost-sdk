          type: string
          title: parent
          description: The project the disk belongs to (`projects/{id}`).
        disk:
          title: disk
          description: |-
            The disk to create. size_gib / storage_class / datacenter_name / network_name are required;
             state / name / timestamps are OUTPUT_ONLY and ignored here.
          $ref: '#/components/schemas/aes.storage.v1.Disk'
        diskId:
          type: string
          title: disk_id
          description: Optional client-supplied id; the server assigns one when empty.
        fromImageUrl:
          type: string
          title: from_image_url
          description: |-
            Optional create-only hydration source (not a persisted resource field): stream a raw disk
             image from this URL (e.g. an Ubuntu cloud image) into the new disk during PROVISIONING.
             The image is written byte-for-byte; the disk flips to AVAILABLE once import completes.
             Billed from AVAILABLE/ATTACHED — PROVISIONING is not metered, so no charge during import.
      title: CreateDiskRequest
      additionalProperties: false
      description: |-
        CreateDiskRequest follows AIP-133 standard-create: a parent, the resource to create, and an
         optional client-chosen id. All disk attributes live on the nested Disk (size, tier, datacenter,
         network, display_name, labels, annotations). OUTPUT_ONLY fields on `disk` are ignored.
