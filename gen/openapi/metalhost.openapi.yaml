          type:
            - integer
            - string
          title: balance_alert_minor
          format: int64
        daysRemainingAlert:
          type: integer
          title: days_remaining_alert
          format: int32
        lastBalanceFiredAtUnix:
          type:
            - integer
            - string
          title: last_balance_fired_at_unix
          format: int64
