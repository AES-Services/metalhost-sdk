          title: created_at
          $ref: '#/components/schemas/google.protobuf.Timestamp'
      title: TicketMessage
      additionalProperties: false
    aes.support.v1.TicketPriority:
      type: string
      title: TicketPriority
      enum:
        - TICKET_PRIORITY_UNSPECIFIED
        - TICKET_PRIORITY_LOW
        - TICKET_PRIORITY_NORMAL
        - TICKET_PRIORITY_HIGH
        - TICKET_PRIORITY_URGENT
    aes.support.v1.TicketStatus:
      type: string
      title: TicketStatus
      enum:
        - TICKET_STATUS_UNSPECIFIED
        - TICKET_STATUS_OPEN
        - TICKET_STATUS_PENDING_CUSTOMER
        - TICKET_STATUS_PENDING_STAFF
        - TICKET_STATUS_RESOLVED
        - TICKET_STATUS_CLOSED
      description: |-
        Lifecycle states. PENDING_CUSTOMER means staff replied and we're waiting on the user;
         PENDING_STAFF means the user replied and we owe them a response. RESOLVED is set by staff
         (AdminSupportService.ResolveTicket); CLOSED is the terminal state — set when the customer
         confirms or auto-closes after an inactivity window. Customer-side CloseTicket goes
         directly to CLOSED.
