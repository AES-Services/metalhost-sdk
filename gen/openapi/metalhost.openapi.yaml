          title: value
      title: AnnotationsEntry
      additionalProperties: false
    aes.compute.v1.CloneVirtualMachineRequest.LabelsEntry:
      type: object
      properties:
        key:
          type: string
          title: key
        value:
          type: string
          title: value
      title: LabelsEntry
      additionalProperties: false
    aes.compute.v1.CloneVirtualMachineResponse:
