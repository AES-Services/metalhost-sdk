          $ref: '#/components/schemas/aes.ops.v1.Operation'
        virtualMachine:
          title: virtual_machine
          description: Set only for the synchronous create path.
          $ref: '#/components/schemas/aes.compute.v1.VirtualMachine'
      title: CreateVirtualMachineResponse
      additionalProperties: false
