              $ref: '#/components/schemas/aes.baremetal.v1.GetBareMetalVirtualMediaRequest'
        required: true
      responses:
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/connect.error'
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/aes.baremetal.v1.GetBareMetalVirtualMediaResponse'
  /aes.baremetal.v1.BareMetalService/ListAvailableBareMetal:
    post:
      tags:
        - aes.baremetal.v1.BareMetalService
      summary: ListAvailableBareMetal
      description: |-
        ListAvailableBareMetal returns published, unleased, priced hosts the caller can lease, with
         discovered specs + monthly price. No BMC/serial identifiers are exposed.
      operationId: aes.baremetal.v1.BareMetalService.ListAvailableBareMetal
      parameters:
        - name: Connect-Protocol-Version
          in: header
          required: true
          schema:
            $ref: '#/components/schemas/connect-protocol-version'
        - name: Connect-Timeout-Ms
          in: header
          schema:
            $ref: '#/components/schemas/connect-timeout-header'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/aes.baremetal.v1.ListAvailableBareMetalRequest'
        required: true
      responses:
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/connect.error'
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/aes.baremetal.v1.ListAvailableBareMetalResponse'
  /aes.baremetal.v1.BareMetalService/ListBareMetalISOs:
    post:
      tags:
        - aes.baremetal.v1.BareMetalService
      summary: ListBareMetalISOs
      description: |-
        ListBareMetalISOs lists the org's uploaded install ISOs (the library shown on the mgmt page
         and the console's ISO picker).
