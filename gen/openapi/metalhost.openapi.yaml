    aes.iam.v1.LoginResponse:
      type: object
      properties:
        principal:
          type: string
          title: principal
          description: Set when MFA enforcement is NOT engaged for this principal — single-leg login path.
        apiKey:
          title: api_key
          $ref: '#/components/schemas/aes.iam.v1.ApiKey'
        secret:
          type: string
          title: secret
        mfaChallengeToken:
          type: string
          title: mfa_challenge_token
          description: |-
            P0-4: when the principal's org has require_mfa=TRUE AND the principal has at least one
             ACTIVE mfa_credentials row, the server returns ONLY this challenge token (api_key + secret
             empty) and the SPA/CLI must call SubmitMFAChallenge with the token + TOTP code (or
             recovery_code) to finish the login. 5-minute TTL, single-use, max 5 wrong attempts.
      title: LoginResponse
      additionalProperties: false
