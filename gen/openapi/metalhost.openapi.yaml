          content:
            application/json:
              schema:
                $ref: '#/components/schemas/connect.error'
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/aes.baremetal.v1.RenewBareMetalNowResponse'
  /aes.baremetal.v1.BareMetalService/SetBareMetalBootDevice:
    post:
      tags:
        - aes.baremetal.v1.BareMetalService
      summary: SetBareMetalBootDevice
      description: |-
        SetBareMetalBootDevice sets the one-time boot device (disk / cdrom / pxe) and power-cycles.
         Use cdrom after AttachBareMetalISO to boot the installer; the next reboot falls back to disk.
      operationId: aes.baremetal.v1.BareMetalService.SetBareMetalBootDevice
      parameters:
        - name: Connect-Protocol-Version
          in: header
          required: true
          schema:
            $ref: '#/components/schemas/connect-protocol-version'
        - name: Connect-Timeout-Ms
          in: header
          schema:
            $ref: '#/components/schemas/connect-timeout-header'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/aes.baremetal.v1.SetBareMetalBootDeviceRequest'
        required: true
      responses:
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/connect.error'
        "200":
          description: Success
          content:
