          description: |-
            Short-lived websocket path (expires after 60s). Single-use; a current browser session
             (cookie) or Authorization: Bearer is also required to connect (defense-in-depth).
        expiresAtUnix:
          type:
            - integer
            - string
          title: expires_at_unix
          format: int64
        vncPassword:
          type: string
          title: vnc_password
          description: |-
            Per-session VNC password the noVNC client authenticates with (≤8 chars — RFB limit). The
             BMC's VNC server is only reachable through Metalhost, so this is defense-in-depth behind
             the token+cookie gate, not the primary control.
      title: GetBareMetalConsoleURLResponse
      additionalProperties: false
    aes.baremetal.v1.GetBareMetalInstanceRequest:
      type: object
      properties:
        name:
          type: string
          title: name
