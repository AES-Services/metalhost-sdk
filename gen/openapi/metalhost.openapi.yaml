    aes.storage.v1.Disk:
      type: object
      properties:
        name:
          type: string
          title: name
          description: Resource name `projects/{project}/disks/{id}`.
        displayName:
          type: string
          title: display_name
        projectName:
          type: string
          title: project_name
        datacenterName:
          type: string
          title: datacenter_name
        sizeGib:
          type: integer
          title: size_gib
          format: int32
        storageClass:
          type: string
          title: storage_class
          description: |-
            Customer-facing storage tier — currently `nvme` only. Translated per-DC to a real k8s
             StorageClass at PVC create time — see the DC's `aes.metalhost/storage-class-nvme` annotation.
        state:
          type: string
          title: state
          description: PROVISIONING / AVAILABLE / ATTACHED / DELETING / DELETED.
        attachedVm:
          type: string
          title: attached_vm
          description: VM the disk is currently attached to (`virtual-machines/{id}`); empty when AVAILABLE.
        createTimeUnix:
          type:
            - integer
            - string
          title: create_time_unix
          format: int64
        updateTimeUnix:
          type:
            - integer
            - string
          title: update_time_unix
          format: int64
        labels:
          type: object
          title: labels
          additionalProperties:
            type: string
            title: value
        annotations:
          type: object
          title: annotations
          additionalProperties:
            type: string
            title: value
        networkName:
          type: string
          title: network_name
          description: |-
            Tenant Network the disk's PVC lives in (`projects/{p}/networks/{id}`). Disks are
             namespace-scoped because KubeVirt only mounts PVCs in the same k8s namespace as the VM.
             Set at create time; immutable. Disks can only attach to VMs on the same Network.
      title: Disk
      additionalProperties: false
      description: |-
        Disk is a persistent block volume backed by a PVC in the datacenter cluster's metalhost-vms
         namespace. State machine:
           PROVISIONING → AVAILABLE → ATTACHED → AVAILABLE (on detach) → DELETING → DELETED
         Attached disks cannot be deleted — detach first.
    aes.storage.v1.Disk.AnnotationsEntry:
      type: object
      properties:
        key:
          type: string
          title: key
        value:
          type: string
          title: value
      title: AnnotationsEntry
      additionalProperties: false
    aes.storage.v1.Disk.LabelsEntry:
      type: object
      properties:
        key:
          type: string
          title: key
        value:
          type: string
          title: value
      title: LabelsEntry
      additionalProperties: false
    aes.storage.v1.FileShare:
      type: object
      properties:
        name:
          type: string
          title: name
          description: Resource name `projects/{project}/file-shares/{slug}`.
        projectName:
          type: string
          title: project_name
        datacenterName:
          type: string
          title: datacenter_name
        sizeGib:
          type: integer
          title: size_gib
          format: int32
        state:
          type: string
          title: state
          description: PROVISIONING / AVAILABLE / DELETING / DELETED.
        storageClass:
          type: string
          title: storage_class
          description: |-
            Storage tier alias (e.g. "cephfs-rwx"). Today only "cephfs-rwx" is offered; the value
             identifies which DC NFS gateway to use, not a k8s StorageClass.
        displayName:
          type: string
          title: display_name
        labels:
          type: object
          title: labels
          additionalProperties:
            type: string
            title: value
        annotations:
          type: object
          title: annotations
          additionalProperties:
            type: string
            title: value
        createTimeUnix:
          type:
            - integer
            - string
          title: create_time_unix
          format: int64
        updateTimeUnix:
          type:
            - integer
            - string
          title: update_time_unix
          format: int64
        nfsServerEndpoint:
          type: string
          title: nfs_server_endpoint
          description: |-
            NFS server endpoint customers mount over (host[:port]). Same address for every share in
             a DC — one Ganesha gateway exposes many exports. Allocated from the DC's
             public-ipv4-pool, advertised via MetalLB.
        nfsExportPath:
          type: string
          title: nfs_export_path
          description: |-
            Pseudo path inside the NFS export namespace. Per-share UUID — knowing the path is
             necessary but not sufficient for access (Ganesha's per-export ACL whitelists the
             tenant network CIDR; mounts from outside that CIDR get permission denied).
        mountCommand:
          type: string
          title: mount_command
          description: |-
            Convenience: the full mount command for a Linux guest. e.g.
             `mount -t nfs4 209.135.147.135:/projects/<uuid>/<uuid> /mnt/share`. Customers paste this
             into cloud-init or run by hand — any VM on the tenant network is allowed by the
             Ganesha export ACL.
      title: FileShare
      additionalProperties: false
    aes.storage.v1.FileShare.AnnotationsEntry:
      type: object
      properties:
        key:
          type: string
          title: key
        value:
          type: string
          title: value
      title: AnnotationsEntry
      additionalProperties: false
    aes.storage.v1.FileShare.LabelsEntry:
      type: object
      properties:
        key:
          type: string
          title: key
        value:
          type: string
          title: value
      title: LabelsEntry
      additionalProperties: false
