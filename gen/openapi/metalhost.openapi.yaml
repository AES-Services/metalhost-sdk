    aes.compute.v1.DeleteVirtualMachineRequest:
      type: object
      properties:
        name:
          type: string
          title: name
          description: Resource name, e.g. `virtual-machines/{id}`.
        etag:
          type: string
          title: etag
          description: |-
            Optimistic concurrency. Empty = unconditional delete; non-empty = require match against
             current row's etag, else Aborted.
        deleteAttachedDisks:
          type: boolean
          title: delete_attached_disks
          description: |-
            When true, also delete the disks currently attached to this VM (boot + data) instead of
             detaching them back to AVAILABLE. Disk-first default is false — disks outlive the VM so a
             customer can rebuild onto the same boot disk. Set true to fully tear down the VM and
             reclaim its storage in one action. Irreversible: the disk data is destroyed.
      title: DeleteVirtualMachineRequest
      additionalProperties: false
    aes.compute.v1.DeleteVirtualMachineResponse:
      type: object
      properties:
        operation:
          title: operation
          description: 'Set when delete is async: poll GetOperation until SUCCEEDED.'
          $ref: '#/components/schemas/aes.ops.v1.Operation'
      title: DeleteVirtualMachineResponse
      additionalProperties: false
