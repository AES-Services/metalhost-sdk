  /aes.baremetal.v1.BareMetalService/EnterBareMetalRescueMode:
    post:
      tags:
        - aes.baremetal.v1.BareMetalService
      summary: EnterBareMetalRescueMode
      description: |-
        EnterRescueMode boots the host into a rescue image via Redfish one-time boot override
         followed by a power cycle. The rescue image URL is the operator's responsibility (set
         via METALHOST_BM_RESCUE_IMAGE_URL or per-DC annotation `aes.metalhost/bm-rescue-image-url`).
         The instance's spec.rescue_mode flag is set so subsequent reads / future workers know
         the host is in rescue. ExitRescueMode reverses this — clears the boot override and
         power-cycles back to the normal disk boot order.
      operationId: aes.baremetal.v1.BareMetalService.EnterBareMetalRescueMode
      parameters:
        - name: Connect-Protocol-Version
          in: header
          required: true
          schema:
            $ref: '#/components/schemas/connect-protocol-version'
        - name: Connect-Timeout-Ms
          in: header
          schema:
            $ref: '#/components/schemas/connect-timeout-header'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/aes.baremetal.v1.EnterBareMetalRescueModeRequest'
        required: true
      responses:
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/connect.error'
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/aes.baremetal.v1.EnterBareMetalRescueModeResponse'
  /aes.baremetal.v1.BareMetalService/ExitBareMetalRescueMode:
