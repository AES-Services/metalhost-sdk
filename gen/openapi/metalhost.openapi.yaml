    aes.catalog.v1.GpuModelCapacity:
      type: object
      properties:
        gpuModel:
          type: string
          title: gpu_model
          description: e.g. "h100"
        total:
          type: integer
          title: total
          format: int32
          description: allocatable GPUs of this model in the pool
        free:
          type: integer
          title: free
          format: int32
          description: currently unleased
        reserveVcpu:
          type:
            - integer
            - string
          title: reserve_vcpu
          format: int64
          description: Operator-set per-GPU reservation kept free for an unsold GPU (physical units). Informational.
        reserveRamGib:
          type:
            - integer
            - string
          title: reserve_ram_gib
          format: int64
        maxNodeFreeVcpu:
          type:
            - integer
            - string
          title: max_node_free_vcpu
          format: int64
          description: |-
            Largest single VM (vCPU / RAM, oversubscribe-adjusted) that can schedule on the most-free node
             currently holding a free GPU of this model — RAW node free, BEFORE the reservation kept for the
             node's other unsold GPUs. A GPU VM lands on ONE node, so this — not the pool sum — bounds how
             big a GPU VM can be. 0 when the live probe is unavailable.
        maxNodeFreeRamGib:
          type:
            - integer
            - string
          title: max_node_free_ram_gib
          format: int64
        maxNodeFreeGpus:
          type: integer
          title: max_node_free_gpus
          format: int32
          description: |-
            Free GPUs of this model on that same representative node. The configurator subtracts
             reserve_* × (max_node_free_gpus − requested_count) from the raw node free above, so renting MORE
             GPUs frees the reservation held for the node's remaining GPUs (more CPU/RAM for the VM).
      title: GpuModelCapacity
      additionalProperties: false
      description: GpuModelCapacity is the whole-GPU availability for one GPU model within a pool.
    aes.catalog.v1.ListDatacentersRequest:
