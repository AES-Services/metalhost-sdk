                $ref: '#/components/schemas/connect.error'
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/aes.wallet.v1.AttachPaymentMethodResponse'
  /aes.wallet.v1.WalletService/ConfigureAutoRecharge:
    post:
      tags:
        - aes.wallet.v1.WalletService
      summary: ConfigureAutoRecharge
      description: |-
        Auto-recharge — opt-in. Customer enables Stripe auto-charge by setting enabled=true with a
         saved payment_method, threshold, and amount. The dispatcher only picks wallets where
         enabled = TRUE; Metalhost never charges a card without explicit consent. Disable by setting
         enabled=false (config is preserved so re-enabling doesn't require resubmitting threshold/amount).
      operationId: aes.wallet.v1.WalletService.ConfigureAutoRecharge
      parameters:
        - name: Connect-Protocol-Version
          in: header
          required: true
          schema:
            $ref: '#/components/schemas/connect-protocol-version'
        - name: Connect-Timeout-Ms
          in: header
          schema:
            $ref: '#/components/schemas/connect-timeout-header'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/aes.wallet.v1.ConfigureAutoRechargeRequest'
        required: true
      responses:
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/connect.error'
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/aes.wallet.v1.ConfigureAutoRechargeResponse'
  /aes.wallet.v1.WalletService/ConfigureWalletAlerts:
    post:
      tags:
        - aes.wallet.v1.WalletService
      summary: ConfigureWalletAlerts
      description: |-
        Wallet alerts. One config per wallet: balance_alert_minor (fire when prepay balance drops
         below) and/or days_remaining_alert (fire when balance / daily burn falls below this many
         days). Either can be unset (NULL) to disable that alert. Edge-fire arming — fires once
         when the condition first becomes true, re-arms when balance recovers above the threshold.
         Customer-side refunds are not modeled: open a support ticket; operator refunds via
         Stripe Dashboard and the charge.refunded webhook posts the ledger entry.
      operationId: aes.wallet.v1.WalletService.ConfigureWalletAlerts
      parameters:
        - name: Connect-Protocol-Version
          in: header
          required: true
          schema:
            $ref: '#/components/schemas/connect-protocol-version'
        - name: Connect-Timeout-Ms
          in: header
          schema:
            $ref: '#/components/schemas/connect-timeout-header'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/aes.wallet.v1.ConfigureWalletAlertsRequest'
        required: true
      responses:
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/connect.error'
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/aes.wallet.v1.ConfigureWalletAlertsResponse'
