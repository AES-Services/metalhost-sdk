      title: MaintenanceWindow
      additionalProperties: false
    aes.catalog.v1.QuoteVirtualMachineRequest:
      type: object
      properties:
        vcpus:
          type: integer
          title: vcpus
          format: int32
          description: |-
            Same fields as CreateVirtualMachineRequest's configurator slice. Validated under the
             same 1–16 GiB-per-vCPU ratio bounds; an out-of-range shape returns InvalidArgument.
        ramGib:
          type: integer
          title: ram_gib
          format: int32
        cpuClass:
          type: string
          title: cpu_class
        bootDiskGib:
          type: integer
          title: boot_disk_gib
          format: int32
        extraDiskGib:
          type: integer
          title: extra_disk_gib
          format: int32
        publicIpv4Count:
          type: integer
          title: public_ipv4_count
          format: int32
        currency:
          type: string
          title: currency
          description: default USD
        gpuModel:
          type: string
          title: gpu_model
          description: |-
            Whole-GPU passthrough. gpu_model is the SKU variant (e.g. "rtx4090"), gpu_count the number of
             cards; priced via compute.gpu.<model>.runtime_hours. Empty/0 = CPU-only quote.
        gpuCount:
          type: integer
          title: gpu_count
          format: int32
      title: QuoteVirtualMachineRequest
      additionalProperties: false
    aes.catalog.v1.QuoteVirtualMachineResponse:
      type: object
      properties:
        hourlyMinor:
          type:
            - integer
            - string
          title: hourly_minor
          format: int64
          description: |-
            ROUND-to-int64 view for clients that don't want to parse decimals. For shapes whose
             hourly cost is sub-cent (typical for small configurator VMs at $2.50/vCPU-month) this
             rounds — use hourly_minor_decimal for the exact NUMERIC.
        monthly1Minor:
          type:
            - integer
            - string
          title: monthly_1_minor
          format: int64
          description: |-
            Per-term prepayment totals for each MONTHLY_* tier, in minor units. Discount applied:
             MONTHLY_1 = 0%, MONTHLY_3 = 5%, MONTHLY_6 = 8%, MONTHLY_12 = 12%. Calculated as
             hourly × 730 hours × months × (1 - discount/100), rounded once at the end.
        monthly3Minor:
          type:
            - integer
            - string
          title: monthly_3_minor
          format: int64
        monthly6Minor:
          type:
            - integer
            - string
          title: monthly_6_minor
          format: int64
        monthly12Minor:
          type:
            - integer
            - string
          title: monthly_12_minor
          format: int64
        currency:
          type: string
          title: currency
        hourlyMinorDecimal:
          type: string
          title: hourly_minor_decimal
          description: |-
            Exact NUMERIC text values mirroring the int64 fields above (1.0 = 1 cent, 6 decimals
             of sub-cent precision). Clients that need to compose further math (display hourly,
             pro-rate by elapsed seconds, etc.) should consume these instead of the rounded int64s.
        monthly1MinorDecimal:
          type: string
          title: monthly_1_minor_decimal
        monthly3MinorDecimal:
          type: string
          title: monthly_3_minor_decimal
        monthly6MinorDecimal:
          type: string
          title: monthly_6_minor_decimal
        monthly12MinorDecimal:
          type: string
          title: monthly_12_minor_decimal
      title: QuoteVirtualMachineResponse
      additionalProperties: false
    aes.catalog.v1.RegionHealth:
      type: object
      properties:
        datacenterName:
          type: string
          title: datacenter_name
        status:
          type: string
          title: status
        capacityPct:
          type: integer
          title: capacity_pct
          format: int32
        degradedComponents:
          type: array
          items:
            type: string
          title: degraded_components
        healthSummary:
          type: string
          title: health_summary
        lastUpdatedUnix:
          type:
            - integer
            - string
          title: last_updated_unix
          format: int64
        vmSellableVcpu:
          type:
            - integer
            - string
          title: vm_sellable_vcpu
          format: int64
          description: |-
            VM CPU capacity. sellable = total vCPU a customer can buy; running = in use;
             free = available. Presented to customers as plain vCPU counts.
        vmRunningVcpu:
          type:
            - integer
            - string
          title: vm_running_vcpu
          format: int64
        vmFreeVcpu:
          type:
            - integer
            - string
          title: vm_free_vcpu
          format: int64
        vmSellableRamGib:
          type:
            - integer
            - string
          title: vm_sellable_ram_gib
          format: int64
          description: |-
            VM RAM capacity. sellable = total RAM a customer can buy; running = Σ ram_gib of
             RUNNING VMs; free = headroom.
        vmRunningRamGib:
          type:
            - integer
            - string
          title: vm_running_ram_gib
          format: int64
        vmFreeRamGib:
          type:
            - integer
            - string
          title: vm_free_ram_gib
          format: int64
        storageUsableGib:
          type:
            - integer
            - string
          title: storage_usable_gib
          format: int64
          description: |-
            Block storage capacity (post-replication usable). usable = total after replication;
             free = available. Zero when the datacenter has no storage capacity data (stale/unavailable).
        storageFreeGib:
          type:
            - integer
            - string
          title: storage_free_gib
          format: int64
        reachable:
          type: boolean
          title: reachable
          description: |-
            Whether this region's control plane is currently reachable. When false the region is
             temporarily offline: new VM creates are paused and capacity figures are last-known.
             Defaults true.
        unreachableSinceUnix:
          type:
            - integer
            - string
          title: unreachable_since_unix
          format: int64
          description: Unix seconds the region became unreachable (0 when reachable).
      title: RegionHealth
      additionalProperties: false
      description: |-
        RegionHealth is the customer-visible summary of a DC's current state. capacity_pct is the
         % of compute hosts currently allocated (0..100); status is the DC's `state` mapped to a
         human-friendly summary; degraded_components lists subsystems with non-OK status.
    aes.catalog.v1.VMClassCapacity:
      type: object
      properties:
        cpuClass:
          type: string
          title: cpu_class
          description: e.g. "cascadelake", "genoa"
        sellableVcpu:
          type:
            - integer
            - string
          title: sellable_vcpu
          format: int64
        freeVcpu:
          type:
            - integer
            - string
          title: free_vcpu
          format: int64
        sellableRamGib:
          type:
            - integer
            - string
          title: sellable_ram_gib
          format: int64
        freeRamGib:
          type:
            - integer
            - string
          title: free_ram_gib
          format: int64
        capacityPct:
          type: integer
          title: capacity_pct
          format: int32
          description: |-
            Most-utilized dimension (cpu/ram/gpu) as 0..100 — a pool is "full" when this hits 100 even if
             another dimension has headroom (binding-resource rule).
        gpus:
          type: array
          items:
            $ref: '#/components/schemas/aes.catalog.v1.GpuModelCapacity'
          title: gpus
          description: GPU availability per model in this pool (empty for non-GPU pools).
        maxNodeFreeVcpu:
          type:
            - integer
            - string
          title: max_node_free_vcpu
          format: int64
          description: |-
            Largest single CPU VM (vCPU / RAM, oversubscribe-adjusted) that can schedule on this class's
             most-free node. A VM lands on ONE node, so this bounds the configurator sliders — the pool
             sum (free_vcpu/free_ram_gib) can be admitted but then stay Pending if no single node fits.
             0 when the live probe is unavailable.
        maxNodeFreeRamGib:
          type:
            - integer
            - string
          title: max_node_free_ram_gib
          format: int64
      title: VMClassCapacity
      additionalProperties: false
      description: VMClassCapacity is the sellable capacity of one pool = (datacenter, cpu_class).
    aes.compute.v1.BillingMode:
      type: string
      title: BillingMode
      enum:
        - BILLING_MODE_UNSPECIFIED
        - BILLING_MODE_HOURLY
        - BILLING_MODE_MONTHLY_1
        - BILLING_MODE_MONTHLY_3
        - BILLING_MODE_MONTHLY_6
        - BILLING_MODE_MONTHLY_12
      description: |-
        BillingMode picks how a VM is charged: per-hour (post-paid usage events) or upfront monthly
         commitment at a discounted rate. Server treats UNSPECIFIED as HOURLY so missing the field
         on Create gets the default behavior.
    aes.compute.v1.BootDiskSpec:
      type: object
      properties:
        displayName:
          type: string
          title: display_name
        sizeGib:
          type: integer
          title: size_gib
          format: int32
          description: 1..1024 GiB.
        storageClass:
          type: string
          title: storage_class
          description: Storage tier (`nvme`). Defaults to nvme.
        fromImageUrl:
          type: string
          title: from_image_url
          description: |-
            Streamable raw disk image URL. Required UNLESS clone_source_disk is set (clone path
             supplies the data by snapshotting an existing disk instead).
        labels:
          type: object
          title: labels
          additionalProperties:
            type: string
            title: value
        annotations:
          type: object
          title: annotations
          additionalProperties:
            type: string
            title: value
        cloneSourceDisk:
          type: string
          title: clone_source_disk
          description: |-
            Clone path: when set, this boot disk is created by copying the named source Disk rather
             than importing from from_image_url. Set by CloneVirtualMachine; customers don't set this
             directly. size_gib is derived from the source.
      title: BootDiskSpec
      additionalProperties: false
      description: |-
        BootDiskSpec is the inline disk spec carried by CreateVirtualMachineRequest.boot_disk.
         from_image_url is required — empty source is rejected (every boot disk needs an OS
         image). The resulting Disk is owned by the same project as the VM and persists past
         DeleteVirtualMachine.
    aes.compute.v1.BootDiskSpec.AnnotationsEntry:
      type: object
      properties:
        key:
          type: string
          title: key
        value:
          type: string
          title: value
      title: AnnotationsEntry
      additionalProperties: false
    aes.compute.v1.BootDiskSpec.LabelsEntry:
      type: object
      properties:
        key:
          type: string
          title: key
        value:
          type: string
          title: value
      title: LabelsEntry
      additionalProperties: false
    aes.compute.v1.CloneVirtualMachineRequest:
      type: object
      properties:
        sourceVmName:
          type: string
          title: source_vm_name
          description: Source VM resource name to clone from.
        targetDisplayName:
          type: string
          title: target_display_name
          description: |-
            Display name for the new VM. Required so the customer can distinguish the clone in
             listings — the resource name itself is server-assigned.
        labels:
          type: object
          title: labels
          additionalProperties:
            type: string
            title: value
          description: |-
            Labels/annotations applied to the new VM (NOT inherited from the source — clone is for
             disk state, not metadata).
        annotations:
          type: object
          title: annotations
          additionalProperties:
            type: string
            title: value
      title: CloneVirtualMachineRequest
      additionalProperties: false
    aes.compute.v1.CloneVirtualMachineRequest.AnnotationsEntry:
      type: object
      properties:
        key:
          type: string
          title: key
        value:
          type: string
          title: value
      title: AnnotationsEntry
      additionalProperties: false
    aes.compute.v1.CloneVirtualMachineRequest.LabelsEntry:
      type: object
      properties:
        key:
          type: string
          title: key
        value:
          type: string
          title: value
      title: LabelsEntry
      additionalProperties: false
    aes.compute.v1.CloneVirtualMachineResponse:
      type: object
      properties:
        virtualMachine:
          title: virtual_machine
          $ref: '#/components/schemas/aes.compute.v1.VirtualMachine'
        vmSnapshotName:
          type: string
          title: vm_snapshot_name
          description: |-
            The intermediate snapshot the clone was taken from. Useful for retry / audit; the
             customer can reuse it to clone again or roll back.
        operation:
          title: operation
          description: |-
            When async provisioning is configured, the long-running operation tracking the clone.
             Empty in sync mode.
          $ref: '#/components/schemas/aes.ops.v1.Operation'
      title: CloneVirtualMachineResponse
      additionalProperties: false
