        labels:
          type: object
          title: labels
          additionalProperties:
            type: string
            title: value
        annotations:
          type: object
          title: annotations
          additionalProperties:
            type: string
            title: value
        kubernetesVersion:
          type: string
          title: kubernetes_version
        kubevirtVersion:
