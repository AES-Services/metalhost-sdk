    aes.compute.v1.UserSpec:
      type: object
      properties:
        name:
          type: string
          title: name
          description: Login name. `^[a-z_][a-z0-9_-]{0,31}$`, and not `root`. Required.
        password:
          type: string
          title: password
          description: |-
            Optional plaintext password. Sent over TLS, hashed server-side ($6$ SHA-512 crypt) into the
             cloud-init seed. NEVER persisted plaintext and never echoed back on Get/List. When any user
             has a password, cloud-init `ssh_pwauth` is enabled; otherwise it stays disabled.
        sudo:
          type: boolean
          title: sudo
          description: Grant passwordless sudo (ALL=(ALL) NOPASSWD:ALL).
        sshKeys:
          type: array
          items:
            type: string
          title: ssh_keys
          description: |-
            Registered SSHKey resource refs (`projects/{p}/ssh-keys/{id}`), merged into this user's
             ssh_authorized_keys.
        sshPubkey:
          type: string
          title: ssh_pubkey
          description: Inline OpenSSH public key(s), newline-separated. Merged after ssh_keys.
      title: UserSpec
      additionalProperties: false
    aes.compute.v1.VMBillingSpec:
      type: object
      properties:
        mode:
          title: mode
          description: HOURLY (default) = per-hour usage. MONTHLY_* prepays the full term upfront at the tier discount.
          $ref: '#/components/schemas/aes.compute.v1.BillingMode'
        autorenew:
          type: boolean
          title: autorenew
          description: 'For MONTHLY_*: auto-renew at term end. Ignored when HOURLY.'
      title: VMBillingSpec
      additionalProperties: false
    aes.compute.v1.VMBootSpec:
      type: object
      properties:
        image:
          type: string
          title: image
          description: |-
            Curated catalog image id (e.g. "ubuntu-24-04") — resolved server-side to an image URL +
             the distro's default login user. Mutually exclusive with image_url/disk_name.
        imageUrl:
          type: string
          title: image_url
          description: |-
            Raw streamable image URL — escape hatch for non-catalog images. Mutually exclusive with
             image/disk_name.
        diskGib:
          type: integer
          title: disk_gib
          format: int32
          description: Boot disk size GiB (1..1024). Required when image/image_url is set.
        diskName:
          type: string
          title: disk_name
          description: |-
            Bind a pre-existing Disk as boot instead of importing an image (`projects/{p}/disks/{id}`).
             The disk must be AVAILABLE, same project+DC, unattached. Mutually exclusive with image/image_url.
      title: VMBootSpec
      additionalProperties: false
    aes.compute.v1.VMComputeSpec:
      type: object
      properties:
        cpuClass:
          type: string
          title: cpu_class
          description: CPU class — must have published pricing and capacity in the datacenter. Required.
        vcpus:
          type: integer
          title: vcpus
          format: int32
          description: required, validated against the RAM-per-vCPU ratio bounds
        ramGib:
          type: integer
          title: ram_gib
          format: int32
          description: required
        gpu:
          title: gpu
          description: Optional whole-GPU passthrough. Omit for a CPU-only VM.
          $ref: '#/components/schemas/aes.compute.v1.GPUSpec'
      title: VMComputeSpec
      additionalProperties: false
    aes.compute.v1.VMNetworkSpec:
      type: object
      properties:
        network:
          type: string
          title: network
          description: |-
            Tenant network `projects/{p}/networks/{id}`. Empty → the project's default network
             (auto-created lazily on first VM in the project + DC).
        publicIpv4:
          type: boolean
          title: public_ipv4
          description: |-
            Allocate a public IPv4 for the VM's public NIC (the scarce, billed extra). IPv6 comes
             free on the public NIC regardless (see VirtualMachine.public_ipv6) unless private_only.
             Default false.
        securityGroups:
          type: array
          items:
            type: string
          title: security_groups
          description: |-
            Internal security groups to attach to the VM's private NIC at create
             (`organizations/{org}/projects/{p}/securityGroups/{id}`). Empty = open within the VPC.
        privateOnly:
          type: boolean
          title: private_only
          description: |-
            private_only attaches NO public NIC at all — no public IPv4, no public IPv6, no inbound
             internet surface. The VM still has outbound internet via the private NIC's NAT. Default
             false: every VM gets a public NIC with a free IPv6 GUA. Use for air-gapped-ish workloads.
      title: VMNetworkSpec
      additionalProperties: false
    aes.compute.v1.VMUtilization:
      type: object
      properties:
        virtualMachineName:
          type: string
          title: virtual_machine_name
        cpuPct:
          type: number
          title: cpu_pct
          format: double
          description: 0-100, normalized to the VM's vCPU count.
        memPct:
          type: number
          title: mem_pct
          format: double
          description: 0-100 of guest-visible memory in use.
        gpuPct:
          type: number
          title: gpu_pct
          format: double
          description: |-
            0-100 averaged across the VM's GPUs. 0 for CPU-only VMs or when GPU telemetry
             isn't reporting.
        idleDays:
          type: integer
          title: idle_days
          format: int32
          description: |-
            Consecutive days the VM has stayed under the idle threshold (CPU and, when present,
             GPU averaging below 10%). 0 = active. Stopping idle workloads is the dashboard's
             first cost-hygiene suggestion.
      title: VMUtilization
      additionalProperties: false
    aes.compute.v1.VirtualMachine:
      type: object
      properties:
        name:
          type: string
          title: name
        projectName:
          type: string
          title: project_name
        datacenterName:
          type: string
          title: datacenter_name
        state:
          type: string
          title: state
          description: |-
            Current lifecycle state — PROVISIONING / BOOTING / RUNNING / RESTARTING / STOPPING /
             STOPPED / STOPPED_FOR_NONPAYMENT / FAILED / ORPHANED / DELETING / DELETED. Updated after
             the corresponding lifecycle RPC succeeds. A VM that can no longer be found on its host
             surfaces as ORPHANED (and is restored automatically if it reappears); reads may reflect
             that transition.
        createTimeUnix:
          type:
            - integer
            - string
          title: create_time_unix
          format: int64
        labels:
          type: object
          title: labels
          additionalProperties:
            type: string
            title: value
          description: User-facing labels (filterable, indexed externally). Merged on Update unless clear_labels.
        annotations:
          type: object
          title: annotations
          additionalProperties:
            type: string
            title: value
          description: Operator notes / non-indexed metadata. Same merge-by-default semantics as labels.
        etag:
          type: string
          title: etag
          description: |-
            ETag for optimistic concurrency. Server generates from the row's version + update_time;
             every mutation that takes an etag refuses to apply when the supplied etag doesn't match
             the current row, returning Aborted. Treat as opaque on the client side.
        updateTimeUnix:
          type:
            - integer
            - string
          title: update_time_unix
          format: int64
          description: Last-modified time, mirrors the underlying row's update_time. Useful for sorting + UI.
        billingMode:
          title: billing_mode
          description: Current billing mode. HOURLY = per-hour usage; MONTHLY_* = prepaid term.
          $ref: '#/components/schemas/aes.compute.v1.BillingMode'
        commitmentEndAtUnix:
          type:
            - integer
            - string
          title: commitment_end_at_unix
          format: int64
          description: |-
            For MONTHLY_*: when the prepaid term ends. After this passes the renewal worker either
             re-charges (autorenew=true) or flips the row back to HOURLY. Zero when billing_mode is
             HOURLY.
        autorenew:
          type: boolean
          title: autorenew
          description: |-
            For MONTHLY_*: whether the renewal worker should auto-charge for the next term when
             this one ends. Customer toggles via SetVMAutorenew. Ignored when billing_mode is HOURLY.
        privateIpv4:
          type: string
          title: private_ipv4
          description: |-
            ────────────── Runtime-derived fields (populated live at Get/List time) ──────────────
             These are NOT stored; Get/List handlers read them from the datacenter so the API surface
             matches reality (private IP, host node, disk size, boot image, detailed status). Empty when
             the VM has been deleted or is unreachable — `state` then reads `DELETED`/`UNKNOWN`.

             Tenant-private IPv4 from the project's network. Pinned across stop/start. Routable only
             inside the tenant network (cross-network requires explicit peering); for outbound internet
             egress the VM uses its public NIC when one is allocated.
        hostNode:
          type: string
          title: host_node
          description: |-
            Host the VM runs on (e.g. "worker-01"). Useful for capacity reports and migration
             affinity hints.
        statusDetail:
          type: string
          title: status_detail
          description: |-
            Finer-grained status than `state`. Values: "Running", "Starting", "Stopping", "Stopped",
             "Provisioning", "ErrImagePull", "Unknown", and others. Use for UI surfacing of transient
             phases that don't map cleanly to `state`.
        hostname:
          type: string
          title: hostname
          description: |-
            User-facing hostname (DNS-1123 label, ≤63 chars). Injected as the guest's cloud-init
             hostname. Customer chooses; defaults to the resource id if omitted at create time.
        networkName:
          type: string
          title: network_name
          description: |-
            Tenant network the VM is attached to (`projects/{p}/networks/{id}`). Each VM has exactly
             one network, which provides the VM's single NIC and IPv6 address. VMs in the same network
             can talk freely; cross-network requires explicit peering.
        publicIpv4:
          type: string
          title: public_ipv4
          description: |-
            Public IPv4 address allocated to this VM for the public NIC workflow. Empty when the VM
             was created without `assign_public_ipv4=true`. When set, this is the same value as the
             PublicIp resource's ip_address.
        publicIpv6:
          type: string
          title: public_ipv6
          description: |-
            Public IPv6 address on the same public NIC as public_ipv4. Included automatically with
             the public IP in IPv6-enabled datacenters — no extra request flag and no extra charge.
             Statically configured and pinned for the VM's lifetime. Empty when the VM has no public
             IP or the datacenter doesn't offer IPv6 yet.
        bootDisk:
          type: string
          title: boot_disk
          description: |-
            The Disk resource bound as the VM's boot device (`projects/{p}/disks/{id}`). Set on every
             persistent VM (ephemeral lab VMs leave it empty). The disk has its own
             lifecycle: DeleteVirtualMachine detaches it but does not delete it, so a customer can bind
             the same boot_disk to a fresh VM and keep their data. Use GetDisk for size + source URL.
        vcpus:
          type: integer
          title: vcpus
          format: int32
          description: |-
            Configurator shape — the (vcpus, ram_gib, cpu_class) the VM was created with. Drives the
             per-component hourly usage events.
        ramGib:
          type: integer
          title: ram_gib
          format: int32
        cpuClass:
          type: string
          title: cpu_class
        gpuModel:
          type: string
          title: gpu_model
          description: |-
            Whole-GPU passthrough attached to the VM. gpu_model is the SKU variant (e.g. "rtx4090");
             gpu_count is how many physical cards. Empty / 0 for a CPU-only VM. Drives the
             compute.gpu.<model>.runtime_hours meter.
        gpuCount:
          type: integer
          title: gpu_count
          format: int32
        currentCostPerHourMinorDecimal:
          type: string
          title: current_cost_per_hour_minor_decimal
          description: |-
            ────────────── Live cost fields (computed at Get-time, not persisted) ──────────────
             current_cost_per_hour_minor_decimal: the hourly rate this VM would accrue in HOURLY mode
             at current rates, including boot disk + any public IP. NUMERIC text so sub-cent precision
             (e.g. "0.342465" for a 1-vCPU cascadelake VM) survives the wire. Zero string ("0") when
             the VM is in a state that doesn't bill (DELETED, etc.) or rates aren't seeded.

             Why decimal: a small VM's hourly rate is fractional cents — rounding to int64 hides the
             truth and customers see "$0/hr". The portal displays the decimal value to 4-6 places.

             mtd_spend_minor_decimal: month-to-date wallet debits attributed to this VM. Reflects what
             the customer has actually paid for this VM since start-of-month UTC. Sub-cent residue not
             yet charged is NOT counted.
        mtdSpendMinorDecimal:
          type: string
          title: mtd_spend_minor_decimal
        linuxUsername:
          type: string
          title: linux_username
          description: |-
            Linux login user cloud-init created for SSH access (`ssh <linux_username>@<public_ipv4>`).
             Set from CreateVirtualMachineRequest.linux_username. Empty on VMs created with a raw
             user_data cloud-config (the customer's YAML owns user creation) or on pre-feature rows.
        securityGroups:
          type: array
          items:
            type: string
          title: security_groups
          description: |-
            Internal security groups attached to this VM's private NIC
             (`organizations/{org}/projects/{p}/securityGroups/{id}`). Empty = the VM is open to the
             rest of the VPC (default). Editable post-create via Add/RemoveVmFromSecurityGroup.
        datacenterReachable:
          type: boolean
          title: datacenter_reachable
          description: |-
            Whether this VM's datacenter is currently reachable from the control plane. Computed live at
             Get/List time (not stored). When false, the datacenter is temporarily offline: `state` and the
             other runtime-derived fields above are LAST-KNOWN (as of the last successful sync, not live),
             and lifecycle actions are paused until it reconnects. Defaults true.
        datacenterUnreachableSinceUnix:
          type:
            - integer
            - string
          title: datacenter_unreachable_since_unix
          format: int64
          description: |-
            Unix seconds the VM's datacenter became unreachable (0 when reachable). Lets the UI show how
             long the outage has lasted ("offline 3m").
      title: VirtualMachine
      additionalProperties: false
    aes.compute.v1.VirtualMachine.AnnotationsEntry:
      type: object
      properties:
        key:
          type: string
          title: key
        value:
          type: string
          title: value
      title: AnnotationsEntry
      additionalProperties: false
    aes.compute.v1.VirtualMachine.LabelsEntry:
      type: object
      properties:
        key:
          type: string
          title: key
        value:
          type: string
          title: value
      title: LabelsEntry
      additionalProperties: false
    aes.compute.v1.VirtualMachineManifest:
      type: object
      properties:
        apiVersion:
          type: string
          title: api_version
          description: '"compute.metalhost.io/v1" (optional; validated when set)'
        kind:
          type: string
          title: kind
          description: '"VirtualMachine" (optional; validated when set)'
        metadata:
          title: metadata
          $ref: '#/components/schemas/aes.compute.v1.VirtualMachineMetadata'
        spec:
          title: spec
          $ref: '#/components/schemas/aes.compute.v1.VirtualMachineSpec'
      title: VirtualMachineManifest
      additionalProperties: false
      description: |-
        ───────────────────────────── Declarative VM manifest ─────────────────────────────
         The customer-facing, CLI-and-web-shared create document (docs/specs/VM_DECLARATIVE_MANIFEST_AND_USERS.md).
         CreateVirtualMachine takes this directly; the web configures it and sends it, and (planned)
         `metalhost vm apply -f vm.yaml` deserializes YAML into the same message — one schema, the YAML
         is just its serialization. api_version/kind round-trip the YAML form; the server validates them
         when present but they carry no behavior (the RPC method already implies kind=VirtualMachine).
    aes.compute.v1.VirtualMachineMetadata:
      type: object
      properties:
        name:
          type: string
          title: name
          description: Hostname (DNS-1123 label, ≤63 chars). Empty → server defaults to the VM's resource id slug.
        project:
          type: string
          title: project
          description: Owning project `projects/{slug}`. Empty → the principal's default project.
        labels:
          type: object
          title: labels
          additionalProperties:
            type: string
            title: value
          description: User-facing labels stamped at create time (filterable). `aes.metalhost/*` keys are reserved.
        annotations:
          type: object
          title: annotations
          additionalProperties:
            type: string
            title: value
          description: Operator notes / non-indexed metadata. Same `aes.metalhost/*` reservation.
      title: VirtualMachineMetadata
      additionalProperties: false
    aes.compute.v1.VirtualMachineMetadata.AnnotationsEntry:
      type: object
      properties:
        key:
          type: string
          title: key
        value:
          type: string
          title: value
      title: AnnotationsEntry
      additionalProperties: false
    aes.compute.v1.VirtualMachineMetadata.LabelsEntry:
      type: object
      properties:
        key:
          type: string
          title: key
        value:
          type: string
          title: value
      title: LabelsEntry
      additionalProperties: false
    aes.compute.v1.VirtualMachineSpec:
      type: object
      properties:
        region:
          type: string
          title: region
          description: Target datacenter `datacenters/{slug}`. Required.
        compute:
          title: compute
          description: Configurator shape. Required.
          $ref: '#/components/schemas/aes.compute.v1.VMComputeSpec'
        boot:
          title: boot
          description: Boot source. Required (one of image / image_url / disk_name).
          $ref: '#/components/schemas/aes.compute.v1.VMBootSpec'
        network:
          title: network
          description: Network attachment + public IP choice.
          $ref: '#/components/schemas/aes.compute.v1.VMNetworkSpec'
        users:
          type: array
          items:
            $ref: '#/components/schemas/aes.compute.v1.UserSpec'
          title: users
          description: |-
            Login users created via cloud-init. Empty AND cloud_init empty → no inbound login (console
             only). When cloud_init is set it OWNS user creation and users is ignored.
        cloudInit:
          type: string
          title: cloud_init
          description: |-
            Raw #cloud-config userdata. When set, replaces all generated cloud-init (users included).
             Must be valid `#cloud-config` YAML.
        billing:
          title: billing
          description: Billing term. Defaults to HOURLY.
          $ref: '#/components/schemas/aes.compute.v1.VMBillingSpec'
      title: VirtualMachineSpec
      additionalProperties: false
    aes.compute.v1.VmSnapshot:
      type: object
      properties:
        name:
          type: string
          title: name
          description: Resource name `projects/{project}/vm-snapshots/{id}`.
        displayName:
          type: string
          title: display_name
        projectName:
          type: string
          title: project_name
        datacenterName:
          type: string
          title: datacenter_name
        sourceVm:
          type: string
          title: source_vm
          description: Resource name of the source VM at snapshot creation time.
        sizeGib:
          type: integer
          title: size_gib
          format: int32
          description: Sum of disk sizes at snapshot time (used for billing units).
        state:
          type: string
          title: state
          description: CREATING / READY / DELETING / DELETED.
        createTimeUnix:
          type:
            - integer
            - string
          title: create_time_unix
          format: int64
        updateTimeUnix:
          type:
            - integer
            - string
          title: update_time_unix
          format: int64
        labels:
          type: object
          title: labels
          additionalProperties:
            type: string
            title: value
        annotations:
          type: object
          title: annotations
          additionalProperties:
            type: string
            title: value
        currentCostPerHourMinorDecimal:
          type: string
          title: current_cost_per_hour_minor_decimal
          description: |-
            ────────────── Live cost fields (computed at Get/List-time, not persisted) ──
             Hourly rate this snapshot accrues against the wallet at current pricing
             (size_gib × the snapshot storage unit price).
             NUMERIC text so fractional cents survive the wire (a 40 GiB backup costs
             ~0.55 cents per hour — int64 would round to 1 and overstate by ~80%).
             Zero ("0") when rates aren't seeded or the snapshot is in a non-billing
             state (DELETED, etc.); empty ("") only when the field is uninitialised.
        monthlyCostMinorDecimal:
          type: string
          title: monthly_cost_minor_decimal
          description: |-
            Convenience: monthly rate at 730 hours/month. Same precision rules; the
             SPA displays this directly so the customer doesn't have to multiply.
      title: VmSnapshot
      additionalProperties: false
      description: |-
        MachineImage is a registered URL pointing at a streamable raw disk image. Resource name:
         `projects/{project}/images/{image_id}`. Day-1 images are external URLs (S3/GCS/operator
         HTTP); a managed upload endpoint is a future story.
         VmSnapshot is a point-in-time copy of a VM (definition + every disk). State machine:
         CREATING → READY → DELETING → DELETED. Survives source VM deletion (the snapshot row is
         independent).
    aes.compute.v1.VmSnapshot.AnnotationsEntry:
      type: object
      properties:
        key:
          type: string
          title: key
        value:
          type: string
          title: value
      title: AnnotationsEntry
      additionalProperties: false
    aes.compute.v1.VmSnapshot.LabelsEntry:
      type: object
      properties:
        key:
          type: string
          title: key
        value:
          type: string
          title: value
      title: LabelsEntry
      additionalProperties: false
    aes.health.v1.CheckRequest:
      type: object
      title: CheckRequest
      additionalProperties: false
    aes.health.v1.CheckResponse:
      type: object
      properties:
        status:
          type: string
          title: status
        version:
          type: string
          title: version
          description: |-
            Server build version (e.g. "0.0.1-rc235"). Empty when the binary was built without
             ldflags injection — defaults to "dev" in that case. SPA renders it in the footer so
             operators can confirm which backend tag is running.
      title: CheckResponse
      additionalProperties: false
    aes.iam.v1.AcceptInviteRequest:
      type: object
      properties:
        acceptToken:
          type: string
          title: accept_token
      title: AcceptInviteRequest
      additionalProperties: false
    aes.iam.v1.AcceptInviteResponse:
      type: object
      properties:
        organizationName:
          type: string
          title: organization_name
        principal:
          type: string
          title: principal
        apiKey:
          title: api_key
          $ref: '#/components/schemas/aes.iam.v1.ApiKey'
        secret:
          type: string
          title: secret
        needsCredentials:
          type: boolean
          title: needs_credentials
          description: |-
            True when the accepted user has no password set AND no linked OIDC identity, meaning
             the only way back into the account today is the now-consumed invite token. The SPA
             forces a credential-setup step (SetInitialPassword or LinkOidcProvider) before sending
             the user to the dashboard. Existing users get false here.
      title: AcceptInviteResponse
      additionalProperties: false
    aes.iam.v1.AcceptMyInviteRequest:
      type: object
      properties:
        inviteId:
          type: string
          title: invite_id
      title: AcceptMyInviteRequest
      additionalProperties: false
    aes.iam.v1.AcceptMyInviteResponse:
      type: object
      properties:
        organizationName:
          type: string
          title: organization_name
      title: AcceptMyInviteResponse
      additionalProperties: false
    aes.iam.v1.ApiKey:
      type: object
      properties:
        name:
          type: string
          title: name
          description: |-
            Resource name `api-keys/<sha256-hex>` (AIP-122 canonical form). The slug after the prefix
             is the SHA-256 hex of the key — use this with RevokeApiKey.
        principal:
          type: string
          title: principal
          description: Owner principal (always the caller for keys minted via IamService).
        defaultProject:
          type: string
          title: default_project
          description: Default project the key authorises requests against when no explicit project is given.
        displayName:
          type: string
          title: display_name
          description: Caller-supplied label for UX (e.g. "ci-bot-prod"). Not validated for uniqueness.
        keyPrefix:
          type: string
          title: key_prefix
          description: |-
            First few characters of the secret — convenient for matching when revoking. Never the full
             secret.
        createTimeUnix:
          type:
            - integer
            - string
          title: create_time_unix
          format: int64
        expiresAtUnix:
          type:
            - integer
            - string
          title: expires_at_unix
          format: int64
          description: 0 when the key never expires.
        revokedAtUnix:
          type:
            - integer
            - string
          title: revoked_at_unix
          format: int64
          description: 0 when the key is still active.
        scopeProject:
          type: string
          title: scope_project
          description: |-
            When non-empty, the key is HARD-SCOPED to this project. Requests targeting other projects
             (or org-level resources) are rejected with PermissionDenied regardless of the principal's
             bindings. Use this for least-privilege keys (CI bots, app integrations). Empty means the
             key inherits the full set of the principal's bindings — `default_project` above is just a
             UX fallback, not a scope.
      title: ApiKey
      additionalProperties: false
      description: |-
        ApiKey describes a key without exposing the secret. Used in ListApiKeys and as the metadata
         half of CreateApiKey's response (the secret half is on CreateApiKeyResponse.secret).
    aes.iam.v1.ChangePasswordRequest:
      type: object
      properties:
        currentPassword:
          type: string
          title: current_password
        newPassword:
          type: string
          title: new_password
      title: ChangePasswordRequest
      additionalProperties: false
    aes.iam.v1.ChangePasswordResponse:
      type: object
      title: ChangePasswordResponse
      additionalProperties: false
    aes.iam.v1.CheckPermissionRequest:
      type: object
      properties:
        principal:
          type: string
          title: principal
          description: When empty, uses the authenticated principal from the request context (requires API key auth).
        permission:
          type: string
          title: permission
          description: Permission id, e.g. admin.platform or admin.catalog.read.
        resourceName:
          type: string
          title: resource_name
          description: Resource scope for bindings, e.g. //metalhost/platform. Empty defaults to //metalhost/platform.
      title: CheckPermissionRequest
      additionalProperties: false
    aes.iam.v1.CheckPermissionResponse:
      type: object
      properties:
        allowed:
          type: boolean
          title: allowed
      title: CheckPermissionResponse
      additionalProperties: false
    aes.iam.v1.CompleteOidcLoginRequest:
      type: object
      properties:
        providerName:
          type: string
          title: provider_name
        code:
          type: string
          title: code
          description: Authorization code from the IdP redirect.
        state:
          type: string
          title: state
          description: Echo of the state we issued in StartOidcLogin.
        redirectUri:
          type: string
          title: redirect_uri
      title: CompleteOidcLoginRequest
      additionalProperties: false
    aes.iam.v1.CompleteOidcLoginResponse:
      type: object
      properties:
        principal:
          type: string
          title: principal
          description: Set when MFA enforcement is NOT engaged for this principal — single-leg OIDC path.
        apiKey:
          title: api_key
          $ref: '#/components/schemas/aes.iam.v1.ApiKey'
        secret:
          type: string
          title: secret
        mfaChallengeToken:
          type: string
          title: mfa_challenge_token
          description: |-
            P0-4: same semantics as LoginResponse.mfa_challenge_token — when set, api_key + secret are
             empty and the caller must finish via SubmitMFAChallenge.
      title: CompleteOidcLoginResponse
      additionalProperties: false
    aes.iam.v1.CreateApiKeyRequest:
      type: object
      properties:
        displayName:
          type: string
          title: display_name
          description: Optional label, e.g. "laptop" or "ci-bot". Echoed back; not validated for uniqueness.
        defaultProject:
          type: string
          title: default_project
          description: |-
            Project the key targets when no explicit project is supplied on a request. Empty falls
             back to the caller's existing default_project. The caller must have access to this project.
        projectScoped:
          type: boolean
          title: project_scoped
          description: |-
            When true, the key is hard-scoped to `default_project` — every request authenticated by
             this key is rejected with PermissionDenied unless it targets that project. Cross-project
             and org-level access are blocked even for principals that hold admin.organization or
             admin.platform. Use this for CI bots / app integrations that should never reach beyond
             their tenant project. The resulting key's `ApiKey.scope_project` field is set to the same
             value as `default_project`. Default false (key inherits the principal's full bindings).
      title: CreateApiKeyRequest
      additionalProperties: false
    aes.iam.v1.CreateApiKeyResponse:
      type: object
      properties:
        apiKey:
          title: api_key
          $ref: '#/components/schemas/aes.iam.v1.ApiKey'
        secret:
          type: string
          title: secret
          description: |-
            The plaintext secret. Returned ONCE — store it immediately. Subsequent ListApiKeys calls
             expose only metadata.
      title: CreateApiKeyResponse
      additionalProperties: false
    aes.iam.v1.CreateWorkspaceRequest:
      type: object
      properties:
        slug:
          type: string
          title: slug
          description: |-
            Bare workspace slug the user typed (server normalizes: lowercase + trim). Becomes the org
             resource name `organizations/<slug>`. Validated against DNS-1035 + reserved rules.
        displayName:
          type: string
          title: display_name
          description: |-
            Human-facing workspace name shown in the UI (org display_name). Falls back to the slug
             when empty.
      title: CreateWorkspaceRequest
      additionalProperties: false
    aes.iam.v1.CreateWorkspaceResponse:
      type: object
      properties:
        organizationName:
          type: string
          title: organization_name
          description: The org resource name `organizations/<slug>` that was created.
      title: CreateWorkspaceResponse
      additionalProperties: false
    aes.iam.v1.DeclineMyInviteRequest:
      type: object
      properties:
        inviteId:
          type: string
          title: invite_id
      title: DeclineMyInviteRequest
      additionalProperties: false
    aes.iam.v1.DeclineMyInviteResponse:
      type: object
      title: DeclineMyInviteResponse
      additionalProperties: false
    aes.iam.v1.EnrollMFARequest:
