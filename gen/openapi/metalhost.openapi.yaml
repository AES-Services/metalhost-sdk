            IPv4 subnet CIDR allocated from the datacenter's private tenant prefix. Empty when the
             network is IPv6-only. Always a /24 in v1.
        subnetCidrV6:
          type: string
          title: subnet_cidr_v6
          description: |-
            IPv6 subnet CIDR allocated from the datacenter's tenant prefix. Always a /64.
             Public-routable, no NAT — IPv6 is native.
        ipRangeStart:
          type: string
          title: ip_range_start
          description: IP allocation range (inclusive). Empty = the full subnet is allocatable.
        ipRangeEnd:
          type: string
          title: ip_range_end
        createTimeUnix:
          type:
            - integer
            - string
          title: create_time_unix
          format: int64
        updateTimeUnix:
          type:
            - integer
            - string
          title: update_time_unix
          format: int64
        labels:
          type: object
          title: labels
          additionalProperties:
            type: string
            title: value
        annotations:
          type: object
          title: annotations
          additionalProperties:
            type: string
            title: value
        state:
          type: string
          title: state
          description: |-
            "creating" while the network is being provisioned; "active" when ready; "failed" on
             error; "deleting" / "deleted" during teardown. Read-only.
        ovnUdnName:
          type: string
          title: ovn_udn_name
          description: Internal identifier for the backing network resource. Output-only; opaque to clients.
        namespace:
          type: string
          title: namespace
          description: |-
            Internal network-segment identifier this Network's VMs live in. Output-only. VMs in the
             same Network can talk over the network's /24 + /64; VMs in different Networks are fully
             isolated.
      title: Network
      additionalProperties: false
      description: |-
        Network is a tenant-owned, isolated L2 segment within a single datacenter. Resource name
         format: `projects/{project}/networks/{network_id}`.

         The platform allocates an IPv6 /64 from the datacenter's tenant prefix (always) and an
         IPv4 /24 from the datacenter's private supernet (when requested). VLAN IDs are an internal
         detail and are not customer-visible.
    aes.network.v1.Network.AnnotationsEntry:
      type: object
      properties:
        key:
          type: string
          title: key
        value:
          type: string
          title: value
      title: AnnotationsEntry
      additionalProperties: false
    aes.network.v1.Network.LabelsEntry:
      type: object
      properties:
        key:
          type: string
          title: key
        value:
          type: string
          title: value
      title: LabelsEntry
      additionalProperties: false
    aes.network.v1.PortMapping:
      type: object
      properties:
        port:
          type: integer
          title: port
          format: int32
          description: |-
            External port (the one customers connect to), or the lower bound of a range. 1..65535.
             Ignored when protocol is ICMP (which is portless).
        protocol:
          type: string
          title: protocol
          description: 'Protocol: TCP, UDP, or ICMP. ICMP rules carry no port.'
        targetPort:
          type: integer
          title: target_port
          format: int32
          description: |-
            Internal port on the VM (where the service listens). Defaults to `port` when 0. Ignored
             on firewall rules — applies only to PublicIp port-forwarding (which we don't currently
             surface via the customer RPCs, but the field stays for the SDK and future LB work).
        endPort:
          type: integer
          title: end_port
          format: int32
          description: |-
            Upper bound of the port range. 0 (default) = single port; otherwise must be >= port and
             <= 65535.
      title: PortMapping
      additionalProperties: false
      description: |-
        PortMapping describes a single port or a contiguous port range to expose. ProtocolL4 is
         "TCP" or "UDP".

         Range semantics (firewall rules): when `end_port` is 0/unset the mapping covers the single
         `port`. When `end_port > 0` it must satisfy `port <= end_port` and the mapping covers
         every port in [port, end_port] inclusive. Useful for NodePort ranges (30000-32767),
         RTMP/SIP, or any service that listens on a window.
    aes.network.v1.PublicIp:
      type: object
      properties:
        name:
          type: string
          title: name
          description: Resource name `projects/{project}/public-ips/{id}`.
        displayName:
          type: string
          title: display_name
        projectName:
          type: string
          title: project_name
        datacenterName:
          type: string
          title: datacenter_name
        targetVm:
          type: string
          title: target_vm
          description: VM the IP routes to (`virtual-machines/{id}`).
        ipAddress:
          type: string
          title: ip_address
          description: The assigned address. Empty string while ALLOCATING.
        state:
          type: string
          title: state
          description: ALLOCATING / ACTIVE / DELETING / DELETED.
        ports:
          type: array
          items:
            $ref: '#/components/schemas/aes.network.v1.PortMapping'
          title: ports
        createTimeUnix:
          type:
            - integer
            - string
          title: create_time_unix
          format: int64
        updateTimeUnix:
          type:
            - integer
            - string
          title: update_time_unix
          format: int64
        labels:
          type: object
          title: labels
          additionalProperties:
            type: string
            title: value
        annotations:
          type: object
          title: annotations
          additionalProperties:
            type: string
            title: value
      title: PublicIp
      additionalProperties: false
      description: |-
        PublicIp is a customer-allocated public IPv4 reserved for a tenant VM from the datacenter's
         public IP pool.
    aes.network.v1.PublicIp.AnnotationsEntry:
      type: object
      properties:
        key:
          type: string
          title: key
        value:
          type: string
          title: value
      title: AnnotationsEntry
      additionalProperties: false
    aes.network.v1.PublicIp.LabelsEntry:
      type: object
      properties:
        key:
          type: string
          title: key
        value:
          type: string
          title: value
      title: LabelsEntry
      additionalProperties: false
    aes.network.v1.RemoveVmFromSecurityGroupRequest:
      type: object
      properties:
        securityGroup:
          type: string
          title: security_group
        vm:
          type: string
          title: vm
      title: RemoveVmFromSecurityGroupRequest
      additionalProperties: false
    aes.network.v1.RemoveVmFromSecurityGroupResponse:
      type: object
      properties:
        securityGroup:
          title: security_group
          $ref: '#/components/schemas/aes.network.v1.SecurityGroup'
      title: RemoveVmFromSecurityGroupResponse
      additionalProperties: false
    aes.network.v1.SecurityGroup:
      type: object
      properties:
        name:
          type: string
          title: name
        displayName:
          type: string
          title: display_name
        projectName:
          type: string
          title: project_name
        datacenterName:
          type: string
          title: datacenter_name
        rules:
          type: array
          items:
            $ref: '#/components/schemas/aes.network.v1.SecurityGroupRule'
          title: rules
        memberVms:
          type: array
          items:
            type: string
          title: member_vms
          description: |-
            VMs currently in this group (`virtual-machines/{id}`). Output-only — set/changed via
             AddVmToSecurityGroup / RemoveVmFromSecurityGroup or the VM's security_groups field.
        state:
          type: string
          title: state
          description: ACTIVE / DELETED. Read-only.
        createTimeUnix:
          type:
            - integer
            - string
          title: create_time_unix
          format: int64
        updateTimeUnix:
          type:
            - integer
            - string
          title: update_time_unix
          format: int64
        labels:
          type: object
          title: labels
          additionalProperties:
            type: string
            title: value
        annotations:
          type: object
          title: annotations
          additionalProperties:
            type: string
            title: value
        etag:
          type: string
          title: etag
          description: Optimistic-concurrency token for UpdateSecurityGroup. Read-only.
      title: SecurityGroup
      additionalProperties: false
      description: |-
        SecurityGroup is a reusable, project-scoped internal-firewall ruleset enforced on the
         private NIC of every VM that joins it. Resource name:
         `organizations/{org}/projects/{project}/securityGroups/{id}`.
    aes.network.v1.SecurityGroup.AnnotationsEntry:
      type: object
      properties:
        key:
          type: string
          title: key
        value:
          type: string
          title: value
      title: AnnotationsEntry
      additionalProperties: false
    aes.network.v1.SecurityGroup.LabelsEntry:
      type: object
      properties:
        key:
          type: string
          title: key
        value:
          type: string
          title: value
      title: LabelsEntry
      additionalProperties: false
    aes.network.v1.SecurityGroupRule:
      type: object
      allOf:
        - properties:
            id:
              type: string
              title: id
              description: Stable id within the group (server-assigned if empty on create). Used for diffing.
            direction:
              type: string
              title: direction
              description: '''ingress'' (peer = source) | ''egress'' (peer = destination). Default ingress.'
            protocol:
              type: string
              title: protocol
              description: '''tcp'' | ''udp'' | ''icmp''. ICMP ignores port/end_port (allows all ICMP + ICMPv6 — "ping").'
            port:
              type: integer
              title: port
              format: int32
              description: Single port, or lower bound of a range. 1..65535. Ignored for icmp.
            endPort:
              type: integer
              title: end_port
              format: int32
              description: Upper bound of a port range; 0 = single port. Ignored for icmp.
        - oneOf:
            - type: object
              properties:
                cidr:
                  type: string
                  title: cidr
              title: cidr
              required:
                - cidr
            - type: object
              properties:
                securityGroup:
                  type: string
                  title: security_group
              title: security_group
              required:
                - securityGroup
      title: SecurityGroupRule
      additionalProperties: false
      description: |-
        SecurityGroupRule allows traffic in one direction on the private NIC. A rule with no peer
         set means "any" (the whole VPC for that direction).
    aes.network.v1.UpdateSecurityGroupRequest:
      type: object
      properties:
        name:
          type: string
          title: name
        displayName:
          type: string
          title: display_name
        rules:
          type: array
          items:
            $ref: '#/components/schemas/aes.network.v1.SecurityGroupRule'
          title: rules
        etag:
          type: string
          title: etag
      title: UpdateSecurityGroupRequest
      additionalProperties: false
      description: |-
        UpdateSecurityGroup replaces the whole ruleset (and optionally display_name). Provide etag
         from a prior Get to guard against lost updates; empty etag skips the check.
    aes.network.v1.UpdateSecurityGroupResponse:
      type: object
      properties:
        securityGroup:
          title: security_group
          $ref: '#/components/schemas/aes.network.v1.SecurityGroup'
      title: UpdateSecurityGroupResponse
      additionalProperties: false
    aes.ops.v1.CancelOperationRequest:
      type: object
      properties:
        name:
          type: string
          title: name
      title: CancelOperationRequest
      additionalProperties: false
    aes.ops.v1.CancelOperationResponse:
      type: object
      properties:
        operation:
          title: operation
          $ref: '#/components/schemas/aes.ops.v1.Operation'
      title: CancelOperationResponse
      additionalProperties: false
    aes.ops.v1.CreateOperationRequest:
      type: object
      properties:
        kind:
          type: string
          title: kind
          description: Operation kind for audit, e.g. `noop`, `vm_provision`, `vm_delete`, `vm_resize`.
        datacenterName:
          type: string
          title: datacenter_name
          description: Datacenter resource name (`datacenters/...`) for datacenter-scoped operations.
        vmProjectName:
          type: string
          title: vm_project_name
          description: |-
            For VM provisioning, required: VM placement (see ComputeService.CreateVirtualMachine).
             Pricing + shape come from vm_vcpus/vm_ram_gib/vm_cpu_class below.
        vmDatacenterName:
          type: string
          title: vm_datacenter_name
        vmName:
          type: string
          title: vm_name
          description: 'For VM deletion, required: VM resource name to destroy.'
        hostName:
          type: string
          title: host_name
          description: 'For host provisioning, required: the host to add as a worker and the datacenter it joins.'
        vmSshPubkey:
          type: string
          title: vm_ssh_pubkey
          description: Optional SSH public key for cloud-init injection. Empty = no inbound SSH on the VM.
        vmUserData:
          type: string
          title: vm_user_data
          description: |-
            Optional raw cloud-config userdata (full `#cloud-config` document). Supersedes ssh_pubkey
             when both are set.
        vmBillingMode:
          type: string
          title: vm_billing_mode
          description: |-
            Billing intent for VM provisioning. The customer is charged at the API edge BEFORE
             provisioning starts (prepaid-on-create); these fields snapshot that charge so the
             recorded term doesn't re-query rates that could have changed since the API call.
             Empty vm_billing_mode = HOURLY (no upfront charge happened). "HOURLY" | "MONTHLY_1" | "MONTHLY_3" | "MONTHLY_6" | "MONTHLY_12"
        vmAutorenew:
          type: boolean
          title: vm_autorenew
        vmPrepaidAmountMinor:
          type:
            - integer
            - string
          title: vm_prepaid_amount_minor
          format: int64
        vmHourlyRateMinor:
          type:
            - integer
            - string
          title: vm_hourly_rate_minor
          format: int64
        vmPrepayJournalEntryId:
          type: string
          title: vm_prepay_journal_entry_id
          description: Wallet journal entry id for the prepayment, so refund/cancellation flows can locate it.
        vmCommitmentEndAtUnix:
          type:
            - integer
            - string
          title: vm_commitment_end_at_unix
          format: int64
          description: Term-end timestamp computed at charge time.
        vmWalletName:
          type: string
          title: vm_wallet_name
          description: Wallet + billing account snapshots so the workflow doesn't have to re-resolve them.
        vmBillingAccountName:
          type: string
          title: vm_billing_account_name
        vmNetworkName:
          type: string
          title: vm_network_name
          description: Tenant Network the VM attaches to (resource name). Resolved at the CreateVM API edge.
        vmNamespace:
          type: string
          title: vm_namespace
          description: Internal network-segment identifier the VM is created in, derived from the resolved Network.
        vmHostname:
          type: string
          title: vm_hostname
          description: |-
            User-facing hostname (DNS-1123 label, ≤63 chars). Used as the guest's cloud-init hostname.
             When empty, falls back to the VM's resource id slug.
        vmAssignPublicIpv4:
          type: boolean
          title: vm_assign_public_ipv4
          description: |-
            Allocate a public IPv4 from the DC's pool for the VM public NIC workflow. Default false;
             v6 is always reachable from the network's /64 without burning a public v4.
        vmLabels:
          type: object
          title: vm_labels
          additionalProperties:
            type: string
            title: value
          description: |-
            User-facing labels stamped at create time so GetVM/ListVMs surface them. Same merge
             semantics as VM label updates for later mutations.
        vmAnnotations:
          type: object
          title: vm_annotations
          additionalProperties:
            type: string
            title: value
          description: Operator notes / non-indexed metadata. Same shape as labels.
        vmBootDiskName:
          type: string
          title: vm_boot_disk_name
          description: |-
            Pre-resolved boot disk for VM provisioning (`projects/{p}/disks/{id}`). The compute API
             edge resolves boot_disk_name (existing) or BootDiskSpec (inline create + readiness wait)
             to a concrete Disk before provisioning begins. Empty = ephemeral boot fallback (lab/CI
             only). The boot disk is owned by the project, not the VM — DeleteVirtualMachine detaches
             it but does not delete it.
        vmVcpus:
          type: integer
          title: vm_vcpus
          format: int32
          description: |-
            Configurator shape stamped onto the operation so provisioning records the same
             vcpus / ram_gib / cpu_class on the VM.
        vmRamGib:
          type: integer
          title: vm_ram_gib
          format: int32
        vmCpuClass:
          type: string
          title: vm_cpu_class
        vmBootDiskSizeGib:
          type: integer
          title: vm_boot_disk_size_gib
          format: int32
          description: |-
            Inline boot-disk spec for VM provisioning. When set (and vm_boot_disk_name is empty),
             provisioning creates the disk and waits for it to become AVAILABLE before the VM is
             created. Mirrors compute.v1.BootDiskSpec field-for-field.
        vmBootDiskFromImageUrl:
          type: string
          title: vm_boot_disk_from_image_url
        vmBootDiskFromImageName:
          type: string
          title: vm_boot_disk_from_image_name
        vmBootDiskStorageClass:
          type: string
          title: vm_boot_disk_storage_class
        vmBootDiskDisplayName:
          type: string
          title: vm_boot_disk_display_name
        decommissionSkipWipe:
          type: boolean
          title: decommission_skip_wipe
          description: |-
            Decommission-specific. Passed alongside host_name + datacenter_name.
               decommission_skip_wipe: skip the disk wipe (default false; only set true when the
                                       disk is known to be wiped already).
               decommission_reason: operator-supplied audit string.
        decommissionReason:
          type: string
          title: decommission_reason
        vmBootDiskCloneSource:
          type: string
          title: vm_boot_disk_clone_source
          description: |-
            Clone-specific (VM provisioning driven by CloneVirtualMachine). When
             vm_boot_disk_clone_source is set, the boot disk is created by copying that source Disk
             instead of importing from a URL, so CloneVirtualMachine returns an Operation quickly.
               vm_boot_disk_clone_source: source Disk resource name to copy.
               vm_clone_source_vm_name:  source VM resource name — used to copy the source's custom
                                         firewall rules onto the clone after its public IP is allocated.
        vmCloneSourceVmName:
          type: string
          title: vm_clone_source_vm_name
        vmDeleteAttachedDisks:
          type: boolean
          title: vm_delete_attached_disks
          description: |-
            Delete-specific. When true, deletes the VM's attached disks (boot + data) instead of
             detaching them back to AVAILABLE.
        vmLinuxUsername:
          type: string
          title: vm_linux_username
          description: |-
            Linux login user (VM provisioning). Threaded from
             compute.CreateVirtualMachineRequest.linux_username so it can be persisted and displayed
             (the Access-panel / `ssh <user>@<ip>` user). The user is ALSO baked into the cloud-config
             (vm_user_data) at the API edge; this field is purely for the persisted/displayed value.
             Empty when the VM was created with raw vm_user_data.
        vmGpuModel:
          type: string
          title: vm_gpu_model
          description: |-
            GPU passthrough for VM provisioning. vm_gpu_model selects a GPU model; vm_gpu_count is
             the number of whole GPUs. Empty/0 = CPU-only VM.
        vmGpuCount:
          type: integer
          title: vm_gpu_count
          format: int32
        isoProjectName:
          type: string
          title: iso_project_name
          description: |-
            Bare-metal ISO URL import (kind=bm_iso_import). The org-prefix-confined object key + the
             source URL are computed + quota-checked at the BareMetalService API edge, then handed here so
             the durable ISOImportWorkflow's activity can stream the bytes into object storage with live
             byte-progress (surfaced on the Operation metadata + ListBareMetalISOs).
        isoSourceUrl:
          type: string
          title: iso_source_url
        isoObjectKey:
          type: string
          title: iso_object_key
        isoFilename:
          type: string
          title: iso_filename
        vmSecurityGroups:
          type: array
          items:
            type: string
          title: vm_security_groups
          description: |-
            Customer-networking-v1 (VM provisioning). Threaded so async-provisioned VMs persist the
             same networking the sync path writes. vm_security_groups: internal security groups to
             attach at create; vm_private_only: no public NIC at all (no public v4/v6).
        vmPrivateOnly:
          type: boolean
          title: vm_private_only
      title: CreateOperationRequest
      additionalProperties: false
    aes.ops.v1.CreateOperationRequest.VmAnnotationsEntry:
      type: object
      properties:
        key:
          type: string
          title: key
        value:
          type: string
          title: value
      title: VmAnnotationsEntry
      additionalProperties: false
    aes.ops.v1.CreateOperationRequest.VmLabelsEntry:
      type: object
      properties:
        key:
          type: string
          title: key
        value:
          type: string
          title: value
      title: VmLabelsEntry
      additionalProperties: false
    aes.ops.v1.CreateOperationResponse:
      type: object
      properties:
        operation:
          title: operation
          $ref: '#/components/schemas/aes.ops.v1.Operation'
      title: CreateOperationResponse
      additionalProperties: false
    aes.ops.v1.GetOperationRequest:
      type: object
      properties:
        name:
          type: string
          title: name
          description: Resource name, e.g. `operations/{operation_id}`.
      title: GetOperationRequest
      additionalProperties: false
    aes.ops.v1.GetOperationResponse:
      type: object
      properties:
        operation:
          title: operation
          $ref: '#/components/schemas/aes.ops.v1.Operation'
      title: GetOperationResponse
      additionalProperties: false
    aes.ops.v1.ListOperationsRequest:
      type: object
      properties:
        pageSize:
          type: integer
          title: page_size
          format: int32
          description: Default 50; max 100.
        pageToken:
          type: string
          title: page_token
          description: Opaque cursor from a prior ListOperationsResponse.next_page_token.
        projectName:
          type: string
          title: project_name
          description: |-
            Required. Filters to operations whose metadata.vm_project_name (or related project key)
             matches. Resource name like `projects/my-project`.
      title: ListOperationsRequest
      additionalProperties: false
    aes.ops.v1.ListOperationsResponse:
      type: object
      properties:
        operations:
          type: array
          items:
            $ref: '#/components/schemas/aes.ops.v1.Operation'
          title: operations
        nextPageToken:
          type: string
          title: next_page_token
      title: ListOperationsResponse
      additionalProperties: false
    aes.ops.v1.Operation:
      type: object
      properties:
        name:
          type: string
          title: name
        state:
          title: state
          $ref: '#/components/schemas/aes.ops.v1.State'
        createTimeUnix:
          type:
            - integer
            - string
          title: create_time_unix
          format: int64
        updateTimeUnix:
          type:
            - integer
            - string
          title: update_time_unix
          format: int64
        errorMessage:
          type: string
          title: error_message
          description: Set when state == STATE_FAILED; optional detail later via google.rpc.Status.
        kind:
          type: string
          title: kind
          description: Same as CreateOperationRequest.kind; immutable after create.
        temporalWorkflowId:
          type: string
          title: temporal_workflow_id
          description: Opaque workflow correlation identifiers for this operation (if any).
        temporalRunId:
          type: string
          title: temporal_run_id
        metadata:
          type: object
          title: metadata
          additionalProperties:
            type: string
            title: value
          description: Opaque key/value (e.g. vm_project_name on create; virtual_machine_name when provision completes).
        principal:
          type: string
          title: principal
          description: Caller principal that started the operation ('' for platform-started ops).
      title: Operation
      additionalProperties: false
    aes.ops.v1.Operation.MetadataEntry:
      type: object
      properties:
        key:
          type: string
          title: key
        value:
          type: string
          title: value
      title: MetadataEntry
      additionalProperties: false
    aes.ops.v1.State:
      type: string
      title: State
      enum:
        - STATE_UNSPECIFIED
        - STATE_PENDING
        - STATE_RUNNING
        - STATE_SUCCEEDED
        - STATE_FAILED
        - STATE_CANCELLED
    aes.ops.v1.WatchOperationRequest:
      type: object
      properties:
        name:
          type: string
          title: name
          description: Operation resource name (`operations/{id}`).
      title: WatchOperationRequest
      additionalProperties: false
    aes.ops.v1.WatchOperationResponse:
      type: object
      properties:
        operation:
          title: operation
          $ref: '#/components/schemas/aes.ops.v1.Operation'
      title: WatchOperationResponse
      additionalProperties: false
    aes.project.v1.ActivityEvent:
      type: object
      properties:
        id:
          type: string
          title: id
        timestampUnix:
          type:
            - integer
            - string
          title: timestamp_unix
          format: int64
        actor:
          type: string
          title: actor
          description: Actor principal (users/alice, serviceAccounts/bot, etc.).
        summary:
          type: string
          title: summary
          description: Humanized action label, e.g. "Created VM web-01" or "Refunded $10.00 top-up".
        resourceName:
          type: string
          title: resource_name
          description: Resource the action touched (e.g. virtual-machines/...).
        outcome:
          type: string
          title: outcome
          description: SUCCESS / FAILURE / WARNING.
        notifyInApp:
          type: boolean
          title: notify_in_app
          description: |-
            When true, this event is customer-notable and should appear in the portal's bell-icon
             notification feed (top-up succeeded, VM operation completed, spending alert triggered,
             member invite accepted, billing account suspended, etc.). When false, it's still a real
