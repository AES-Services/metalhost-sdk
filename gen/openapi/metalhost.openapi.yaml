          description: ACTIVE / DELETED.
        ports:
          type: array
          items:
            $ref: '#/components/schemas/aes.network.v1.PortMapping'
          title: ports
        sources:
          type: array
          items:
            type: string
          title: sources
          description: |-
            Source CIDRs allowed to reach the listed ports (e.g. ["0.0.0.0/0"], ["10.0.0.0/8"]).
             Empty list = allow from anywhere. Ingress only.
        createTimeUnix:
          type:
            - integer
            - string
          title: create_time_unix
          format: int64
        updateTimeUnix:
          type:
            - integer
            - string
          title: update_time_unix
          format: int64
        labels:
          type: object
          title: labels
          additionalProperties:
            type: string
            title: value
        annotations:
          type: object
          title: annotations
          additionalProperties:
            type: string
            title: value
        direction:
          type: string
          title: direction
          description: '''ingress'' (default) | ''egress''. Egress rules use destinations instead of sources.'
        destinations:
          type: array
