    aes.compute.v1.ReimageVirtualMachineRequest:
      type: object
      properties:
        name:
          type: string
          title: name
        bootImageUrl:
          type: string
          title: boot_image_url
          description: |-
            Required: streamable raw disk image URL. Setting this is the canonical way to upgrade
             the base OS (Ubuntu 24.04 → 26.04) without recreating the VM. Empty = reuse the original
             boot source.
        confirmationToken:
          type: string
          title: confirmation_token
          description: |-
            Required confirmation token. Server returns the expected value on a first call and the
             client echoes it back on the second to acknowledge data loss. Wire format: must equal
             "REIMAGE/" + the VM name. Refusing this for headless flows is fine (operators set the
             token directly), but UIs should round-trip it through a confirmation dialog.
      title: ReimageVirtualMachineRequest
      additionalProperties: false
