  /aes.baremetal.v1.BareMetalService/EnterBareMetalRescueMode:
    post:
      tags:
        - aes.baremetal.v1.BareMetalService
      summary: EnterBareMetalRescueMode
      description: |-
        EnterRescueMode boots the host into a rescue image via a one-time BMC boot override
         followed by a power cycle. The instance's rescue_mode flag is set so subsequent reads
         know the host is in rescue. ExitRescueMode reverses this — clears the boot override and
         power-cycles back to the normal disk boot order.
      operationId: aes.baremetal.v1.BareMetalService.EnterBareMetalRescueMode
      parameters:
        - name: Connect-Protocol-Version
          in: header
          required: true
          schema:
            $ref: '#/components/schemas/connect-protocol-version'
        - name: Connect-Timeout-Ms
          in: header
          schema:
            $ref: '#/components/schemas/connect-timeout-header'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/aes.baremetal.v1.EnterBareMetalRescueModeRequest'
        required: true
      responses:
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/connect.error'
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/aes.baremetal.v1.EnterBareMetalRescueModeResponse'
  /aes.baremetal.v1.BareMetalService/ExitBareMetalRescueMode:
    post:
      tags:
        - aes.baremetal.v1.BareMetalService
      summary: ExitBareMetalRescueMode
