      additionalProperties: false
    aes.compute.v1.ResizeVirtualMachineRequest:
      type: object
      properties:
        name:
          type: string
          title: name
        vcpus:
          type: integer
          title: vcpus
          format: int32
          description: |-
            New configurator shape. All three required; the server rejects InvalidArgument if any is
             unset (resize is not "patch one field" — it's a full re-shape so pricing + placement
             recompute consistently). Same 1–16 GiB RAM-per-vCPU ratio bounds as Create.
        ramGib:
          type: integer
          title: ram_gib
          format: int32
        cpuClass:
          type: string
          title: cpu_class
          description: |-
            CPU class. Required — changing class is allowed but the datacenter must have capacity for
             the new class or the VM won't restart.
      title: ResizeVirtualMachineRequest
      additionalProperties: false
    aes.compute.v1.ResizeVirtualMachineResponse:
      type: object
      properties:
        virtualMachine:
          title: virtual_machine
          description: Set on the synchronous path.
          $ref: '#/components/schemas/aes.compute.v1.VirtualMachine'
        operation:
          title: operation
          description: |-
            Set when the resize runs as a long-running Operation. Client polls GetOperation until
             SUCCEEDED, then re-Gets the VM to see the new shape. The operation runs the full
             stop → reshape → start sequence with retries so a mid-flight failure doesn't strand
             the VM in STOPPED with the old shape.
          $ref: '#/components/schemas/aes.ops.v1.Operation'
      title: ResizeVirtualMachineResponse
      additionalProperties: false
    aes.compute.v1.RestartVirtualMachineRequest:
      type: object
      properties:
