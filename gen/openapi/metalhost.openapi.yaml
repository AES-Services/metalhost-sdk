    aes.storage.v1.CreateDiskRequest:
      type: object
      properties:
        projectName:
          type: string
          title: project_name
          description: The project the disk belongs to (`projects/{id}`).
        datacenterName:
          type: string
          title: datacenter_name
          description: |-
            The datacenter the disk lives in (`datacenters/{id}`). Disks are DC-local — they cannot move
             between DCs and can only attach to VMs in the same DC.
        sizeGib:
          type: integer
          title: size_gib
          format: int32
          description: 1..1024 GiB. Lift the upper bound via project quota when needed.
        storageClass:
          type: string
          title: storage_class
          description: '`nvme` (currently the only tier offered). Required when from_image_url is empty.'
        displayName:
          type: string
          title: display_name
        labels:
          type: object
          title: labels
          additionalProperties:
            type: string
            title: value
        annotations:
          type: object
          title: annotations
          additionalProperties:
            type: string
            title: value
        networkName:
          type: string
          title: network_name
          description: |-
            Tenant Network the disk attaches to (`projects/{p}/networks/{id}`). When empty, the
             project's default Network is used (auto-created on first VM/disk in the project + DC).
             Disks can only attach to VMs on the same Network because KubeVirt requires same-namespace
             PVC mounts.
        fromImageUrl:
          type: string
          title: from_image_url
          description: |-
            Optional: hydrate the new disk from a streamable raw disk image URL (e.g. an Ubuntu cloud
             image). CDI's http source writes the image byte-for-byte into the PVC during PROVISIONING;
             the disk transitions to AVAILABLE once import completes. The disk is billed from the
             moment it lands in AVAILABLE/ATTACHED state — the meter loop skips PROVISIONING so
             customers don't pay during CDI hydration.
      title: CreateDiskRequest
      additionalProperties: false
    aes.storage.v1.CreateDiskRequest.AnnotationsEntry:
      type: object
      properties:
        key:
          type: string
          title: key
        value:
          type: string
          title: value
      title: AnnotationsEntry
      additionalProperties: false
    aes.storage.v1.CreateDiskRequest.LabelsEntry:
      type: object
