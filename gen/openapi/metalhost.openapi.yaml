  /aes.baremetal.v1.BareMetalService/ReleaseBareMetalInstance:
    post:
      tags:
        - aes.baremetal.v1.BareMetalService
      summary: ReleaseBareMetalInstance
      description: |-
        ReleaseBareMetalInstance ends the lease; the host's role returns to 'baremetal_pool'. Refused
         while a MONTHLY_* term is still active (hard non-cancel, same as DeleteVirtualMachine). The
         customer's data on local disks is not wiped by Metalhost — operator policy decides whether
         the host is reformatted before re-leasing.
      operationId: aes.baremetal.v1.BareMetalService.ReleaseBareMetalInstance
      parameters:
        - name: Connect-Protocol-Version
          in: header
          required: true
          schema:
            $ref: '#/components/schemas/connect-protocol-version'
        - name: Connect-Timeout-Ms
          in: header
          schema:
            $ref: '#/components/schemas/connect-timeout-header'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/aes.baremetal.v1.ReleaseBareMetalInstanceRequest'
        required: true
      responses:
        default:
          description: Error
          content:
            application/json:
              schema:
