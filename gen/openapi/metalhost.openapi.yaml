components:
  schemas:
    aes.audit.v1.AuditEvent:
      type: object
      properties:
        id:
          type: string
          title: id
        timestampUnix:
          type:
            - integer
            - string
          title: timestamp_unix
          format: int64
        action:
          type: string
          title: action
        principal:
          type: string
          title: principal
        resourceName:
          type: string
          title: resource_name
          description: |-
            Resource the event is about, e.g. `virtual-machines/<uuid>`. Renamed from `resource` to
             match the platform `*_name` convention (proto audit pass).
        metadata:
          type: object
          title: metadata
          additionalProperties:
            type: string
            title: value
        requestId:
          type: string
          title: request_id
        traceId:
          type: string
          title: trace_id
        organizationName:
          type: string
          title: organization_name
        projectName:
          type: string
          title: project_name
        severity:
          type: string
          title: severity
      title: AuditEvent
      additionalProperties: false
    aes.audit.v1.AuditEvent.MetadataEntry:
      type: object
      properties:
        key:
          type: string
          title: key
        value:
          type: string
          title: value
      title: MetadataEntry
      additionalProperties: false
    aes.audit.v1.LogEventRequest:
      type: object
      properties:
        action:
          type: string
          title: action
        principal:
          type: string
          title: principal
        resourceName:
          type: string
          title: resource_name
        metadata:
          type: object
          title: metadata
          additionalProperties:
            type: string
            title: value
        requestId:
          type: string
          title: request_id
        traceId:
          type: string
          title: trace_id
        organizationName:
          type: string
          title: organization_name
        projectName:
          type: string
          title: project_name
        severity:
          type: string
          title: severity
      title: LogEventRequest
      additionalProperties: false
    aes.audit.v1.LogEventRequest.MetadataEntry:
      type: object
      properties:
        key:
          type: string
          title: key
        value:
          type: string
          title: value
      title: MetadataEntry
      additionalProperties: false
    aes.audit.v1.LogEventResponse:
      type: object
      properties:
        event:
          title: event
          $ref: '#/components/schemas/aes.audit.v1.AuditEvent'
      title: LogEventResponse
      additionalProperties: false
    aes.audit.v1.SearchEventsRequest:
      type: object
      properties:
        pageSize:
          type: integer
          title: page_size
          format: int32
        pageToken:
          type: string
          title: page_token
          description: Opaque cursor from SearchEventsResponse.next_page_token.
        actionPrefix:
          type: string
          title: action_prefix
          description: If set, action must have this prefix (SQL LIKE prefix match).
        principalPrefix:
          type: string
          title: principal_prefix
        projectName:
          type: string
          title: project_name
          description: |-
            Project filter (`projects/{slug}`). Customer callers must set either this OR
             organization_name; platform admins may omit both for fleet-wide queries (B34).
        minTimestampUnix:
          type:
            - integer
            - string
          title: min_timestamp_unix
          format: int64
          description: Minimum event time (inclusive), Unix seconds; 0 = no lower bound.
        organizationName:
          type: string
          title: organization_name
          description: |-
            Organization filter (`organizations/{slug}`). Use for billing / org-scoped audit
             queries that don't belong to a single project (e.g. wallet.topup.succeeded). Caller
             must hold a project binding under the org or admin.organization on it.
      title: SearchEventsRequest
      additionalProperties: false
    aes.audit.v1.SearchEventsResponse:
      type: object
      properties:
        events:
          type: array
          items:
            $ref: '#/components/schemas/aes.audit.v1.AuditEvent'
          title: events
        nextPageToken:
          type: string
          title: next_page_token
      title: SearchEventsResponse
      additionalProperties: false
    aes.baremetal.v1.AttachBareMetalISORequest:
      type: object
      properties:
        name:
          type: string
          title: name
        objectKey:
          type: string
          title: object_key
          description: Object key returned by CreateBareMetalISOUploadURL (a prior upload).
      title: AttachBareMetalISORequest
      additionalProperties: false
    aes.baremetal.v1.AttachBareMetalISOResponse:
      type: object
      properties:
        instance:
          title: instance
          $ref: '#/components/schemas/aes.baremetal.v1.BareMetalInstance'
      title: AttachBareMetalISOResponse
      additionalProperties: false
    aes.baremetal.v1.AvailableBareMetal:
      type: object
      properties:
        hostName:
          type: string
          title: host_name
          description: Host resource name to lease (`hosts/{slug}`).
        datacenterName:
          type: string
          title: datacenter_name
        specLabel:
          type: string
          title: spec_label
          description: Derived display label, e.g. "cascadelake · 48c · 384GiB".
        cpuModel:
          type: string
          title: cpu_model
        cpuGeneration:
          type: string
          title: cpu_generation
        totalCores:
          type: integer
          title: total_cores
          format: int32
        ramGib:
          type: integer
          title: ram_gib
          format: int32
        storageGib:
          type: integer
          title: storage_gib
          format: int32
        monthlyPriceMinor:
          type:
            - integer
            - string
          title: monthly_price_minor
          format: int64
          description: Per-server price the operator set; the hourly rate is monthly_price_minor/730.
        currency:
          type: string
          title: currency
      title: AvailableBareMetal
      additionalProperties: false
    aes.baremetal.v1.BareMetalBootDevice:
      type: string
      title: BareMetalBootDevice
      enum:
        - BARE_METAL_BOOT_DEVICE_UNSPECIFIED
        - BARE_METAL_BOOT_DEVICE_DISK
        - BARE_METAL_BOOT_DEVICE_CDROM
        - BARE_METAL_BOOT_DEVICE_PXE
      description: BareMetalBootDevice selects the one-time boot source for SetBareMetalBootDevice.
    aes.baremetal.v1.BareMetalInstance:
      type: object
      properties:
        name:
          type: string
          title: name
          description: Resource name `bare-metal-instances/{slug}`.
        projectName:
          type: string
          title: project_name
        datacenterName:
          type: string
          title: datacenter_name
        instanceType:
          type: string
          title: instance_type
          description: Derived hardware label (e.g. "cascadelake · 48c · 384GiB"). Display/audit only.
        hostName:
          type: string
          title: host_name
          description: Host bound to this lease (`hosts/{slug}`). Set when state=ACTIVE; empty when CREATING.
        state:
          type: string
          title: state
          description: PROVISIONING / ACTIVE / RELEASING / RELEASED.
        redfishEndpoint:
          type: string
          title: redfish_endpoint
          description: |-
            Redfish endpoint forwarded from the host record. Customer uses this to BMC-control the box
             (PXE install, power cycle, console). Empty when the host has no Redfish configured.
        createTimeUnix:
          type:
            - integer
            - string
          title: create_time_unix
          format: int64
        updateTimeUnix:
          type:
            - integer
            - string
          title: update_time_unix
          format: int64
        labels:
          type: object
          title: labels
          additionalProperties:
            type: string
            title: value
        annotations:
          type: object
          title: annotations
          additionalProperties:
            type: string
            title: value
        billingMode:
          title: billing_mode
          description: |-
            Billing (mirrors VM semantics). billing_mode HOURLY or MONTHLY_*; commitment_end_at_unix +
             autorenew are set for MONTHLY_*. monthly_price_minor is the per-server price snapshotted at
             lease time (the hourly rate billed is monthly_price_minor/730).
          $ref: '#/components/schemas/aes.compute.v1.BillingMode'
        commitmentEndAtUnix:
          type:
            - integer
            - string
          title: commitment_end_at_unix
          format: int64
        autorenew:
          type: boolean
          title: autorenew
        monthlyPriceMinor:
          type:
            - integer
            - string
          title: monthly_price_minor
          format: int64
        currency:
          type: string
          title: currency
        osImage:
          type: string
          title: os_image
          description: |-
            Provisioning / cloud-init. os_image is the catalog id (or custom_image_url when set);
             hostname + linux_username drive the SSH command shown in the UI.
        customImageUrl:
          type: string
          title: custom_image_url
        hostname:
          type: string
          title: hostname
        linuxUsername:
          type: string
          title: linux_username
        publicIpv4Cidr:
          type: string
          title: public_ipv4_cidr
          description: |-
            Public IPv4 block assigned to the host's NIC(s). primary_ipv4 is the first address (the
             cloud-init / management IP). For a /32, cidr is `<primary>/32`.
        primaryIpv4:
          type: string
          title: primary_ipv4
        powerState:
          type: string
          title: power_state
          description: 'Current BMC power state: "On" / "Off" / "" (unknown). Billing is unaffected by power.'
        publicGateway:
          type: string
          title: public_gateway
          description: |-
            Public network details for the host's NIC, from the DC pool. Surfaced so a bring-your-own-OS
             customer can hand-configure their network: gateway + the SUBNET prefix length the IPs sit in
             (e.g. /24). The managed-install netplan uses these too. Empty/0 when the DC has none set.
        publicPrefixLen:
          type: integer
          title: public_prefix_len
          format: int32
      title: BareMetalInstance
      additionalProperties: false
    aes.baremetal.v1.BareMetalInstance.AnnotationsEntry:
      type: object
      properties:
        key:
          type: string
          title: key
        value:
          type: string
          title: value
      title: AnnotationsEntry
      additionalProperties: false
    aes.baremetal.v1.BareMetalInstance.LabelsEntry:
      type: object
      properties:
        key:
          type: string
          title: key
        value:
          type: string
          title: value
      title: LabelsEntry
      additionalProperties: false
    aes.baremetal.v1.BareMetalPowerAction:
      type: string
      title: BareMetalPowerAction
      enum:
        - BARE_METAL_POWER_ACTION_UNSPECIFIED
        - BARE_METAL_POWER_ACTION_ON
        - BARE_METAL_POWER_ACTION_OFF
        - BARE_METAL_POWER_ACTION_REBOOT
      description: BareMetalPowerAction selects the BMC power operation.
    aes.baremetal.v1.CreateBareMetalISOFromURLRequest:
      type: object
      properties:
        projectName:
          type: string
          title: project_name
        url:
          type: string
          title: url
          description: Public HTTPS URL to the ISO (e.g. a distro mirror). Fetched server-side into the org library.
        filename:
          type: string
          title: filename
          description: Optional filename override; defaults to the URL's basename.
      title: CreateBareMetalISOFromURLRequest
      additionalProperties: false
    aes.baremetal.v1.CreateBareMetalISOFromURLResponse:
      type: object
      properties:
        objectKey:
          type: string
          title: object_key
          description: The object key the import is streaming into; poll ListBareMetalISOs until it appears.
      title: CreateBareMetalISOFromURLResponse
      additionalProperties: false
    aes.baremetal.v1.CreateBareMetalISOUploadURLRequest:
      type: object
      properties:
        projectName:
          type: string
          title: project_name
          description: |-
            Project whose ORG owns the library. The ISO is stored org-scoped (shared across the org's
             projects); the caller must have access to this project.
        filename:
          type: string
          title: filename
          description: |-
            Customer's ISO filename (e.g. "proxmox-ve-8.iso"); forms the object key + display name.
             Sanitized server-side.
      title: CreateBareMetalISOUploadURLRequest
      additionalProperties: false
    aes.baremetal.v1.CreateBareMetalISOUploadURLResponse:
      type: object
      properties:
        uploadUrl:
          type: string
          title: upload_url
          description: Presigned PUT URL — the client uploads the ISO bytes directly here (HTTP PUT). Short-lived.
        objectKey:
          type: string
          title: object_key
          description: Opaque object key to pass back to AttachBareMetalISO once the upload completes.
        expiresAtUnix:
          type:
            - integer
            - string
          title: expires_at_unix
          format: int64
      title: CreateBareMetalISOUploadURLResponse
      additionalProperties: false
    aes.baremetal.v1.CreateBareMetalInstanceRequest:
      type: object
      properties:
        name:
          type: string
          title: name
          description: Resource name `bare-metal-instances/{slug}`. Slug must be DNS-safe.
        projectName:
          type: string
          title: project_name
        hostName:
          type: string
          title: host_name
          description: The specific available host to lease (`hosts/{slug}`), from ListAvailableBareMetal.
        labels:
          type: object
          title: labels
          additionalProperties:
            type: string
            title: value
        annotations:
          type: object
          title: annotations
          additionalProperties:
            type: string
            title: value
        idempotencyKey:
          type: string
          title: idempotency_key
        billingMode:
          title: billing_mode
          description: |-
            Billing mode. Default HOURLY. MONTHLY_* charges the wallet upfront for the term at the
             tier's discount; the prepayment must succeed or Create fails. (Field 7 was `instance_type`.)
          $ref: '#/components/schemas/aes.compute.v1.BillingMode'
        autorenew:
          type: boolean
          title: autorenew
          description: 'For MONTHLY_*: enable auto-renewal at term end. Ignored when HOURLY.'
        osImage:
          type: string
          title: os_image
          description: |-
            OS + cloud-init. os_image is a catalog id (e.g. "ubuntu-2404"); custom_image_url overrides it
             with a direct image URL. hostname + linux_username + ssh_key_names + user_data seed cloud-init.
        customImageUrl:
          type: string
          title: custom_image_url
        hostname:
          type: string
          title: hostname
        linuxUsername:
          type: string
          title: linux_username
        sshKeyNames:
          type: array
          items:
            type: string
          title: ssh_key_names
        userData:
          type: string
          title: user_data
        publicIpv4PrefixLen:
          type: integer
          title: public_ipv4_prefix_len
          format: int32
          description: |-
            Public IPv4 block size as a prefix length: 32 (1 IP) / 31 / 30 / 29 / 28 (16 IPs). Default 32.
             The block is reserved from the DC public pool at lease time; the first address is primary.
      title: CreateBareMetalInstanceRequest
      additionalProperties: false
    aes.baremetal.v1.CreateBareMetalInstanceRequest.AnnotationsEntry:
      type: object
      properties:
        key:
          type: string
          title: key
        value:
          type: string
          title: value
      title: AnnotationsEntry
      additionalProperties: false
    aes.baremetal.v1.CreateBareMetalInstanceRequest.LabelsEntry:
      type: object
      properties:
        key:
          type: string
          title: key
        value:
          type: string
          title: value
      title: LabelsEntry
      additionalProperties: false
    aes.baremetal.v1.CreateBareMetalInstanceResponse:
      type: object
      properties:
        instance:
          title: instance
          $ref: '#/components/schemas/aes.baremetal.v1.BareMetalInstance'
      title: CreateBareMetalInstanceResponse
      additionalProperties: false
    aes.baremetal.v1.DeleteBareMetalISORequest:
      type: object
      properties:
        projectName:
          type: string
          title: project_name
        objectKey:
          type: string
          title: object_key
      title: DeleteBareMetalISORequest
      additionalProperties: false
    aes.baremetal.v1.DeleteBareMetalISOResponse:
      type: object
      title: DeleteBareMetalISOResponse
      additionalProperties: false
    aes.baremetal.v1.DetachBareMetalISORequest:
      type: object
      properties:
        name:
          type: string
          title: name
      title: DetachBareMetalISORequest
      additionalProperties: false
    aes.baremetal.v1.DetachBareMetalISOResponse:
      type: object
      properties:
        instance:
          title: instance
          $ref: '#/components/schemas/aes.baremetal.v1.BareMetalInstance'
      title: DetachBareMetalISOResponse
      additionalProperties: false
    aes.baremetal.v1.EnterBareMetalRescueModeRequest:
      type: object
      properties:
        name:
          type: string
          title: name
        rescueImageUrl:
          type: string
          title: rescue_image_url
          description: |-
            Optional explicit rescue image URL override; defaults to the per-DC annotation or
             METALHOST_BM_RESCUE_IMAGE_URL. Useful for distro-specific rescue tooling.
      title: EnterBareMetalRescueModeRequest
      additionalProperties: false
    aes.baremetal.v1.EnterBareMetalRescueModeResponse:
      type: object
      properties:
        instance:
          title: instance
          $ref: '#/components/schemas/aes.baremetal.v1.BareMetalInstance'
      title: EnterBareMetalRescueModeResponse
      additionalProperties: false
    aes.baremetal.v1.ExitBareMetalRescueModeRequest:
      type: object
      properties:
        name:
          type: string
          title: name
      title: ExitBareMetalRescueModeRequest
      additionalProperties: false
    aes.baremetal.v1.ExitBareMetalRescueModeResponse:
      type: object
      properties:
        instance:
          title: instance
          $ref: '#/components/schemas/aes.baremetal.v1.BareMetalInstance'
      title: ExitBareMetalRescueModeResponse
      additionalProperties: false
    aes.baremetal.v1.GetBareMetalConsoleURLRequest:
      type: object
      properties:
        name:
          type: string
          title: name
      title: GetBareMetalConsoleURLRequest
      additionalProperties: false
    aes.baremetal.v1.GetBareMetalConsoleURLResponse:
      type: object
      properties:
        consoleUrl:
          type: string
          title: console_url
          description: |-
            Short-lived websocket path (expires after 60s). Single-use; a current browser session
             (cookie) or Authorization: Bearer is also required to connect (defense-in-depth).
        expiresAtUnix:
          type:
            - integer
            - string
          title: expires_at_unix
          format: int64
        vncPassword:
          type: string
          title: vnc_password
          description: |-
            Per-session VNC password the noVNC client authenticates with (≤8 chars — RFB limit). The
             BMC's VNC server is only reachable from metalhostd on the OOB management network, so this is
             defense-in-depth behind the token+cookie gate, not the primary control.
      title: GetBareMetalConsoleURLResponse
      additionalProperties: false
    aes.baremetal.v1.GetBareMetalInstanceRequest:
      type: object
      properties:
