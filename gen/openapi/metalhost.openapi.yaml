          title: timestamp_unix
          format: int64
        actor:
          type: string
          title: actor
          description: Actor principal (users/alice, serviceAccounts/bot, etc.).
        summary:
          type: string
          title: summary
          description: Humanized action label, e.g. "Created VM web-01" or "Refunded $10.00 top-up".
        resourceName:
          type: string
          title: resource_name
          description: Resource the action touched (e.g. virtual-machines/...).
        outcome:
          type: string
          title: outcome
          description: SUCCESS / FAILURE / WARNING.
        notifyInApp:
          type: boolean
          title: notify_in_app
          description: |-
            When true, this event is customer-notable and should appear in the portal's bell-icon
             notification feed (top-up succeeded, VM operation completed, spending alert triggered,
             member invite accepted, billing account suspended, etc.). When false, it's still a real
             audit row visible in Settings > Activity log, but isn't loud enough for the bell.
             The classification is server-side (see services/project/dashboard.go notifyInApp()) so
             the policy can evolve without a frontend redeploy.
      title: ActivityEvent
      additionalProperties: false
