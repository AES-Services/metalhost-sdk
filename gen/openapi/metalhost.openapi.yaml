          title: name
      title: GetBareMetalVirtualMediaRequest
      additionalProperties: false
    aes.baremetal.v1.GetBareMetalVirtualMediaResponse:
      type: object
      properties:
        inserted:
          type: boolean
          title: inserted
        isoFilename:
          type: string
          title: iso_filename
          description: |-
            Friendly filename + library object key when the mounted image is a metalhost library ISO
             (empty for inserted media we can't resolve, e.g. an external URL).
        objectKey:
          type: string
          title: object_key
      title: GetBareMetalVirtualMediaResponse
      additionalProperties: false
    aes.baremetal.v1.ISOFile:
      type: object
      properties:
        objectKey:
          type: string
          title: object_key
          description: opaque key passed to Attach/Delete
        filename:
          type: string
          title: filename
          description: display name (basename)
        sizeBytes:
          type:
            - integer
            - string
          title: size_bytes
          format: int64
        uploadedAtUnix:
          type:
            - integer
            - string
          title: uploaded_at_unix
          format: int64
        status:
          type: string
          title: status
          description: |-
            Lifecycle status: "READY" (object exists, attachable), "IMPORTING" (URL import in flight),
             or "FAILED" (URL import failed — error_message has the reason). Empty defaults to READY for
             older clients. Only READY entries can be attached.
        bytesDownloaded:
          type:
            - integer
            - string
          title: bytes_downloaded
          format: int64
          description: |-
            For IMPORTING entries: bytes streamed so far and the total (from the source Content-Length;
             0 when the source didn't advertise a length). UI renders bytes_downloaded/total_bytes as a
             progress bar; total_bytes==0 → indeterminate spinner.
        totalBytes:
          type:
            - integer
            - string
          title: total_bytes
          format: int64
        operationName:
          type: string
          title: operation_name
          description: |-
            The `bm_iso_import` Operation resource name backing an IMPORTING/FAILED entry (poll
             GetOperation for live progress; empty for READY objects).
        errorMessage:
          type: string
          title: error_message
          description: 'Set when status == "FAILED": the import error surfaced to the customer.'
      title: ISOFile
      additionalProperties: false
      description: |-
        ISOFile is one entry in the org's install-ISO library. A library entry is either a READY
         object that physically exists in object storage, or a synthetic IMPORTING/FAILED entry
         projected from an in-flight `bm_iso_import` Operation (a URL import that hasn't landed yet) so
         the UI can render a live progress bar inline with the completed ISOs.
