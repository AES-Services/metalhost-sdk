        objectKey:
          type: string
          title: object_key
          description: The object key the import is streaming into; poll ListBareMetalISOs until it appears.
        operation:
          title: operation
          description: |-
            The durable import Operation (kind=bm_iso_import). Poll GetOperation — or watch the IMPORTING
             entry in ListBareMetalISOs — for live byte progress; the import survives control-plane restarts.
             Null when the import completes synchronously without a trackable operation.
          $ref: '#/components/schemas/aes.ops.v1.Operation'
      title: CreateBareMetalISOFromURLResponse
      additionalProperties: false
    aes.baremetal.v1.CreateBareMetalISOUploadURLRequest:
      type: object
      properties:
        projectName:
          type: string
          title: project_name
          description: |-
            Project whose ORG owns the library. The ISO is stored org-scoped (shared across the org's
             projects); the caller must have access to this project.
        filename:
          type: string
          title: filename
          description: |-
            Customer's ISO filename (e.g. "proxmox-ve-8.iso"); forms the object key + display name.
             Sanitized server-side.
      title: CreateBareMetalISOUploadURLRequest
      additionalProperties: false
    aes.baremetal.v1.CreateBareMetalISOUploadURLResponse:
      type: object
      properties:
        uploadUrl:
          type: string
          title: upload_url
          description: Presigned PUT URL — the client uploads the ISO bytes directly here (HTTP PUT). Short-lived.
        objectKey:
          type: string
          title: object_key
          description: Opaque object key to pass back to AttachBareMetalISO once the upload completes.
        expiresAtUnix:
          type:
            - integer
            - string
          title: expires_at_unix
          format: int64
      title: CreateBareMetalISOUploadURLResponse
      additionalProperties: false
    aes.baremetal.v1.CreateBareMetalInstanceRequest:
      type: object
      properties:
        name:
          type: string
          title: name
          description: Resource name `bare-metal-instances/{slug}`. Slug must be DNS-safe.
        projectName:
          type: string
          title: project_name
        hostName:
          type: string
          title: host_name
          description: The specific available host to lease (`hosts/{slug}`), from ListAvailableBareMetal.
        labels:
          type: object
          title: labels
          additionalProperties:
            type: string
            title: value
        annotations:
          type: object
          title: annotations
          additionalProperties:
            type: string
            title: value
        idempotencyKey:
          type: string
          title: idempotency_key
        billingMode:
          title: billing_mode
          description: |-
            Billing mode. Default HOURLY. MONTHLY_* charges the wallet upfront for the term at the
             tier's discount; the prepayment must succeed or Create fails. (Field 7 was `instance_type`.)
          $ref: '#/components/schemas/aes.compute.v1.BillingMode'
        autorenew:
          type: boolean
          title: autorenew
          description: 'For MONTHLY_*: enable auto-renewal at term end. Ignored when HOURLY.'
        osImage:
          type: string
          title: os_image
          description: |-
            OS + cloud-init. os_image is a catalog id (e.g. "ubuntu-2404"); custom_image_url overrides it
             with a direct image URL. hostname + linux_username + ssh_key_names + user_data seed cloud-init.
        customImageUrl:
          type: string
          title: custom_image_url
        hostname:
          type: string
          title: hostname
        linuxUsername:
          type: string
          title: linux_username
        sshKeyNames:
          type: array
          items:
            type: string
          title: ssh_key_names
        userData:
          type: string
          title: user_data
        publicIpv4PrefixLen:
          type: integer
          title: public_ipv4_prefix_len
          format: int32
          description: |-
            Public IPv4 block size as a prefix length: 32 (1 IP) / 31 / 30 / 29 / 28 (16 IPs). Default 32.
             The block is reserved from the DC public pool at lease time; the first address is primary.
      title: CreateBareMetalInstanceRequest
      additionalProperties: false
    aes.baremetal.v1.CreateBareMetalInstanceRequest.AnnotationsEntry:
