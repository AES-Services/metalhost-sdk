    aes.network.v1.Network:
      type: object
      properties:
        name:
          type: string
          title: name
        displayName:
          type: string
          title: display_name
        projectName:
          type: string
          title: project_name
        datacenterName:
          type: string
          title: datacenter_name
        subnetCidrV4:
          type: string
          title: subnet_cidr_v4
          description: |-
            IPv4 subnet CIDR allocated from the DC's `aes.metalhost/ipv4-tenant-prefix` (RFC1918
             class-A or class-B supernet). Empty when the network is IPv6-only. Always a /24 in v1.
        subnetCidrV6:
          type: string
          title: subnet_cidr_v6
          description: |-
            IPv6 subnet CIDR allocated from the DC's `aes.metalhost/ipv6-tenant-prefix` (the org's
             /48). Always a /64. Public-routable, no NAT — IPv6 is native.
        ipRangeStart:
          type: string
          title: ip_range_start
          description: Whereabouts allocation range (inclusive). Empty = the full subnet is allocatable.
        ipRangeEnd:
          type: string
          title: ip_range_end
        createTimeUnix:
          type:
            - integer
            - string
          title: create_time_unix
          format: int64
        updateTimeUnix:
          type:
            - integer
            - string
          title: update_time_unix
          format: int64
        labels:
          type: object
          title: labels
          additionalProperties:
            type: string
            title: value
        annotations:
          type: object
          title: annotations
          additionalProperties:
            type: string
            title: value
        state:
          type: string
          title: state
          description: |-
            "creating" while the UDN reconciler is in flight; "active" when the OVN-K UDN status
             is Ready; "failed" on reconciler error; "deleting" / "deleted" during GC. Read-only.
        ovnUdnName:
          type: string
          title: ovn_udn_name
          description: |-
            Name of the OVN-K UserDefinedNetwork CR backing this Network. Output-only. Format
             `udn-<network_id>` — the slug after `udn-` matches the network_id slug for ease of
             operator inspection.
        namespace:
          type: string
          title: namespace
          description: |-
            K8s namespace where the UDN CR + the VMs attached to this Network live. Output-only.
             Format `net-<network_id>`. Each Network is its own namespace because OVN-K only allows
             one Primary UDN per namespace — VMs in the same Network share the namespace and can
             talk over the network's /24 + /64; VMs in different Networks are fully isolated.
      title: Network
      additionalProperties: false
      description: |-
        Network is a tenant-owned L2 logical switch within a single datacenter, backed by an
         OVN-Kubernetes UserDefinedNetwork (UDN). Resource name format:
         `projects/{project}/networks/{network_id}`.

         Issue #11 redesign: networks are no longer Multus NADs. The platform allocates an IPv6
         /64 from the DC's tenant prefix (always) and an IPv4 /24 from the DC's RFC1918 supernet
         (when requested), then creates a UDN that OVN-K reconciles into a logical switch with
         IPAM. VLAN IDs are an internal implementation detail (Geneve VNIs handle isolation), no
         longer customer-visible.
    aes.network.v1.Network.AnnotationsEntry:
      type: object
      properties:
        key:
          type: string
          title: key
        value:
          type: string
          title: value
      title: AnnotationsEntry
      additionalProperties: false
    aes.network.v1.Network.LabelsEntry:
      type: object
      properties:
        key:
          type: string
          title: key
        value:
          type: string
          title: value
      title: LabelsEntry
      additionalProperties: false
    aes.network.v1.PortMapping:
      type: object
      properties:
        port:
          type: integer
          title: port
          format: int32
          description: External port (the one customers connect to), or the lower bound of a range. 1..65535.
        protocol:
          type: string
          title: protocol
          description: 'L4 protocol: TCP or UDP.'
        targetPort:
          type: integer
          title: target_port
          format: int32
          description: |-
            Internal port on the VM (where the service listens). Defaults to `port` when 0. Ignored
             on firewall rules — applies only to PublicIp port-forwarding (which we don't currently
             surface via the customer RPCs, but the field stays for the SDK and future LB work).
        endPort:
          type: integer
          title: end_port
          format: int32
          description: |-
            Upper bound of the port range. 0 (default) = single port; otherwise must be >= port and
             <= 65535.
      title: PortMapping
      additionalProperties: false
      description: |-
        PortMapping describes a single port or a contiguous port range to expose. ProtocolL4 is
         "TCP" or "UDP".

         Range semantics (firewall rules): when `end_port` is 0/unset the mapping covers the single
         `port`. When `end_port > 0` it must satisfy `port <= end_port` and the mapping covers
         every port in [port, end_port] inclusive — backend installs one OVN ACL with a range match
         (`tcp.dst >= port && tcp.dst <= end_port`) rather than expanding to N single-port ACLs.
         Useful for k8s NodePort (30000-32767), RTMP/SIP, or any service that listens on a window.
    aes.network.v1.PublicIp:
      type: object
      properties:
        name:
          type: string
          title: name
          description: Resource name `projects/{project}/public-ips/{id}`.
        displayName:
          type: string
          title: display_name
        projectName:
          type: string
          title: project_name
        datacenterName:
          type: string
          title: datacenter_name
        targetVm:
          type: string
          title: target_vm
          description: VM the IP routes to (`virtual-machines/{id}`).
        ipAddress:
          type: string
          title: ip_address
          description: The assigned address. Empty string while ALLOCATING.
        state:
          type: string
          title: state
          description: ALLOCATING / ACTIVE / DELETING / DELETED.
        ports:
          type: array
          items:
            $ref: '#/components/schemas/aes.network.v1.PortMapping'
          title: ports
        createTimeUnix:
          type:
            - integer
            - string
          title: create_time_unix
          format: int64
        updateTimeUnix:
          type:
            - integer
            - string
          title: update_time_unix
          format: int64
        labels:
          type: object
          title: labels
          additionalProperties:
            type: string
            title: value
        annotations:
          type: object
          title: annotations
          additionalProperties:
            type: string
            title: value
      title: PublicIp
      additionalProperties: false
      description: |-
        PublicIp is a customer-allocated external IP routing to a VM.
         PublicIp is a customer-allocated public IPv4 reserved for a tenant VM from the DC's
         `aes.metalhost/public-ipv4-pool`.
    aes.network.v1.PublicIp.AnnotationsEntry:
