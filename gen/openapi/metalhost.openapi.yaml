components:
  schemas:
    aes.audit.v1.AuditChange:
      type: object
      properties:
        field:
          type: string
          title: field
          description: e.g. "role", "state", "unit_price_minor", "limit_value", "balance_minor"
        before:
          type: string
          title: before
          description: stringified — display only
        after:
          type: string
          title: after
      title: AuditChange
      additionalProperties: false
      description: AuditChange is a single-field before→after diff attached to a mutation's audit event.
    aes.audit.v1.AuditEvent:
      type: object
      properties:
        id:
          type: string
          title: id
        timestampUnix:
          type:
            - integer
            - string
          title: timestamp_unix
          format: int64
        action:
          type: string
          title: action
        principal:
          type: string
          title: principal
        resourceName:
          type: string
          title: resource_name
          description: |-
            Resource the event is about, e.g. `virtual-machines/<uuid>`. Renamed from `resource` to
             match the platform `*_name` convention (proto audit pass).
        metadata:
          type: object
          title: metadata
          additionalProperties:
            type: string
            title: value
        requestId:
          type: string
          title: request_id
        traceId:
          type: string
          title: trace_id
        organizationName:
          type: string
          title: organization_name
        projectName:
          type: string
          title: project_name
        severity:
          type: string
          title: severity
        change:
          title: change
          description: |-
            Structured before→after diff for state-changing mutations (role flips, rate changes,
             suspensions, quota bumps). Recorded server-side at mutation time; null when the event
             carries no structured diff. Display-only — values are stringified.
          $ref: '#/components/schemas/aes.audit.v1.AuditChange'
      title: AuditEvent
      additionalProperties: false
    aes.audit.v1.AuditEvent.MetadataEntry:
      type: object
      properties:
        key:
          type: string
          title: key
        value:
          type: string
          title: value
      title: MetadataEntry
      additionalProperties: false
    aes.audit.v1.LogEventRequest:
      type: object
      properties:
        action:
          type: string
          title: action
        principal:
          type: string
          title: principal
        resourceName:
          type: string
          title: resource_name
        metadata:
          type: object
          title: metadata
          additionalProperties:
            type: string
            title: value
        requestId:
          type: string
          title: request_id
        traceId:
          type: string
          title: trace_id
        organizationName:
          type: string
          title: organization_name
        projectName:
          type: string
          title: project_name
        severity:
          type: string
          title: severity
        change:
          title: change
          description: Optional structured diff (see AuditEvent.change).
          $ref: '#/components/schemas/aes.audit.v1.AuditChange'
      title: LogEventRequest
      additionalProperties: false
    aes.audit.v1.LogEventRequest.MetadataEntry:
      type: object
      properties:
        key:
          type: string
          title: key
        value:
          type: string
          title: value
      title: MetadataEntry
      additionalProperties: false
    aes.audit.v1.LogEventResponse:
      type: object
      properties:
        event:
          title: event
          $ref: '#/components/schemas/aes.audit.v1.AuditEvent'
      title: LogEventResponse
      additionalProperties: false
    aes.audit.v1.SearchEventsRequest:
      type: object
      properties:
        pageSize:
          type: integer
          title: page_size
          format: int32
        pageToken:
          type: string
          title: page_token
          description: Opaque cursor from SearchEventsResponse.next_page_token.
        actionPrefix:
          type: string
          title: action_prefix
          description: If set, action must have this prefix (SQL LIKE prefix match).
        principalPrefix:
          type: string
          title: principal_prefix
        projectName:
          type: string
          title: project_name
          description: |-
            Project filter (`projects/{slug}`). Caller must set either this or organization_name
             to scope the query.
        minTimestampUnix:
          type:
            - integer
            - string
          title: min_timestamp_unix
          format: int64
          description: Minimum event time (inclusive), Unix seconds; 0 = no lower bound.
        organizationName:
          type: string
          title: organization_name
          description: |-
            Organization filter (`organizations/{slug}`). Use for billing / org-scoped audit
             queries that don't belong to a single project (e.g. wallet.topup.succeeded). Caller
             must hold a project binding under the org or admin.organization on it.
      title: SearchEventsRequest
      additionalProperties: false
    aes.audit.v1.SearchEventsResponse:
      type: object
      properties:
        events:
          type: array
          items:
            $ref: '#/components/schemas/aes.audit.v1.AuditEvent'
          title: events
        nextPageToken:
          type: string
          title: next_page_token
      title: SearchEventsResponse
      additionalProperties: false
    aes.baremetal.v1.AttachBareMetalISORequest:
      type: object
      properties:
        name:
          type: string
          title: name
        objectKey:
          type: string
          title: object_key
          description: Object key returned by CreateBareMetalISOUploadURL (a prior upload).
      title: AttachBareMetalISORequest
      additionalProperties: false
    aes.baremetal.v1.AttachBareMetalISOResponse:
      type: object
      properties:
        instance:
          title: instance
          $ref: '#/components/schemas/aes.baremetal.v1.BareMetalInstance'
      title: AttachBareMetalISOResponse
      additionalProperties: false
    aes.baremetal.v1.AvailableBareMetal:
      type: object
      properties:
        hostName:
          type: string
          title: host_name
          description: Host resource name to lease (`hosts/{slug}`).
        datacenterName:
          type: string
          title: datacenter_name
        specLabel:
          type: string
          title: spec_label
          description: Derived display label, e.g. "cascadelake · 48c · 384GiB".
        cpuModel:
          type: string
          title: cpu_model
        cpuGeneration:
          type: string
          title: cpu_generation
        totalCores:
          type: integer
          title: total_cores
          format: int32
        ramGib:
          type: integer
          title: ram_gib
          format: int32
        storageGib:
          type: integer
          title: storage_gib
          format: int32
        monthlyPriceMinor:
          type:
            - integer
            - string
          title: monthly_price_minor
          format: int64
          description: Per-server price the operator set; the hourly rate is monthly_price_minor/730.
        currency:
          type: string
          title: currency
      title: AvailableBareMetal
      additionalProperties: false
    aes.baremetal.v1.BareMetalAvailability:
      type: string
      title: BareMetalAvailability
      enum:
        - BARE_METAL_AVAILABILITY_UNSPECIFIED
        - BARE_METAL_AVAILABILITY_AVAILABLE
        - BARE_METAL_AVAILABILITY_LEASED
      description: Availability of a published bare-metal host in the public inventory.
    aes.baremetal.v1.BareMetalBootDevice:
      type: string
      title: BareMetalBootDevice
      enum:
        - BARE_METAL_BOOT_DEVICE_UNSPECIFIED
        - BARE_METAL_BOOT_DEVICE_DISK
        - BARE_METAL_BOOT_DEVICE_CDROM
        - BARE_METAL_BOOT_DEVICE_PXE
      description: BareMetalBootDevice selects the one-time boot source for SetBareMetalBootDevice.
    aes.baremetal.v1.BareMetalInstance:
      type: object
      properties:
        name:
          type: string
          title: name
          description: Resource name `bare-metal-instances/{slug}`.
        projectName:
          type: string
          title: project_name
        datacenterName:
          type: string
          title: datacenter_name
        instanceType:
          type: string
          title: instance_type
          description: Derived hardware label (e.g. "cascadelake · 48c · 384GiB"). Display/audit only.
        hostName:
          type: string
          title: host_name
          description: Host bound to this lease (`hosts/{slug}`). Set when state=ACTIVE; empty when CREATING.
        state:
          type: string
          title: state
          description: PROVISIONING / ACTIVE / RELEASING / RELEASED.
        redfishEndpoint:
          type: string
          title: redfish_endpoint
          description: |-
            Redfish endpoint for this leased host. Customer uses this to BMC-control the box
             (PXE install, power cycle, console). Empty when the host has no Redfish configured.
        createTimeUnix:
          type:
            - integer
            - string
          title: create_time_unix
          format: int64
        updateTimeUnix:
          type:
            - integer
            - string
          title: update_time_unix
          format: int64
        labels:
          type: object
          title: labels
          additionalProperties:
            type: string
            title: value
        annotations:
          type: object
          title: annotations
          additionalProperties:
            type: string
            title: value
        billingMode:
          title: billing_mode
          description: |-
            Billing (mirrors VM semantics). billing_mode HOURLY or MONTHLY_*; commitment_end_at_unix +
             autorenew are set for MONTHLY_*. monthly_price_minor is the per-server price snapshotted at
             lease time (the hourly rate billed is monthly_price_minor/730).
          $ref: '#/components/schemas/aes.compute.v1.BillingMode'
        commitmentEndAtUnix:
          type:
            - integer
            - string
          title: commitment_end_at_unix
          format: int64
        autorenew:
          type: boolean
          title: autorenew
        monthlyPriceMinor:
          type:
            - integer
            - string
          title: monthly_price_minor
          format: int64
        currency:
          type: string
          title: currency
        osImage:
          type: string
          title: os_image
          description: |-
            Provisioning / cloud-init. os_image is the catalog id (or custom_image_url when set);
             hostname + linux_username drive the SSH command shown in the UI.
        customImageUrl:
          type: string
          title: custom_image_url
        hostname:
          type: string
          title: hostname
        linuxUsername:
          type: string
          title: linux_username
        publicIpv4Cidr:
          type: string
          title: public_ipv4_cidr
          description: |-
            Public IPv4 block assigned to the host's NIC(s). primary_ipv4 is the first address (the
             cloud-init / management IP). For a /32, cidr is `<primary>/32`.
        primaryIpv4:
          type: string
          title: primary_ipv4
        powerState:
          type: string
          title: power_state
          description: 'Current BMC power state: "On" / "Off" / "" (unknown). Billing is unaffected by power.'
        publicGateway:
          type: string
          title: public_gateway
          description: |-
            Public network details for the host's NIC, from the DC pool. Surfaced so a bring-your-own-OS
             customer can hand-configure their network: gateway + the SUBNET prefix length the IPs sit in
             (e.g. /24). The managed install uses these too. Empty/0 when the DC has none set.
        publicPrefixLen:
          type: integer
          title: public_prefix_len
          format: int32
      title: BareMetalInstance
      additionalProperties: false
    aes.baremetal.v1.BareMetalInstance.AnnotationsEntry:
      type: object
      properties:
        key:
          type: string
          title: key
        value:
          type: string
          title: value
      title: AnnotationsEntry
      additionalProperties: false
    aes.baremetal.v1.BareMetalInstance.LabelsEntry:
      type: object
      properties:
        key:
          type: string
          title: key
        value:
          type: string
          title: value
      title: LabelsEntry
      additionalProperties: false
    aes.baremetal.v1.BareMetalNode:
      type: object
      properties:
        hostName:
          type: string
          title: host_name
          description: hosts/{slug}
        datacenterName:
          type: string
          title: datacenter_name
        specLabel:
          type: string
          title: spec_label
        cpuModel:
          type: string
          title: cpu_model
        cpuGeneration:
          type: string
          title: cpu_generation
        totalCores:
          type: integer
          title: total_cores
          format: int32
        ramGib:
          type: integer
          title: ram_gib
          format: int32
        storageGib:
          type: integer
          title: storage_gib
          format: int32
        monthlyPriceMinor:
          type:
            - integer
            - string
          title: monthly_price_minor
          format: int64
          description: Listed monthly price (hourly = monthly/730). 0 when the host is unpriced.
        currency:
          type: string
          title: currency
        availability:
          title: availability
          $ref: '#/components/schemas/aes.baremetal.v1.BareMetalAvailability'
        gpuModel:
          type: string
          title: gpu_model
          description: |-
            GPU model + count when this is a GPU node (empty/0 otherwise). cpu_generation already carries
             the CPU class, so heterogeneous fleets (incl. AMD-CPU GPU boxes) are described per-node.
        gpuCount:
          type: integer
          title: gpu_count
          format: int32
      title: BareMetalNode
      additionalProperties: false
      description: |-
        BareMetalNode is one published host in the public inventory: the same spec fields as
         AvailableBareMetal plus an availability tag and (when present) GPU model/count. No lessee, BMC,
         or serial is ever projected.
    aes.baremetal.v1.BareMetalPowerAction:
      type: string
      title: BareMetalPowerAction
      enum:
        - BARE_METAL_POWER_ACTION_UNSPECIFIED
        - BARE_METAL_POWER_ACTION_ON
        - BARE_METAL_POWER_ACTION_OFF
        - BARE_METAL_POWER_ACTION_REBOOT
      description: BareMetalPowerAction selects the BMC power operation.
    aes.baremetal.v1.CreateBareMetalISOFromURLRequest:
      type: object
      properties:
        projectName:
          type: string
          title: project_name
        url:
          type: string
          title: url
          description: Public HTTPS URL to the ISO (e.g. a distro mirror). Fetched server-side into the org library.
        filename:
          type: string
          title: filename
          description: Optional filename override; defaults to the URL's basename.
      title: CreateBareMetalISOFromURLRequest
      additionalProperties: false
    aes.baremetal.v1.CreateBareMetalISOFromURLResponse:
      type: object
