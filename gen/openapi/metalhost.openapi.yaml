  /aes.iam.v1.IamService/ListSessions:
    post:
      tags:
        - aes.iam.v1.IamService
      summary: ListSessions
      description: |-
        Session management. Sessions are the metadata around interactive logins (OIDC, signup,
         invite-accept) — each one is linked to an API key. ListSessions shows the caller their
         active sessions; RevokeSession invalidates one (revokes the linked API key); RevokeAll
         revokes every session except the one calling (so users can "log out everywhere else"
         without locking themselves out). Programmatic API keys created via CreateApiKey are NOT
         sessions and don't appear here — they're managed via ListApiKeys / RevokeApiKey.
      operationId: aes.iam.v1.IamService.ListSessions
      parameters:
        - name: Connect-Protocol-Version
          in: header
          required: true
          schema:
            $ref: '#/components/schemas/connect-protocol-version'
        - name: Connect-Timeout-Ms
          in: header
          schema:
            $ref: '#/components/schemas/connect-timeout-header'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/aes.iam.v1.ListSessionsRequest'
        required: true
      responses:
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/connect.error'
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/aes.iam.v1.ListSessionsResponse'
