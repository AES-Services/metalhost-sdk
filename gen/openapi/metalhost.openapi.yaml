    google.protobuf.Timestamp:
      type: string
      examples:
        - "2023-01-15T01:30:15.01Z"
        - "2024-12-25T12:00:00Z"
      format: date-time
      description: |-
        A Timestamp represents a point in time independent of any time zone or local
         calendar, encoded as a count of seconds and fractions of seconds at
         nanosecond resolution. The count is relative to an epoch at UTC midnight on
         January 1, 1970, in the proleptic Gregorian calendar which extends the
         Gregorian calendar backwards to year one.

         All minutes are 60 seconds long. Leap seconds are "smeared" so that no leap
         second table is needed for interpretation, using a [24-hour linear
         smear](https://developers.google.com/time/smear).

         The range is from 0001-01-01T00:00:00Z to 9999-12-31T23:59:59.999999999Z. By
         restricting to that range, we ensure that we can convert to and from [RFC
         3339](https://www.ietf.org/rfc/rfc3339.txt) date strings.

         # Examples

         Example 1: Compute Timestamp from POSIX `time()`.

             Timestamp timestamp;
             timestamp.set_seconds(time(NULL));
             timestamp.set_nanos(0);

         Example 2: Compute Timestamp from POSIX `gettimeofday()`.

             struct timeval tv;
             gettimeofday(&tv, NULL);

             Timestamp timestamp;
             timestamp.set_seconds(tv.tv_sec);
             timestamp.set_nanos(tv.tv_usec * 1000);

         Example 3: Compute Timestamp from Win32 `GetSystemTimeAsFileTime()`.

             FILETIME ft;
             GetSystemTimeAsFileTime(&ft);
             UINT64 ticks = (((UINT64)ft.dwHighDateTime) << 32) | ft.dwLowDateTime;

             // A Windows tick is 100 nanoseconds. Windows epoch 1601-01-01T00:00:00Z
             // is 11644473600 seconds before Unix epoch 1970-01-01T00:00:00Z.
             Timestamp timestamp;
             timestamp.set_seconds((INT64) ((ticks / 10000000) - 11644473600LL));
             timestamp.set_nanos((INT32) ((ticks % 10000000) * 100));

         Example 4: Compute Timestamp from Java `System.currentTimeMillis()`.

             long millis = System.currentTimeMillis();

             Timestamp timestamp = Timestamp.newBuilder().setSeconds(millis / 1000)
                 .setNanos((int) ((millis % 1000) * 1000000)).build();

         Example 5: Compute Timestamp from Java `Instant.now()`.

             Instant now = Instant.now();

             Timestamp timestamp =
                 Timestamp.newBuilder().setSeconds(now.getEpochSecond())
                     .setNanos(now.getNano()).build();

         Example 6: Compute Timestamp from current time in Python.

             timestamp = Timestamp()
             timestamp.GetCurrentTime()

         # JSON Mapping

         In JSON format, the Timestamp type is encoded as a string in the
         [RFC 3339](https://www.ietf.org/rfc/rfc3339.txt) format. That is, the
         format is "{year}-{month}-{day}T{hour}:{min}:{sec}[.{frac_sec}]Z"
         where {year} is always expressed using four digits while {month}, {day},
         {hour}, {min}, and {sec} are zero-padded to two digits each. The fractional
         seconds, which can go up to 9 digits (i.e. up to 1 nanosecond resolution),
         are optional. The "Z" suffix indicates the timezone ("UTC"); the timezone
         is required. A proto3 JSON serializer should always use UTC (as indicated by
         "Z") when printing the Timestamp type and a proto3 JSON parser should be
         able to accept both UTC and other timezones (as indicated by an offset).

         For example, "2017-01-15T01:30:15.01Z" encodes 15.01 seconds past
         01:30 UTC on January 15, 2017.

         In JavaScript, one can convert a Date object to this format using the
         standard
         [toISOString()](https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Global_Objects/Date/toISOString)
         method. In Python, a standard `datetime.datetime` object can be converted
         to this format using
         [`strftime`](https://docs.python.org/2/library/time.html#time.strftime) with
         the time format spec '%Y-%m-%dT%H:%M:%S.%fZ'. Likewise, in Java, one can use
         the Joda Time's [`ISODateTimeFormat.dateTime()`](
         http://joda-time.sourceforge.net/apidocs/org/joda/time/format/ISODateTimeFormat.html#dateTime()
         ) to obtain a formatter capable of generating timestamps in this format.
security: []
tags:
  - name: aes.audit.v1.AuditService
    description: |-
      AuditService records security-relevant events (design §4 audit-svc).

       Customer-facing surface is read-only — SearchEvents only. LogEvent is intentionally
       not routed as an RPC: it stays a Go method on services/audit.Server (and the
       pkg/auditdb helper of the same name) called by backend services that write audit
       entries on the customer's behalf. Exposing the write side would let any caller
       inject fake audit entries against any principal/resource — a real auditability hole.
  - name: aes.ops.v1.OperationsService
    description: |-
      Long-running async work unit (GCP Long-Operation style). Mutations return
       a name like `operations/op_abc123`; clients poll GetOperation until terminal state.

       Customer-facing surface is read-only: Get + List. Operation creation is server-side
       only — kicked off by other services (CreateVM, ProvisionDatacenter, etc.) when they
       need to track a long-running activity. Cancellation isn't exposed to customers:
       proper mid-flight rollback requires per-workflow cleanup logic (e.g., release public
       IPs, refund wallet, soft-delete VM row), and Temporal cancellation alone doesn't
       guarantee that. The CreateOperation message + handler still exist as backend
       machinery — see services/ops/server.go — they're just not routed as an RPC.
  - name: aes.compute.v1.ComputeService
    description: |-
      ComputeService is the control-plane API for VMs.

       Removed in the v1 rip:
         - UpdateVirtualMachine: only patched labels/annotations, no UI surface.
         - SuspendVirtualMachine / ResumeVirtualMachine: KubeVirt pause/unpause, niche; deferred.
         - GetVMLogs: OpenConsole covers the live-tail use case; this point-in-time snapshot wasn't worth maintaining.
         - CreateMachineImage / GetMachineImage / ListMachineImages / DeleteMachineImage:
           no customer image upload at launch. System catalog images are managed by
           AdminCatalogService.
         - PrepareImageUpload / FinalizeImageUpload: deprecated stubs, removed.
         - GuestExec: moved to AdminComputeService — privileged backdoor that bypasses guest auth
           belongs on the operator surface, not the customer one.
  - name: aes.baremetal.v1.BareMetalService
    description: |-
      BareMetalService is the customer-facing API for whole-host leases. Distinct from
       ComputeService (which serves KubeVirt VMs) because the lifecycle is different: no live
       migration, no resize, the customer typically PXE-installs their own OS, and the lease is
       pinned to a specific physical host until released.

       Pricing is per-server: an operator sets each host's monthly price (SetHostPrice, admin API)
       before publishing it to the bare-metal pool. Billing is identical to VMs — HOURLY meters at
       the host's monthly/730 hourly rate through the usage_events pipeline; MONTHLY_{1,3,6,12}
       prepays the term at the same tiered discounts, hard non-cancel, optional autorenew.

       Flow: customer calls ListAvailableBareMetal to browse published hosts (discovered specs +
       monthly price), then CreateBareMetalInstance(host_name, billing_mode) to lease a specific
       machine. Metalhost flips the host's role to 'baremetal_leased' and returns access info
       (Redfish endpoint for OS install). ReleaseBareMetalInstance flips it back to 'baremetal_pool'.
  - name: aes.catalog.v1.CatalogService
    description: CatalogService exposes datacenters and SKUs per PLATFORM_DESIGN.md §4.
  - name: aes.compute.v1.SSHKeysService
    description: |-
      SSHKeysService manages reusable SSH keys at the project level. Keys registered here can be
       referenced by name from CreateVirtualMachineRequest.ssh_key_names without pasting the
       pubkey on every VM. Keys are project-scoped — sharing across projects requires re-registering.

       Pre-launch surface is the minimum needed by the SPA: Create / List / Delete. Single-key
       Get + rename (Update) are intentionally absent — list returns everything the UI needs,
       and customers who want to rename a key can delete + re-add. UserDataSnippetsService was
       removed entirely; customers paste cloud-init YAML directly on the VM create form.
  - name: aes.health.v1.HealthService
    description: Liveness/readiness for load balancers and ops.
  - name: aes.iam.v1.IamService
    description: |-
      IamService holds identity primitives (design §4 iam-svc).

       Customer-facing surface intentionally excludes:
         - ValidateApiKey, ValidateOidcToken — internal-only (the HTTP auth middleware uses
           pkg-private Go helpers `ValidateAPIKeyRaw` / `validateOidcTokenRaw`); exposing the
           RPCs would let external callers test arbitrary key/token validity, a real enum vector.
         - CheckPermission — pre-flight per-button perm checks aren't worth wiring; UI lets
           the action fail with PermissionDenied at request time.
         - GetAuthMetadata — exposes which auth providers are configured; only matters for
           self-hosts without OIDC, which we don't ship.
         - GetOrgMember — single-getter ripped per platform pattern; ListOrgMembers covers it.

       The Go methods for these stay callable internally where needed.
  - name: aes.network.v1.NetworkService
    description: |-
      NetworkService manages tenant-facing networks backed by OVN-Kubernetes
       UserDefinedNetwork (UDN) resources for tenant-private connectivity. Each Network maps to a
       tenant network namespace. VM public connectivity is delivered via the public NIC model.

       Ripped in the v1 audit:
         - GetServiceMetadata: bootstrap-era stub-status probe; dead.
         - GetNetwork / DeleteNetwork: 1-network-per-project invariant pre-launch — list covers
           reads, no UI delete.
         - GetPublicIp / ListPublicIps / ReleasePublicIp: no customer IP-management surface;
           VM provision / delete workflows manage public_ips rows directly.
         - AllocatePublicIp: previously customer-callable, now internal-only. Allocation alone
           is a footgun — the IP row gets billed but the VM has no public NIC unless the
           allocation runs *during* vm_provision (KubeVirt 1.8 can't hot-add NICs). Customers
           opt into a public IP at VM-create time via `assign_public_ipv4`; post-create
           attach isn't supported and the customer-facing copy says so.
         - GetFirewallRule / GetLoadBalancer: single-resource Get is redundant with List.
         - CreateLoadBalancer / ListLoadBalancers / UpdateLoadBalancer / DeleteLoadBalancer:
           LB UX needs a redesign and 1-VM-customers don't need it at launch. Bring back in v2.

       Firewall RPCs back the OVN ACL set on the public-vlan50 localnet switch — NetworkPolicy
       (the original backing) only filters east-west on the pod's primary CNI, leaving the
       public NIC unfiltered.
  - name: aes.objectstore.v1.ObjectStoreService
    description: |-
      ObjectStoreService is Metalhost's S3-compatible object storage facade. Backed by MinIO in dev;
       pointed at a managed S3-compatible cluster in production. Each Bucket maps 1:1 to an S3
       bucket on the underlying store; per-object access is via presigned URLs (clients PUT/GET
       directly to MinIO, metalhostd never proxies object payloads).

       Bucket name is `buckets/{slug}`; the underlying S3 bucket name is the slug. Slug must be
       DNS-safe (lowercase, [a-z0-9-]) and globally unique within the Metalhost deployment — same
       uniqueness rule as S3 globally, scoped to the Metalhost MinIO tenant.
  - name: aes.project.v1.ProjectService
    description: |-
      ProjectService is the tenancy slice of the control plane (design §4 project-svc).

       Removed surfaces (folded into AdminProjectService or dropped entirely):
         - ListOrganizations: every customer has exactly one org; multi-org switcher is v2.
         - TransferProject / TransferResources: per-org isolation is the v1 product invariant.
         - Folders (List/Get/Create/Update/Delete): nesting was a v2 idea, nothing used it.
         - GetDashboardSummary: SPA builds its own tile aggregation via parallel queries.
         - RecoverProject / RecoverOrganization: moved to AdminProjectService (operator-only).
  - name: aes.quota.v1.QuotaService
    description: |-
      QuotaService is the customer-facing read API for quotas. AdminQuotaService (in aes.admin.v1)
       remains the management surface — admins set limits, customers see effective caps.

       Pre-launch surface is read-only — quota-increase requests go through the support ticket
       flow (SupportService.CreateTicket) rather than a parallel quota-request workflow. The
       previous Request/ListQuotaIncreaseRequests RPCs were removed along with their tickets table.

       Effective limit semantics: when both an org-level and project-level quota row exist for the
       same key, the effective ceiling is min(org, project). Missing rows = unlimited (closed-beta
       default).
  - name: aes.storage.v1.StorageService
    description: |-
      StorageService manages persistent block disks: standalone PVCs that customers create up
       front, attach to VMs (potentially hot-plug at runtime), and reuse across VM lifetimes. The
       boot disk inside CreateVirtualMachine is a separate concern (it lives only as long as the VM
       does); this service is for data disks the customer wants to keep.

       Storage class is presented to the customer as a friendly tier name — currently `nvme` only.
       Metalhost translates that per-datacenter to the actual k8s StorageClass via DC annotation
       `aes.metalhost/storage-class-nvme`. Lab DCs may map it to `local-path`; production DCs map
       to a Rook RBD tier. (`ssd` was reserved for a future SATA-SSD tier and is rejected today.)
  - name: aes.support.v1.SupportService
    description: |-
      SupportService is the customer-facing ticket API. Tickets are organization-scoped — every
       member of the org can see every ticket the org has opened. Staff-side management (assign,
       escalate, internal notes, cross-org list) lives in aes.admin.v1.AdminSupportService.

       v1 is API + DB only. Email gateway, Slack relay, and SLA breach worker land in phase 2;
       the schema already carries channel + sla_due_at so phase 2 is pure business logic.
  - name: aes.wallet.v1.WalletService
    description: |-
      WalletService is the customer-facing billing surface: org's single billing account + wallet,
       payment methods, invoices, top-ups, alerts. Admin/internal ledger operations live on
       AdminBillingService. One billing account per org; one wallet per billing account.
  - name: aes.webhooks.v1.WebhooksService
    description: |-
      WebhooksService manages customer-defined HTTP callbacks for resource events. Customers
       register endpoint URLs + the event types they care about; metalhostd's outbox worker delivers
       matching events as POSTs with HMAC-SHA256 signatures (X-Metalhost-Signature header) using a
       per-subscription shared secret returned at create time.

       Event types follow the convention `{domain}.{resource}.{verb}` —
         compute.vm.created / compute.vm.deleted / compute.vm.state_changed
         storage.disk.created / storage.disk.deleted
         ops.operation.completed
         billing.invoice.finalized
       Customers subscribe to specific types or use a wildcard prefix (e.g. "compute.vm.*").
servers:
  - url: https://api.metalhost.net
    description: Production
