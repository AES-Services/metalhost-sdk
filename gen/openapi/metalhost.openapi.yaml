            Resource name `projects/<slug>`. Must be one the caller has access to (we check via
             RequireProjectRead). Empty string clears the default (sets api_keys.default_project
             to NULL) — useful for "leave project" actions where the user no longer has access.
      title: SetSessionDefaultProjectRequest
      additionalProperties: false
    aes.iam.v1.SetSessionDefaultProjectResponse:
      type: object
      properties:
        projectName:
          type: string
          title: project_name
          description: |-
            Echoes back what was set (or empty if cleared) so the client can update its cached
             identity without a follow-up GetCallerIdentity call.
      title: SetSessionDefaultProjectResponse
      additionalProperties: false
    aes.iam.v1.SignUpRequest:
      type: object
      properties:
        displayName:
          type: string
          title: display_name
          description: |-
            Human-readable name for the tenant (becomes the org's display name). Required.
             Customer-facing wording: "Company / organization name".
        email:
          type: string
          title: email
          description: |-
            Email address. Required. Used to derive the principal slug and as the account's contact
             address. When `password` is supplied, the server sends a Resend verification email and
             returns SignUpResponse.verification_pending=true (no API key yet); the caller then calls
             VerifyEmail with the token from the email. When `password` is empty, the legacy
             closed-beta path runs (gated by METALHOST_ENABLE_PUBLIC_SIGNUP) and immediately mints the
             API key — used by dev / staging / OIDC-only signups that don't store a password.
        password:
          type: string
          title: password
          description: |-
            Optional plaintext password. Length must be ≥ 8. Empty string falls through to the legacy
             closed-beta path (no verification, no password stored).
        fullName:
          type: string
          title: full_name
          description: |-
            Full name of the signing-up user (becomes users.display_name). Optional; when empty the
             server falls back to display_name (the company / org name). Surfacing this separately
             lets the portal greet the user by their name ("Welcome back, Alice") instead of their
             company name. Portal sign-up form should collect both.
      title: SignUpRequest
      additionalProperties: false
    aes.iam.v1.SignUpResponse:
      type: object
      properties:
        organizationName:
          type: string
          title: organization_name
          description: The created organization (`organizations/{slug}`). Empty when verification_pending=true.
        projectName:
          type: string
          title: project_name
          description: The default project under the new org (`projects/{slug}-default`). Empty when pending.
        principal:
          type: string
          title: principal
          description: The principal id (`users/{slug}`) that owns the new tenancy. Empty when pending.
        apiKey:
          title: api_key
          description: |-
            The minted API key + plaintext secret. Same one-shot semantics as CreateApiKey — the
             secret is never retrievable again after this response. Nil when verification_pending=true.
          $ref: '#/components/schemas/aes.iam.v1.ApiKey'
        secret:
          type: string
          title: secret
        verificationPending:
          type: boolean
          title: verification_pending
          description: |-
            True when the server sent a verification email and is waiting for VerifyEmail. The
             organization / user / API key fields above are empty in this case.
      title: SignUpResponse
      additionalProperties: false
    aes.iam.v1.StartOidcLoginRequest:
      type: object
      properties:
        providerName:
          type: string
          title: provider_name
          description: Provider name (`oidc-providers/{slug}`) — admins register these via AdminIamService.
        redirectUri:
          type: string
          title: redirect_uri
          description: Where the IdP should redirect after auth — typically the gateway's /oauth/callback.
      title: StartOidcLoginRequest
      additionalProperties: false
    aes.iam.v1.StartOidcLoginResponse:
      type: object
      properties:
        authorizeUrl:
          type: string
          title: authorize_url
          description: |-
            Browser navigates here. Metalhost-generated state token is embedded; gateway preserves it
             through to CompleteOidcLogin so we can validate replay.
        state:
          type: string
          title: state
      title: StartOidcLoginResponse
      additionalProperties: false
    aes.iam.v1.SubmitMFAChallengeRequest:
      type: object
      properties:
        challengeToken:
          type: string
          title: challenge_token
          description: Opaque challenge token returned by Login or CompleteOidcLogin.
        totpCode:
          type: string
          title: totp_code
          description: |-
            6-digit TOTP code from the caller's authenticator app. One of totp_code OR recovery_code
             must be set; if both are provided, totp_code wins.
        recoveryCode:
          type: string
