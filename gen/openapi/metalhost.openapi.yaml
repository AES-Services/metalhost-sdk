  /aes.compute.v1.ComputeService/ReimageVirtualMachine:
    post:
      tags:
        - aes.compute.v1.ComputeService
      summary: |-
        ReimageVirtualMachine wipes the OS disk and reinstalls from a (potentially new) image.
         The VM must be STOPPED — refuses on RUNNING to avoid surprising the customer.
         Networks, public IPs, and firewall rules survive — only the disk is replaced.
      description: |-
        Use cases: customer wants to start from a clean slate without recreating the VM (preserves
         resource name, networks, IPs, ssh keys), or wants to upgrade the base image (Ubuntu 24.04
         → 26.04). Cheaper than create-new-and-migrate when the customer doesn't care about the
         existing disk contents.
      operationId: aes.compute.v1.ComputeService.ReimageVirtualMachine
      parameters:
        - name: Connect-Protocol-Version
          in: header
          required: true
          schema:
            $ref: '#/components/schemas/connect-protocol-version'
        - name: Connect-Timeout-Ms
          in: header
          schema:
            $ref: '#/components/schemas/connect-timeout-header'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/aes.compute.v1.ReimageVirtualMachineRequest'
        required: true
      responses:
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/connect.error'
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/aes.compute.v1.ReimageVirtualMachineResponse'
  /aes.compute.v1.ComputeService/RenewVMNow:
    post:
      tags:
        - aes.compute.v1.ComputeService
      summary: RenewVMNow
      description: |-
        RenewVMNow forces an immediate renewal — charges the wallet for the next term using the
         VM's current billing_mode + the SKU's current hourly rate. Useful for customers who want
         to extend before the autorenew worker fires, or who have autorenew off and want a manual
         extension. Refuses on HOURLY (no term to renew).
      operationId: aes.compute.v1.ComputeService.RenewVMNow
      parameters:
        - name: Connect-Protocol-Version
          in: header
          required: true
          schema:
            $ref: '#/components/schemas/connect-protocol-version'
        - name: Connect-Timeout-Ms
          in: header
          schema:
            $ref: '#/components/schemas/connect-timeout-header'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/aes.compute.v1.RenewVMNowRequest'
        required: true
      responses:
        default:
          description: Error
