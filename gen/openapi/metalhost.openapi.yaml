          description: Optional — e.g. "iPhone 15".
      title: EnrollMFARequest
      additionalProperties: false
    aes.iam.v1.EnrollMFAResponse:
      type: object
      properties:
        device:
          title: device
          $ref: '#/components/schemas/aes.iam.v1.MFADevice'
        secret:
          type: string
          title: secret
          description: |-
            Cleartext shared secret. Returned exactly once, not stored anywhere the caller can read
             again — they must enter it (or scan the QR) into their authenticator app NOW.
        provisioningUri:
          type: string
          title: provisioning_uri
          description: |-
            Provisioning URI: `otpauth://totp/{Issuer}:{Account}?secret=...&issuer={Issuer}` — most
             authenticator apps render this as a QR code.
      title: EnrollMFAResponse
      additionalProperties: false
    aes.iam.v1.GetAuthMetadataRequest:
      type: object
      title: GetAuthMetadataRequest
      additionalProperties: false
    aes.iam.v1.GetAuthMetadataResponse:
      type: object
      properties:
        supportsApiKey:
          type: boolean
          title: supports_api_key
        oidcIssuerUrl:
          type: string
          title: oidc_issuer_url
          description: OIDC issuer URL for interactive login (e.g. https://issuer.example.com). Empty if not configured.
        oidcAudience:
          type: string
          title: oidc_audience
          description: Optional audience for OIDC tokens when enforced at the gateway.
        supportsOidc:
          type: boolean
          title: supports_oidc
          description: True when an issuer is configured (discovery / token validation may still be gateway-only in Phase 0).
        supportsRbac:
          type: boolean
          title: supports_rbac
          description: True when CheckPermission is backed by role/permission policy.
      title: GetAuthMetadataResponse
      additionalProperties: false
    aes.iam.v1.GetCallerIdentityRequest:
      type: object
      title: GetCallerIdentityRequest
      additionalProperties: false
    aes.iam.v1.GetCallerIdentityResponse:
      type: object
      properties:
        principal:
          type: string
          title: principal
          description: The authenticated principal, e.g. "users/alice" or "serviceAccounts/bot".
        defaultProject:
          type: string
          title: default_project
          description: The default project attached to the bearer token, or empty.
        scopeProject:
          type: string
          title: scope_project
          description: |-
            When non-empty, the bearer token is hard-scoped to this project — cross-project requests
             are rejected by RequireProjectAccess. Empty means the token has no project scope (its
             permissions are limited only by the principal's role bindings).
        accessibleOrganizations:
          type: array
          items:
            type: string
          title: accessible_organizations
          description: |-
            Organizations the caller has a role binding against (any role). Useful for the
             portal landing resolver: when this is non-empty but default_project is empty, the user
             has access to ≥1 org but hasn't created/been-assigned a project yet — route them to
             the onboarding wizard. Empty list means the user has no org access at all (orphan
             account; very rare).
      title: GetCallerIdentityResponse
      additionalProperties: false
