  /aes.baremetal.v1.BareMetalService/DetachBareMetalISO:
    post:
      tags:
        - aes.baremetal.v1.BareMetalService
      summary: DetachBareMetalISO
      description: DetachBareMetalISO ejects any mounted virtual media (the library copy is kept).
