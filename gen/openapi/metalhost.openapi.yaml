        challengeToken:
          type: string
          title: challenge_token
          description: Opaque challenge token returned by Login or CompleteOidcLogin.
        totpCode:
          type: string
          title: totp_code
          description: |-
            6-digit TOTP code from the caller's authenticator app. One of totp_code OR recovery_code
             must be set; if both are provided, totp_code wins.
        recoveryCode:
          type: string
          title: recovery_code
          description: |-
            Single-use recovery code (16 chars, hex). Consumed on use. Provided when the caller has
             lost their authenticator device.
      title: SubmitMFAChallengeRequest
      additionalProperties: false
    aes.iam.v1.SubmitMFAChallengeResponse:
      type: object
      properties:
        principal:
          type: string
          title: principal
          description: Same shape as LoginResponse's success branch.
        apiKey:
          title: api_key
          $ref: '#/components/schemas/aes.iam.v1.ApiKey'
        secret:
          type: string
          title: secret
        usedRecoveryCode:
          type: boolean
          title: used_recovery_code
          description: |-
            True when the caller used a recovery code (so the SPA can prompt them to re-enroll a
             fresh device — recovery codes are one-shot and don't re-mint).
      title: SubmitMFAChallengeResponse
      additionalProperties: false
