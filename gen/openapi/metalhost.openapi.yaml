        displayName:
          type: string
          title: display_name
        state:
          title: state
          $ref: '#/components/schemas/aes.catalog.v1.DatacenterState'
        kubernetesApiEndpoint:
          type: string
          title: kubernetes_api_endpoint
          description: Kubernetes API endpoint for the DC control plane (operator-visible).
        labels:
          type: object
          title: labels
          additionalProperties:
            type: string
            title: value
        annotations:
          type: object
          title: annotations
          additionalProperties:
            type: string
            title: value
        kubernetesVersion:
          type: string
          title: kubernetes_version
        kubevirtVersion:
          type: string
          title: kubevirt_version
        healthSummary:
          type: string
          title: health_summary
          description: Opaque summary JSON or text for health snapshots (OVN, Rook, etc.).
        capacityPct:
          type: integer
          title: capacity_pct
          format: int32
          description: |-
            ────────────── Capacity (populated by ListDatacenters / GetDatacenter) ──────────────
             capacity_pct: % of usable VM CPU capacity currently allocated (0..100). Same number
             GetRegionHealth returns. Allows the VM-create UI to dim a region or surface a "near
             capacity" badge without a second round-trip. 0 means empty (or unmeasurable); 100 means
             no more VMs can be scheduled until something stops. Zero when the DC isn't READY/DEGRADED
             (e.g. PROVISIONING DCs report 0).
      title: Datacenter
      additionalProperties: false
    aes.catalog.v1.Datacenter.AnnotationsEntry:
